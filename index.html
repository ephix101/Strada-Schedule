<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Strada Schedule</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;font-size:13px;background:#f0f2f5;overflow:hidden;height:100vh}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit;font-size:12px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#eee}
::-webkit-scrollbar-thumb{background:#bbb;border-radius:3px}
/* Auth screens */
.screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:1000;background:linear-gradient(135deg,#1F3864 0%,#2563eb 100%)}
.screen-card{background:#fff;border-radius:14px;padding:32px;width:420px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.screen-logo{font-size:26px;font-weight:800;color:#1F3864;margin-bottom:4px}
.screen-sub{color:#888;font-size:13px;margin-bottom:22px;line-height:1.5}
.screen-lbl{display:block;font-size:11px;font-weight:700;color:#555;margin-bottom:4px;margin-top:14px}
.screen-inp{width:100%;padding:9px 12px;border:1.5px solid #d0d7e3;border-radius:7px;font-size:13px;outline:none;transition:border-color .15s;color:#222}
.screen-inp:focus{border-color:#1F3864}
.screen-btn{width:100%;margin-top:18px;padding:11px;background:#1F3864;color:#fff;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;transition:background .15s}
.screen-btn:hover{background:#2d5a9e}
.screen-btn:disabled{background:#bbb;cursor:not-allowed}
.screen-err{color:#dc3545;font-size:12px;margin-top:8px;min-height:18px}
.screen-link{display:block;text-align:center;margin-top:12px;font-size:12px;color:#1F3864;cursor:pointer;text-decoration:underline}
.screen-note{color:#aaa;font-size:11px;margin-top:14px;text-align:center;line-height:1.5}
.screen-divider{border:none;border-top:1px solid #eee;margin:16px 0}
/* App shell */
.app{display:flex;flex-direction:column;height:100vh}
.toolbar{display:flex;align-items:center;gap:10px;padding:0 14px;height:44px;background:#1F3864;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.25);z-index:100}
.logo{font-weight:700;font-size:14px;margin-right:4px;letter-spacing:.2px}
.tabs{display:flex;background:rgba(255,255,255,.12);border-radius:6px;padding:2px;gap:1px}
.tab{padding:3px 11px;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;background:transparent;color:rgba(255,255,255,.8);transition:all .15s}
.tab.active{background:#fff;color:#1F3864}
.spacer{flex:1}
.user-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border-radius:20px;padding:3px 10px 3px 3px}
.user-av{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0}
.user-email{font-size:11px;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-left:2px}
.sync-dot.ok{background:#4ade80}
.sync-dot.busy{background:#fbbf24;animation:pulse .8s infinite}
.sync-dot.err{background:#f87171}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.logout-btn{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.8);border-radius:5px;padding:3px 9px;font-size:11px;cursor:pointer;white-space:nowrap}
.logout-btn:hover{background:rgba(255,255,255,.2)}
.main{flex:1;overflow:hidden;display:flex}
/* Loading */
.loading-screen{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:#666}
.spinner{width:32px;height:32px;border:3px solid #e0e4ed;border-top-color:#1F3864;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Toast */
.toast-ctr{position:fixed;top:52px;right:16px;z-index:900;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:#1a2b4a;color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;opacity:0;transform:translateX(20px);transition:all .25s;max-width:300px}
.toast.show{opacity:1;transform:translateX(0)}
/* Gantt */
.gantt-wrap{flex:1;overflow:auto;position:relative;user-select:none}
.gantt-hdr{position:sticky;top:0;z-index:20;display:flex;flex-shrink:0}
.corner{position:sticky;left:0;z-index:30;background:#1F3864;border-bottom:1px solid #0d2748;border-right:2px solid #0d2748;display:flex;align-items:flex-end;padding:0 10px 4px;flex-shrink:0}
.cal-wrap{background:#1F3864;flex-shrink:0}
.month-row,.day-row,.wd-row{display:flex}
.mc{display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:700;letter-spacing:.5px;border-right:1px solid rgba(255,255,255,.1);flex-shrink:0}
.dc{display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;flex-shrink:0;border-right:1px solid rgba(255,255,255,.04)}
.wc{display:flex;align-items:center;justify-content:center;font-size:7px;flex-shrink:0}
.g-row{display:flex;flex-shrink:0}
.lc{position:sticky;left:0;z-index:10;overflow:hidden;display:flex;align-items:center;padding:0 8px;flex-shrink:0}
.gc{position:relative;overflow:hidden;flex-shrink:0}
.proj-row .lc{background:#2F4F8F;border-right:2px solid #1a3d6e;border-bottom:1px solid #1a3d6e}
.proj-row .gc{background:#243f6e}
.task-row .lc{border-right:2px solid #d0d7e3;border-bottom:1px solid #e4e8f0}
.task-even .lc,.task-even .gc{background:#f7f9fc}
.task-odd  .lc,.task-odd  .gc{background:#fff}
.status-badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:9px;white-space:nowrap;flex-shrink:0}
.crew-badge{font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0;max-width:70px;overflow:hidden;text-overflow:ellipsis}
.icon-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:1px 4px;border-radius:3px;line-height:1}
.bar-seg{position:absolute;pointer-events:none}
.bar-hit{position:absolute;cursor:grab;z-index:5;background:transparent;box-sizing:border-box}
.bar-hit:active{cursor:grabbing}
.today-line{position:absolute;top:0;width:2px;pointer-events:none;background:rgba(255,210,0,.5)}
.proj-span{position:absolute;pointer-events:none;border-radius:3px;background:rgba(255,255,255,.18)}
/* Board */
.board-wrap{flex:1;overflow:auto;padding:16px;background:#f0f2f5}
.board-cols{display:flex;gap:12px;align-items:flex-start}
.board-col{min-width:200px;max-width:256px;flex-shrink:0}
.board-col-hdr{display:flex;align-items:center;gap:6px;margin-bottom:8px;padding:4px 8px;border-radius:6px}
.board-card{background:#fff;border-radius:8px;padding:10px 12px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid #e4e8f0;margin-bottom:6px;transition:box-shadow .15s}
.board-card:hover{box-shadow:0 3px 10px rgba(0,0,0,.12)}
/* Empty state */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:#888;padding:40px}
.empty-state-icon{font-size:48px;opacity:.4}
.empty-state-title{font-size:18px;font-weight:700;color:#1F3864}
.empty-state-body{font-size:13px;text-align:center;max-width:340px;line-height:1.6}
.empty-state-btn{padding:9px 22px;background:#1F3864;color:#fff;border:none;border-radius:7px;font-weight:700;font-size:13px;cursor:pointer}
/* Settings */
.settings-wrap{flex:1;overflow:auto;padding:20px;max-width:640px}
.settings-tabs{display:flex;gap:8px;margin-bottom:16px}
.settings-tab{padding:6px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s}
.panel-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.crew-card,.hol-card,.user-card{display:flex;align-items:center;gap:10px;background:#fff;padding:10px 14px;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.07);margin-bottom:7px}
.crew-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.info-card{background:#f0f4ff;border:1px solid #c5d0e8;border-radius:8px;padding:14px;margin-bottom:10px;font-size:12px;color:#334;line-height:1.6}
/* Modal — FIX: rendered in dedicated #modal-root, never inside #main */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:10px;padding:22px;width:560px;max-width:95vw;max-height:88vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.22)}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-hdr h3{font-size:14px;color:#1F3864;font-weight:700}
.modal-close{background:none;border:none;font-size:22px;line-height:1;padding:2px 6px;cursor:pointer;color:#999;border-radius:4px}
.modal-close:hover{background:#f0f2f5;color:#333}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
.fg-full{grid-column:span 2}
.lbl{display:block;font-size:11px;font-weight:700;color:#555;margin-bottom:3px;margin-top:10px}
.inp{width:100%;padding:6px 9px;border:1px solid #cdd3de;border-radius:5px;font-size:12px;outline:none;transition:border-color .15s}
.inp:focus{border-color:#1F3864}
.inp-err{border-color:#dc3545!important}
.field-err{font-size:11px;color:#dc3545;margin-top:3px;min-height:16px}
.seg-box{border-radius:8px;padding:10px 12px;margin-bottom:8px;border:1px solid}
.seg0{background:#f0f4ff;border-color:#c5d0e8}
.seg1{background:#fff8f0;border-color:#ffe0b2}
.seg2{background:#f0fff4;border-color:#c3e6cb}
.seg-grid{display:flex;gap:10px;align-items:flex-start}
.wd-total{background:#f0f4ff;border-radius:6px;padding:8px 12px;font-size:13px;color:#1F3864;font-weight:700;margin-top:10px}
.modal-footer{display:flex;gap:8px;margin-top:18px;justify-content:space-between;align-items:center}
.task-list{max-height:180px;overflow-y:auto;margin-top:6px}
.task-edit-row{display:flex;gap:6px;align-items:center;margin-bottom:4px}
.btn-primary{padding:7px 18px;background:#1F3864;color:#fff;border:none;border-radius:6px;font-weight:700;font-size:12px;cursor:pointer}
.btn-sec{padding:7px 14px;background:#fff;border:1px solid #cdd3de;border-radius:6px;font-size:12px;cursor:pointer}
.btn-danger{padding:7px 14px;background:#fff;color:#dc3545;border:1px solid #dc3545;border-radius:6px;font-size:12px;cursor:pointer}
.btn-sm{padding:4px 10px;border-radius:5px;border:1px solid #d0d7e3;background:#f8f9fb;font-size:12px;cursor:pointer}
/* Filter bar */
.filter-bar{display:flex;align-items:center;gap:6px;padding:0 14px;min-height:40px;background:#f8f9fb;border-bottom:1px solid #d1d5db;flex-shrink:0;flex-wrap:wrap}
.filter-bar.active{background:#fffbeb;border-bottom-color:#f59e0b}
.fb-label{font-size:11px;font-weight:700;color:#6b7280;white-space:nowrap;flex-shrink:0}
.fb-sep{width:1px;height:20px;background:#d1d5db;flex-shrink:0;margin:0 2px}
.fb-crew-btn{padding:2px 9px;border-radius:12px;border:1.5px solid transparent;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:opacity .12s,transform .1s}
.fb-crew-btn.on{opacity:1}
.fb-crew-btn.off{opacity:.35;filter:grayscale(.4)}
.fb-crew-btn:hover{opacity:.9!important;transform:scale(1.04)}
.fb-sel{padding:3px 6px;border:1px solid #cdd3de;border-radius:5px;font-size:12px;background:#fff;cursor:pointer;height:26px;max-width:130px}
.fb-date{width:108px;padding:3px 6px;border:1px solid #cdd3de;border-radius:5px;font-size:12px;height:26px}
.fb-chk-lbl{display:flex;align-items:center;gap:5px;font-size:12px;color:#374151;cursor:pointer;white-space:nowrap;user-select:none}
.fb-clear{padding:2px 10px;border-radius:5px;border:1px solid #f59e0b;background:#fff8ed;color:#b45309;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
.fb-save-btn{padding:2px 10px;border-radius:5px;border:1px solid #cdd3de;background:#fff;color:#374151;font-size:11px;cursor:pointer;white-space:nowrap}
.fb-del-btn{padding:2px 8px;border-radius:5px;border:1px solid #fecaca;background:#fff5f5;color:#dc2626;font-size:11px;cursor:pointer}
.filter-count{background:#f59e0b;color:#fff;border-radius:10px;font-size:10px;font-weight:700;padding:0 5px;min-width:16px;text-align:center;line-height:16px}
</style>
</head>
<body>

<!-- Auth screens -->
<div id="screen-login" class="screen" style="display:none">
  <div class="screen-card">
    <div class="screen-logo">🏗 Strada Schedule</div>
    <div class="screen-sub">Sign in to access the team schedule.</div>
    <label class="screen-lbl">Email</label>
    <input id="li-email" class="screen-inp" type="email" placeholder="you@yourcompany.com" />
    <label class="screen-lbl">Password</label>
    <input id="li-pass" class="screen-inp" type="password" placeholder="••••••••"
      onkeydown="if(event.key==='Enter')doSignIn()" />
    <button class="screen-btn" id="li-btn" onclick="doSignIn()">Sign In</button>
    <div class="screen-err" id="li-err"></div>
    <a class="screen-link" onclick="showForgot()">Forgot password?</a>
    <hr class="screen-divider">
    <div class="screen-note">Don't have an account? Ask your administrator to invite you.</div>
  </div>
</div>

<div id="screen-forgot" class="screen" style="display:none">
  <div class="screen-card">
    <div class="screen-logo">🏗 Strada Schedule</div>
    <div class="screen-sub">Enter your email and we'll send you a password reset link.</div>
    <label class="screen-lbl">Email</label>
    <input id="fp-email" class="screen-inp" type="email" placeholder="you@yourcompany.com" />
    <button class="screen-btn" id="fp-btn" onclick="doForgot()">Send Reset Link</button>
    <div class="screen-err" id="fp-msg"></div>
    <a class="screen-link" onclick="showLogin()">Back to sign in</a>
  </div>
</div>

<div id="screen-newpass" class="screen" style="display:none">
  <div class="screen-card">
    <div class="screen-logo">🏗 Strada Schedule</div>
    <div class="screen-sub" id="np-sub">Set a new password for your account.</div>
    <label class="screen-lbl">New Password</label>
    <input id="np-pass" class="screen-inp" type="password" placeholder="Minimum 6 characters" />
    <label class="screen-lbl">Confirm Password</label>
    <input id="np-pass2" class="screen-inp" type="password" placeholder="Repeat password"
      onkeydown="if(event.key==='Enter')doUpdatePass()" />
    <button class="screen-btn" id="np-btn" onclick="doUpdatePass()">Set Password</button>
    <div class="screen-err" id="np-err"></div>
  </div>
</div>

<!-- Main app -->
<div class="app" id="app" style="display:none">
  <div class="toolbar" id="toolbar"></div>
  <div id="filter-bar" class="filter-bar" style="display:none"></div>
  <div class="main" id="main"></div>
</div>

<!-- FIX CP1: Modal root is outside #main so main.innerHTML='' never destroys it -->
<div id="modal-root"></div>
<div class="toast-ctr" id="toasts"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

// FIX CP2/CP3: onAuthStateChange is the single routing authority after init.
// No _initComplete gate — we use a pendingUrlType variable instead.
let _pendingUrlType=null; // set before client creation, consumed once

function setupAuthListener(){
  sb.auth.onAuthStateChange(async(event,session)=>{
    // If we're currently on a set-password screen, ignore re-fires
    if(document.getElementById('screen-newpass').style.display==='flex')return;

    if(event==='PASSWORD_RECOVERY'){
      showNewPass('Enter a new password for your account.');
      return;
    }
    if(event==='SIGNED_IN'&&_pendingUrlType==='invite'){
      _pendingUrlType=null;
      showNewPass('Welcome! Set a password to complete your account setup.');
      return;
    }
    if(event==='SIGNED_IN'&&session?.user){
      // Normal sign-in — only enter app if we're on a login screen
      const onAuthScreen=AUTH_SCREENS.some(s=>document.getElementById('screen-'+s).style.display==='flex');
      if(onAuthScreen||!currentUser){
        await enterApp(session.user);
      }
      return;
    }
    if(event==='SIGNED_OUT'){
      currentUser=null;
      if(realtimeCh){realtimeCh.unsubscribe();realtimeCh=null}
      showLogin();
    }
  });
}

async function enterApp(user){
  currentUser=user;
  saveCfg({lastEmail:user.email});
  loadFilters();
  showApp();
  S.loading=true;render();
  try{await loadAll();}
  catch(e){console.error('loadAll failed:',e);toast('Failed to load data — check connection.','error');}
  S.loading=false;render();
  if(!realtimeCh)startRealtime();
}

async function doForgot(){

  const msgEl=document.getElementById('fp-msg');

  if(!email){msgEl.textContent='Please enter your email address.';return}

async function doUpdatePass(){
  const p1=document.getElementById('np-pass').value;
  const p2=document.getElementById('np-pass2').value;
  const errEl=document.getElementById('np-err');
  const btn=document.getElementById('np-btn');
  if(p1.length<6){errEl.textContent='Password must be at least 6 characters.';return}
  if(p1!==p2){errEl.textContent='Passwords do not match.';return}
  btn.disabled=true;btn.textContent='Setting password…';errEl.textContent='';

// ── HELPERS ───────────────────────────────────────────────────────────────────
const d2s=d=>d?d.toISOString().slice(0,10):null;
const s2d=s=>s?new Date(s+'T12:00:00'):null;
const dayOff=s=>{if(!s)return-1;return Math.round((s2d(s)-GS)/86400000)};
const offToS=i=>{const d=new Date(GS);d.setDate(d.getDate()+i);return d2s(d)};
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));

function workDays(segs,holDates,wknd){
  let n=0;
  (segs||[]).forEach(seg=>{
    if(!seg.s||!seg.e)return;
    let d=s2d(seg.s),e=s2d(seg.e);
    if(d>e)return; // guard against invalid ranges
    while(d<=e){const s=d2s(d),wd=d.getDay();if(wknd||(wd>0&&wd<6&&!holDates.includes(s)))n++;d.setDate(d.getDate()+1)}
  });
  return n;
}
function projSpan(tasks){let s=null,e=null;tasks.forEach(t=>(t.segs||[]).forEach(sg=>{if(sg.s&&(!s||sg.s<s))s=sg.s;if(sg.e&&(!e||sg.e>e))e=sg.e}));return{s,e}}
function getHolIdxs(){return ALL_DATES.reduce((a,d,i)=>{if(S.holidays.some(h=>h.date===d2s(d)))a.push(i);return a},[])}
function crewMap(){const m={};S.crews.forEach(c=>{m[c.name]=c});return m}
function projTasks(pid){return S.tasks.filter(t=>t.project_id===pid).sort((a,b)=>a.sort_order-b.sort_order)}

const el=tag=>document.createElement(tag);
function statusBadge(st){const c=ST_CLR[st]||'#6c757d',s=el('span');s.className='status-badge';s.style.cssText='background:'+c+'22;color:'+c+';border:1px solid '+c+'44';s.textContent=st;return s}
function iBtn(ico,fn,col){const b=el('button');b.className='icon-btn';b.style.color=col||'#555';b.innerHTML=ico;b.onclick=fn;return b}
function toast(msg,type){
  const tc=document.getElementById('toasts');const t=el('div');t.className='toast';t.textContent=msg;
  if(type==='error')t.style.background='#7f1d1d';tc.appendChild(t);
  requestAnimationFrame(()=>t.classList.add('show'));
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300)},3500);
}
function refreshToolbar(){const h=document.getElementById('toolbar');if(h){const n=buildToolbar();h.parentNode.replaceChild(n,h)}}
let bgGrad=null;
function buildBgGrad(holI){
  const all=[...new Set([...WDAY_IDXS,...holI])].sort((a,b)=>a-b);
  if(!all.length)return'';const parts=[];let prev=0;
  all.forEach(i=>{const l=i*DW,r=(i+1)*DW,isH=holI.includes(i);if(l>prev)parts.push('transparent '+prev+'px,transparent '+l+'px');const clr=isH?'rgba(220,53,69,.07)':'rgba(0,0,0,.04)';parts.push(clr+' '+l+'px,'+clr+' '+r+'px');prev=r});
  const tot=NDAYS*DW;if(prev<tot)parts.push('transparent '+prev+'px,transparent '+tot+'px');
  return'linear-gradient(to right,'+parts.join(',')+')'
}

// ── FILTER & SORT LOGIC ───────────────────────────────────────────────────────
function taskOverlapsRange(task,from,to){
  return (task.segs||[]).some(seg=>{
    if(!seg.s||!seg.e)return false;
    if(from&&seg.e<from)return false;
    if(to&&seg.s>to)return false;
    return true;
  });
}
function isFilterActive(){
  const f=S.filter;
  return f.crews.length>0||f.hideComplete||!!f.dateFrom||!!f.dateTo||f.sortBy!=='default';
}
function countActiveFilters(){
  const f=S.filter;
  let n=0;
  if(f.crews.length>0)n++;
  if(f.hideComplete)n++;
  if(f.dateFrom||f.dateTo)n++;
  if(f.sortBy!=='default')n++;
  return n;
}
function clearFilters(){
  S.filter={crews:[],hideComplete:false,dateFrom:null,dateTo:null,sortBy:'default'};
  saveFilters();
}
function applyFilters(){
  let projects=[...S.projects];
  const f=S.filter;
  // 1. Hide complete projects
  if(f.hideComplete)projects=projects.filter(p=>p.status!=='Complete');
  // 2. Crew filter — keep project if at least one task matches
  if(f.crews.length>0)projects=projects.filter(p=>projTasks(p.id).some(t=>f.crews.includes(t.crew)));
  // 3. Date range — keep project if at least one task overlaps range
  if(f.dateFrom||f.dateTo)projects=projects.filter(p=>projTasks(p.id).some(t=>taskOverlapsRange(t,f.dateFrom,f.dateTo)));
  // 4. Sort
  if(f.sortBy==='startDate'){
    projects=[...projects].sort((a,b)=>{
      const sa=projSpan(projTasks(a.id)).s||'9999-12-31';
      const sb=projSpan(projTasks(b.id)).s||'9999-12-31';
      return sa.localeCompare(sb);
    });
  }else if(f.sortBy==='client'){
    projects=[...projects].sort((a,b)=>a.client.localeCompare(b.client));
  }else if(f.sortBy==='jobNum'){
    projects=[...projects].sort((a,b)=>a.job_num.localeCompare(b.job_num));
  }
  // Build per-project visible task arrays (crew+date filter applied to tasks too)
  const visibleTasks={};
  projects.forEach(p=>{
    let tasks=projTasks(p.id);
    if(f.crews.length>0)tasks=tasks.filter(t=>f.crews.includes(t.crew));
    if(f.dateFrom||f.dateTo)tasks=tasks.filter(t=>taskOverlapsRange(t,f.dateFrom,f.dateTo));
    visibleTasks[p.id]=tasks;
  });
  return{projects,visibleTasks};
}

// ── FILTER BAR ────────────────────────────────────────────────────────────────
function mkSep(){const s=document.createElement('div');s.className='fb-sep';return s}

function buildFilterBar(){
  const bar=document.createElement('div');
  bar.id='filter-bar';
  bar.className='filter-bar'+(isFilterActive()?' active':'');

  // Only show on Gantt view
  if(S.view!=='gantt'||S.loading){bar.style.display='none';return bar}
  bar.style.display='flex';

  // ── Crew chips ─────────────────────────────────────────────────────────────
  const crewLbl=document.createElement('span');crewLbl.className='fb-label';crewLbl.textContent='Crew:';bar.appendChild(crewLbl);
  S.crews.forEach(crew=>{
    const btn=document.createElement('button');
    btn.className='fb-crew-btn '+(S.filter.crews.length===0||S.filter.crews.includes(crew.name)?'on':'off');
    btn.style.cssText='background:'+crew.color+';color:'+crew.tc+';border-color:'+crew.color;
    btn.textContent=crew.name;
    btn.title='Filter to '+crew.name+' only';
    btn.addEventListener('click',()=>{
      if(S.filter.crews.includes(crew.name)){
        S.filter.crews=S.filter.crews.filter(c=>c!==crew.name);
      }else{
        S.filter.crews=[...S.filter.crews,crew.name];
      }
      saveFilters();render();
    });
    bar.appendChild(btn);
  });

  bar.appendChild(mkSep());

  // ── Date range ──────────────────────────────────────────────────────────────
  const fromLbl=document.createElement('span');fromLbl.className='fb-label';fromLbl.textContent='From:';bar.appendChild(fromLbl);
  const fromI=document.createElement('input');fromI.type='date';fromI.className='fb-date';fromI.value=S.filter.dateFrom||'';
  fromI.onchange=e=>{S.filter.dateFrom=e.target.value||null;saveFilters();render()};bar.appendChild(fromI);
  const toLbl=document.createElement('span');toLbl.className='fb-label';toLbl.textContent='To:';bar.appendChild(toLbl);
  const toI=document.createElement('input');toI.type='date';toI.className='fb-date';toI.value=S.filter.dateTo||'';
  toI.onchange=e=>{S.filter.dateTo=e.target.value||null;saveFilters();render()};bar.appendChild(toI);

  bar.appendChild(mkSep());

  // ── Sort ────────────────────────────────────────────────────────────────────
  const sortLbl=document.createElement('span');sortLbl.className='fb-label';sortLbl.textContent='Sort:';bar.appendChild(sortLbl);
  const sortSel=document.createElement('select');sortSel.className='fb-sel';
  [['default','Default order'],['startDate','Start date'],['client','Client name'],['jobNum','Job #']].forEach(([v,t])=>{
    const o=document.createElement('option');o.value=v;o.textContent=t;if(v===S.filter.sortBy)o.selected=true;sortSel.appendChild(o);
  });
  sortSel.onchange=e=>{S.filter.sortBy=e.target.value;saveFilters();render()};bar.appendChild(sortSel);

  bar.appendChild(mkSep());

  // ── Hide complete ───────────────────────────────────────────────────────────
  const hcLbl=document.createElement('label');hcLbl.className='fb-chk-lbl';
  const hcCb=document.createElement('input');hcCb.type='checkbox';hcCb.checked=S.filter.hideComplete;
  hcCb.onchange=e=>{S.filter.hideComplete=e.target.checked;saveFilters();render()};
  hcLbl.appendChild(hcCb);hcLbl.appendChild(document.createTextNode('Hide Complete'));bar.appendChild(hcLbl);

  bar.appendChild(mkSep());

  // ── Presets ──────────────────────────────────────────────────────────────────
  const presLbl=document.createElement('span');presLbl.className='fb-label';presLbl.textContent='Preset:';bar.appendChild(presLbl);
  const presSel=document.createElement('select');presSel.className='fb-sel';
  const blankOpt=document.createElement('option');blankOpt.value='';blankOpt.textContent='— Select —';presSel.appendChild(blankOpt);
  S.presets.forEach(p=>{const o=document.createElement('option');o.value=p.id;o.textContent=p.name;presSel.appendChild(o)});
  // Track currently-selected preset id for delete button
  let _selPreset='';
  presSel.onchange=e=>{
    _selPreset=e.target.value;
    const preset=S.presets.find(p=>p.id===e.target.value);
    if(preset){S.filter={...preset.filter,crews:[...(preset.filter.crews||[])]};saveFilters();render()}
    else{presSel.value=''}
  };
  bar.appendChild(presSel);

  // Save preset button
  const saveBtn=document.createElement('button');saveBtn.className='fb-save-btn';saveBtn.textContent='💾 Save';
  saveBtn.title='Save current filters as a named preset';
  saveBtn.onclick=()=>{
    const name=prompt('Name this preset (e.g. "Phil\'s Week"):');
    if(!name||!name.trim())return;
    const preset={id:'p_'+Date.now(),name:name.trim(),filter:{...S.filter,crews:[...S.filter.crews]}};
    S.presets=[...S.presets,preset];
    saveFilters();render();
    toast('✓ Preset "'+preset.name+'" saved','ok');
  };
  bar.appendChild(saveBtn);

  // Delete preset button — only if we have presets
  if(S.presets.length>0){
    const delBtn=document.createElement('button');delBtn.className='fb-del-btn';delBtn.textContent='🗑';
    delBtn.title='Delete selected preset';
    delBtn.onclick=()=>{
      const cur=presSel.value;
      if(!cur){toast('Select a preset to delete first','error');return}
      const preset=S.presets.find(p=>p.id===cur);
      if(!preset)return;
      if(!confirm('Delete preset "'+preset.name+'"?'))return;
      S.presets=S.presets.filter(p=>p.id!==cur);
      saveFilters();render();
    };
    bar.appendChild(delBtn);
  }

  // ── Active filter count + clear ─────────────────────────────────────────────
  if(isFilterActive()){
    const n=countActiveFilters();
    const badge=document.createElement('span');badge.className='filter-count';badge.textContent=n;bar.appendChild(badge);
    const clrBtn=document.createElement('button');clrBtn.className='fb-clear';clrBtn.textContent='✕ Clear all';
    clrBtn.onclick=()=>{clearFilters();render()};bar.appendChild(clrBtn);
  }

  return bar;
}

// ── DRAG ──────────────────────────────────────────────────────────────────────
let drag=null;
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  const delta=Math.round((e.clientX-drag.startX)/DW);if(delta===drag.lastDelta)return;drag.lastDelta=delta;
  const si=dayOff(drag.origS),ei=dayOff(drag.origE);let ns=drag.origS,ne=drag.origE;
  if(drag.type==='move'){ns=offToS(clamp(si+delta,0,NDAYS-1));ne=offToS(clamp(ei+delta,0,NDAYS-1))}
  else if(drag.type==='left')ns=offToS(clamp(si+delta,0,ei));
  else ne=offToS(clamp(ei+delta,si,NDAYS-1));
  S.tasks=S.tasks.map(t=>t.id!==drag.taskId?t:{...t,segs:t.segs.map((sg,i)=>i!==drag.si?sg:{s:ns,e:ne})});
  refreshGanttRows();
});
window.addEventListener('mouseup',()=>{
  if(!drag)return;document.body.style.cursor='';
  const task=S.tasks.find(t=>t.id===drag.taskId);if(task)upsertTask(task);drag=null;
});

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const toolbar=document.getElementById('toolbar');const main=document.getElementById('main');
  if(!toolbar||!main)return;
  saveScroll(); // FIX CP4: capture before DOM change
  toolbar.parentNode.replaceChild(buildToolbar(),toolbar);
  // Rebuild filter bar (Phase 2)
  const fb=document.getElementById('filter-bar');
  if(fb){const nfb=buildFilterBar();fb.parentNode.replaceChild(nfb,fb)}
  if(S.loading){
    main.innerHTML='';
    const ls=document.createElement('div');ls.className='loading-screen';
    const sp=document.createElement('div');sp.className='spinner';
    const lb=document.createElement('div');lb.textContent='Loading schedule…';
    ls.appendChild(sp);ls.appendChild(lb);main.appendChild(ls);
    return;
  }
  main.innerHTML='';
  bgGrad=buildBgGrad(getHolIdxs());
  if(S.view==='gantt')main.appendChild(buildGantt());
  else if(S.view==='board')main.appendChild(buildBoard());
  else main.appendChild(buildSettings());
  restoreScroll(); // FIX CP4: apply after new DOM is attached
  // Modal renders into its own root — call after main render
  if(S.modal)openModal();else document.getElementById('modal-root').innerHTML='';
}

function refreshGanttRows(){
  // FIX CP4: explicit scroll save/restore on gantt-only refresh
  const old=document.querySelector('.gantt-wrap');if(!old)return;
  const sl=old.scrollLeft,st=old.scrollTop;
  const ng=buildGantt();old.parentNode.replaceChild(ng,old);
  ng.scrollLeft=sl;ng.scrollTop=st;
}

    const b=el('button');b.className='tab'+(S.view===v?' active':'');b.textContent=l;
    b.onclick=()=>{S.view=v;render()};tabs.appendChild(b);
  });t.appendChild(tabs);
  const sp=el('div');sp.className='spacer';t.appendChild(sp);
  const addBtn=el('button');addBtn.className='btn-primary';addBtn.style.fontSize='12px';addBtn.textContent='+ Project';
  addBtn.onclick=()=>{
    S.modal={type:'proj',isNew:true,p:{id:uid(),job_num:'',client:'',loc:'',loc_exp:'',status:'Not started',collapsed:false,sort_order:S.projects.length}};
    openModal();
  };t.appendChild(addBtn);
  if(currentUser){
    const pill=el('div');pill.className='user-pill';
    const av=el('div');av.className='user-av';av.textContent=(currentUser.email||'?').slice(0,2).toUpperCase();pill.appendChild(av);
    const em=el('span');em.className='user-email';em.textContent=currentUser.email;pill.appendChild(em);
    t.appendChild(pill);
    const lo=el('button');lo.className='logout-btn';lo.textContent='Sign Out';lo.onclick=doSignOut;t.appendChild(lo);

  return t;
}

// ── GANTT ─────────────────────────────────────────────────────────────────────
function buildGantt(){
  const totalW=NDAYS*DW,holI=getHolIdxs(),cm=crewMap(),holDates=S.holidays.map(h=>h.date);
  const wrap=el('div');wrap.className='gantt-wrap';

  // Empty state — no projects at all
  if(S.projects.length===0){
    const es=el('div');es.className='empty-state';
    const ico=el('div');ico.className='empty-state-icon';ico.textContent='📋';es.appendChild(ico);
    const title=el('div');title.className='empty-state-title';title.textContent='No projects yet';es.appendChild(title);
    const body=el('div');body.className='empty-state-body';
    body.textContent='The schedule is empty. Load the 41 sample projects from the 2026 job board, or create your first project using the + Project button above.';es.appendChild(body);
    const btn=el('button');btn.className='empty-state-btn';btn.textContent='🌱 Load Sample Data';btn.onclick=seedData;es.appendChild(btn);
    wrap.appendChild(es);return wrap;
  }

  // Apply filters & sort (Phase 2)
  const{projects:visProjs,visibleTasks}=applyFilters();
  const totalProjCount=S.projects.length;

  // Empty state — filters produced no results
  if(visProjs.length===0){
    const es=el('div');es.className='empty-state';
    const ico=el('div');ico.className='empty-state-icon';ico.textContent='🔍';es.appendChild(ico);
    const title=el('div');title.className='empty-state-title';title.textContent='No projects match the active filters';es.appendChild(title);
    const body=el('div');body.className='empty-state-body';
    body.textContent='Try adjusting or removing your crew, date, or status filters to see more projects.';es.appendChild(body);
    const btn=el('button');btn.className='empty-state-btn';btn.textContent='✕ Clear all filters';
    btn.onclick=()=>{clearFilters();render()};es.appendChild(btn);
    wrap.appendChild(es);return wrap;
  }

  const flatRows=[];
  visProjs.forEach(proj=>{
    flatRows.push({type:'proj',proj});
    if(!proj.collapsed)(visibleTasks[proj.id]||[]).forEach(task=>flatRows.push({type:'task',proj,task}));
  });

  // Header
  const hdr=el('div');hdr.className='gantt-hdr';
  const corner=el('div');corner.className='corner';corner.style.cssText='width:'+LW+'px;height:43px';
  const ci=el('span');ci.style.cssText='color:rgba(255,255,255,.4);font-size:11px';
  const filteredInfo=isFilterActive()
    ?visProjs.length+' of '+totalProjCount+' jobs (filtered)'
    :flatRows.length+' rows · '+totalProjCount+' jobs';
  ci.textContent=filteredInfo;corner.appendChild(ci);hdr.appendChild(corner);
  const calw=el('div');calw.className='cal-wrap';calw.style.width=totalW+'px';
  const mr=el('div');mr.className='month-row';
  MONTH_BANDS.forEach(m=>{const mc=el('div');mc.className='mc';mc.style.cssText='width:'+m.n*DW+'px;height:18px;background:'+m.c;mc.textContent=m.l;mr.appendChild(mc)});calw.appendChild(mr);
  const dr=el('div');dr.className='day-row';
  ALL_DATES.forEach((d,i)=>{
    const wk=WDAY_IDXS.includes(i),hl=holI.includes(i),tod=i===TODAYIDX;
    const dc=el('div');dc.className='dc';dc.style.cssText='width:'+DW+'px;height:15px;background:'+(tod?'#FFD700':hl?'#ffb3b3':wk?'#b8bcc8':'#2a4a80');
    dc.style.color=tod?'#333':'#fff';if(tod||wk)dc.style.fontWeight='700';dc.textContent=d.getDate();dr.appendChild(dc);
  });calw.appendChild(dr);
  const wr=el('div');wr.className='wd-row';
  ALL_DATES.forEach((d,i)=>{
    const wk=WDAY_IDXS.includes(i);const wc=el('div');wc.className='wc';
    wc.style.cssText='width:'+DW+'px;height:10px;background:'+(wk?'#9a9ea8':'#1a3a6a');
    wc.style.color=wk?'#555':'rgba(255,255,255,.5)';wc.textContent='SMTWTFS'[d.getDay()];wr.appendChild(wc);
  });calw.appendChild(wr);hdr.appendChild(calw);wrap.appendChild(hdr);

  flatRows.forEach((row,ri)=>{
    const isP=row.type==='proj';const h=isP?PH:RH;
    const g=el('div');g.className='g-row '+(isP?'proj-row':'task-row task-'+(ri%2===0?'even':'odd'));g.style.height=h+'px';
    const lc=el('div');lc.className='lc';lc.style.cssText='width:'+LW+'px;height:'+h+'px';
    if(isP){
      lc.appendChild(iBtn(row.proj.collapsed?'▶':'▼',()=>{
        const up={...row.proj,collapsed:!row.proj.collapsed};
        S.projects=S.projects.map(p=>p.id===row.proj.id?up:p);
        upsertProject(up);render();
      },'rgba(255,255,255,.7)'));
      const info=el('div');info.style.cssText='flex:1;overflow:hidden;min-width:0;margin:0 6px';
      const top=el('div');top.style.cssText='display:flex;align-items:center;gap:5px;overflow:hidden';
      const jn=el('span');jn.style.cssText='color:rgba(255,255,255,.6);font-size:11px;font-weight:700;flex-shrink:0';jn.textContent=row.proj.job_num;top.appendChild(jn);
      const cl=el('span');cl.style.cssText='color:#fff;font-weight:700;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';cl.textContent=row.proj.client;top.appendChild(cl);
      info.appendChild(top);
      const bl=el('div');bl.style.cssText='color:rgba(255,255,255,.5);font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';bl.textContent=row.proj.loc;info.appendChild(bl);
      lc.appendChild(info);lc.appendChild(statusBadge(row.proj.status));
      const btns=el('div');btns.style.cssText='display:flex;gap:3px;flex-shrink:0;margin-left:4px';
      btns.appendChild(iBtn('+',()=>{
        const t={id:uid(),project_id:row.proj.id,descr:'',crew:'',status:row.proj.status,wknd:false,sort_order:projTasks(row.proj.id).length,segs:[{s:null,e:null},{s:null,e:null},{s:null,e:null}]};
        S.modal={type:'task',t};openModal();
      },'rgba(255,255,255,.7)'));
      btns.appendChild(iBtn('✎',()=>{S.modal={type:'proj',isNew:false,p:{...row.proj}};openModal()},'rgba(255,255,255,.7)'));
      lc.appendChild(btns);
    } else {
      const crew=cm[row.task.crew];const wd=workDays(row.task.segs,holDates,row.task.wknd);
      lc.style.paddingLeft='22px';
      const arr=el('span');arr.style.cssText='color:#bbb;font-size:11px;flex-shrink:0;margin-right:4px';arr.textContent='↳';lc.appendChild(arr);
      const desc=el('span');desc.style.cssText='flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;color:#1a2b4a';desc.textContent=row.task.descr;lc.appendChild(desc);
      if(crew){const cb=el('span');cb.className='crew-badge';cb.style.cssText='background:'+crew.color+';color:'+crew.tc+';margin:0 4px';cb.textContent=crew.name;lc.appendChild(cb)}
      if(wd>0){const wds=el('span');wds.style.cssText='color:#555;font-size:11px;flex-shrink:0;min-width:26px;text-align:right';wds.textContent=wd+'d';lc.appendChild(wds)}
      lc.appendChild(iBtn('✎',()=>{S.modal={type:'task',t:{...row.task,segs:row.task.segs.map(s=>({'s':s.s,'e':s.e})) }};openModal()},'#999'));
    }
    g.appendChild(lc);
    const gc=el('div');gc.className='gc';gc.style.cssText='width:'+totalW+'px;height:'+h+'px';
    if(bgGrad)gc.style.backgroundImage=bgGrad;
    if(TODAYIDX>=0&&TODAYIDX<NDAYS){const tl=el('div');tl.className='today-line';tl.style.cssText='left:'+(TODAYIDX*DW+DW/2)+'px;height:'+h+'px';gc.appendChild(tl)}
    if(isP){
      const sp=projSpan(projTasks(row.proj.id));
      if(sp.s&&sp.e){const sb2=el('div');sb2.className='proj-span';sb2.style.cssText='left:'+dayOff(sp.s)*DW+'px;width:'+(dayOff(sp.e)-dayOff(sp.s)+1)*DW+'px;top:50%;transform:translateY(-50%);height:6px';gc.appendChild(sb2)}
    } else {
      const crew=cm[row.task.crew];const color=crew?crew.color:'#aaa';
      row.task.segs.forEach((seg,si)=>{
        if(!seg.s||!seg.e)return;
        const sIdx=dayOff(seg.s),eIdx=dayOff(seg.e);
        if(sIdx<0||eIdx<0||sIdx>NDAYS-1||eIdx>NDAYS-1||sIdx>eIdx)return;
        const bT=3,bH=h-6;const ranges=[];let rs=null,re=null;
        for(let i=Math.max(0,sIdx);i<=Math.min(NDAYS-1,eIdx);i++){
          const skip=!row.task.wknd&&(WDAY_IDXS.includes(i)||holI.includes(i));
          if(!skip){if(rs===null)rs=i;re=i}else{if(rs!==null){ranges.push([rs,re]);rs=re=null}}
        }
        if(rs!==null)ranges.push([rs,re]);
        ranges.forEach(([a,b],ri2)=>{
          const bd=el('div');bd.className='bar-seg';
          const br=(ri2===0&&a===sIdx?'3px':'0')+' '+(ri2===ranges.length-1&&b===eIdx?'3px':'0')+' '+(ri2===ranges.length-1&&b===eIdx?'3px':'0')+' '+(ri2===0&&a===sIdx?'3px':'0');
          bd.style.cssText='left:'+a*DW+'px;width:'+(b-a+1)*DW+'px;top:'+bT+'px;height:'+bH+'px;background:'+color+';border-radius:'+br+';opacity:'+(si===0?1:.75);
          gc.appendChild(bd);
        });
        const ov=el('div');ov.className='bar-hit';
        ov.style.cssText='left:'+sIdx*DW+'px;width:'+(eIdx-sIdx+1)*DW+'px;top:'+bT+'px;height:'+bH+'px;border-left:2px solid '+color+'cc;border-right:2px solid '+color+'cc';
        ov.title=row.task.descr+'\n'+seg.s+' → '+seg.e;
        ov.addEventListener('mousedown',e=>{
          e.preventDefault();e.stopPropagation();
          const rect=ov.getBoundingClientRect();const lx=e.clientX-rect.left,rw=rect.width;
          const type=lx<10?'left':lx>rw-10?'right':'move';
          drag={taskId:row.task.id,si,type,startX:e.clientX,lastDelta:0,origS:seg.s,origE:seg.e};
          document.body.style.cursor=type==='move'?'grabbing':'ew-resize';
        });
        gc.appendChild(ov);
      });
    }
    g.appendChild(gc);wrap.appendChild(g);
  });
  const spacer=el('div');spacer.style.height='60px';wrap.appendChild(spacer);
  return wrap;
}

// ── BOARD ─────────────────────────────────────────────────────────────────────
function buildBoard(){
  // FIX CP4/board search: wrap is stable; only columns div gets rebuilt on search
  const wrap=el('div');wrap.className='board-wrap';
  const tb=el('div');tb.style.cssText='display:flex;gap:10px;align-items:center;margin-bottom:14px';
  const si=el('input');si.className='inp';si.style.cssText='width:220px;font-size:13px';
  si.placeholder='Search projects…';si.value=S.boardSearch||'';
  const cnt=el('span');cnt.style.cssText='color:#666;font-size:12px';tb.appendChild(si);tb.appendChild(cnt);
  wrap.appendChild(tb);
  const cols=el('div');cols.className='board-cols';wrap.appendChild(cols);
  const rebuildCols=()=>buildBoardCols(cols,cnt);
  si.addEventListener('input',e=>{S.boardSearch=e.target.value;rebuildCols()}); // no full render
  rebuildCols();
  return wrap;
}
function buildBoardCols(cols,cnt){
  const cm=crewMap();const q=(S.boardSearch||'').toLowerCase();
  const filtered=q?S.projects.filter(p=>(p.job_num+p.client+p.loc).toLowerCase().includes(q)):S.projects;
  cnt.textContent=filtered.length+' of '+S.projects.length+' projects';
  cols.innerHTML='';
  const grouped={};ST_OPTS.forEach(s=>{grouped[s]=[]});
  filtered.forEach(p=>{(grouped[p.status]||(grouped['Not started'])).push(p)});
  ST_OPTS.forEach(st=>{
    const c=ST_CLR[st];const col=el('div');col.className='board-col';
    const hdr=el('div');hdr.className='board-col-hdr';hdr.style.cssText='background:'+c+'18;border:1px solid '+c+'33';
    const dot=el('div');dot.style.cssText='width:10px;height:10px;border-radius:50%;background:'+c+';flex-shrink:0';hdr.appendChild(dot);
    const sl=el('span');sl.style.cssText='font-weight:700;font-size:12px;color:'+c;sl.textContent=st;hdr.appendChild(sl);
    const cn=el('span');cn.style.cssText='margin-left:auto;background:'+c+';color:#fff;border-radius:10px;font-size:11px;padding:0 6px;font-weight:700';cn.textContent=grouped[st].length;hdr.appendChild(cn);col.appendChild(hdr);
    if(grouped[st].length===0&&!q){
      const emp=el('div');emp.style.cssText='color:#bbb;font-size:12px;text-align:center;padding:20px 8px';emp.textContent='No projects';col.appendChild(emp);
    }
    grouped[st].forEach(p=>{
      const card=el('div');card.className='board-card';
      card.onclick=()=>{S.modal={type:'proj',isNew:false,p:{...p}};openModal()};
      const top=el('div');top.style.cssText='display:flex;justify-content:space-between;align-items:flex-start;gap:4px;margin-bottom:3px';
      const jn=el('span');jn.style.cssText='font-weight:700;font-size:11px;color:#1F3864';jn.textContent=p.job_num;top.appendChild(jn);
      top.appendChild(statusBadge(p.status));card.appendChild(top);
      const cl=el('div');cl.style.cssText='font-weight:700;font-size:12px;color:#222;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:1px';cl.textContent=p.client;card.appendChild(cl);
      const lo=el('div');lo.style.cssText='font-size:11px;color:#666;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:6px';lo.textContent=p.loc;card.appendChild(lo);
      const crd=el('div');crd.style.cssText='display:flex;flex-wrap:wrap;gap:3px';
      [...new Set(projTasks(p.id).map(t=>t.crew).filter(Boolean))].forEach(cn2=>{const cr=cm[cn2];if(cr){const cb=el('span');cb.className='crew-badge';cb.style.cssText='background:'+cr.color+';color:'+cr.tc;cb.textContent=cr.name;crd.appendChild(cb)}});
      card.appendChild(crd);
      const tl=el('div');tl.style.cssText='font-size:11px;color:#888;margin-top:4px';
      tl.textContent=projTasks(p.id).length+' task'+(projTasks(p.id).length!==1?'s':'');card.appendChild(tl);
      col.appendChild(card);
    });
    cols.appendChild(col);

function buildDataPanel(){
  const d=el('div');

  seedBtn.textContent='🌱 Load Sample Data (41 projects)';seedBtn.onclick=seedData;

  const expBtn=el('button');expBtn.className='btn-primary';expBtn.style.fontSize='12px';expBtn.textContent='⬇ Export JSON backup';
  expBtn.onclick=()=>{
    const blob=new Blob([JSON.stringify({projects:S.projects,tasks:S.tasks,crews:S.crews,holidays:S.holidays},null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='strada_backup_'+TODAY+'.json';a.click();
  };
  card('Export backup','Download all current data as a JSON file.',[expBtn]);
  const fi=el('input');fi.type='file';fi.accept='.json';fi.style.display='none';
  fi.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=async ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.projects)throw new Error('Invalid file format');
        if(!confirm('This will replace all data. Continue?'))return;
        S.syncing=true;refreshToolbar();
        if(data.crews?.length)await sb.from('crews').upsert(data.crews);
        if(data.holidays?.length)await sb.from('holidays').upsert(data.holidays);
        if(data.projects?.length)for(let i=0;i<data.projects.length;i+=20)await sb.from('projects').upsert(data.projects.slice(i,i+20));
        if(data.tasks?.length)for(let i=0;i<data.tasks.length;i+=50)await sb.from('tasks').upsert(data.tasks.map(appTaskToDB).slice(i,i+50));
        await loadAll();toast('✓ Import complete','ok');render();
      }catch(err){toast('⚠ Import failed: '+err.message,'error')}
      S.syncing=false;refreshToolbar();
    };r.readAsText(f);
  };
  const impBtn=el('button');impBtn.className='btn-sec';impBtn.style.fontSize='12px';impBtn.textContent='⬆ Import JSON';impBtn.onclick=()=>fi.click();
  card('Import & Restore','Restore from a JSON backup file.',[fi,impBtn]);
  return d;
}

function mhdr(m,title){

function lbl2(t){const l=el('label');l.className='lbl';l.textContent=t;return l}
function inp2(val,fn,type,opts){
  const i=el(type==='select'?'select':'input');i.className='inp';
  if(type==='select'){(opts||[]).forEach(([v,t])=>{const o=el('option');o.value=v;o.textContent=t;if(v===val)o.selected=true;i.appendChild(o)})}
  else{if(type)i.type=type;i.value=val||'';if(type==='date'){i.min='2026-01-01';i.max='2026-12-31'}}
  if(fn){i.onchange=fn;i.oninput=fn}return i;
}

function buildTaskModal(m){
  const t=S.modal.t;
  const holDates=S.holidays.map(h=>h.date);
  mhdr(m,'Edit Task');
  const g=el('div');g.className='fg';
  const dw=el('div');dw.className='fg-full';dw.appendChild(lbl2('Description'));dw.appendChild(inp2(t.descr,e=>{t.descr=e.target.value}));g.appendChild(dw);
  const crw=el('div');crw.appendChild(lbl2('Crew'));crw.appendChild(inp2(t.crew,e=>{t.crew=e.target.value},'select',[['','— Unassigned —'],...S.crews.map(c=>[c.name,c.name])]));g.appendChild(crw);
  const stw=el('div');stw.appendChild(lbl2('Status'));stw.appendChild(inp2(t.status,e=>{t.status=e.target.value},'select',ST_OPTS.map(s=>[s,s])));g.appendChild(stw);
  const ww=el('div');ww.className='fg-full';ww.style.marginTop='8px';
  const wl=el('label');wl.style.cssText='display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:#444';
  const cb=el('input');cb.type='checkbox';cb.checked=t.wknd;cb.onchange=e=>{t.wknd=e.target.checked;renderSegs()};
  wl.appendChild(cb);wl.appendChild(document.createTextNode('Include weekends & holidays in Work Days'));ww.appendChild(wl);g.appendChild(ww);
  m.appendChild(g);
  const segsDiv=el('div');segsDiv.style.marginTop='12px';
  const segLabels=['Primary dates','Return 1 (optional)','Return 2 (optional)'];
  const segCls=['seg0','seg1','seg2'];const segC=['#1F3864','#8B4513','#1a6b3a'];
  const wdDiv=el('div');
  function renderSegs(){
    segsDiv.innerHTML='';
    t.segs.forEach((seg,si)=>{
      const box=el('div');box.className='seg-box '+segCls[si];
      const sl=el('div');sl.style.cssText='font-weight:700;font-size:11px;margin-bottom:6px;color:'+segC[si];sl.textContent=segLabels[si];box.appendChild(sl);
      const sg=el('div');sg.className='seg-grid';sg.style.alignItems='flex-start';
      // Start date column
      const sw2=el('div');sw2.style.flex='1';sw2.appendChild(lbl2('Start'));
      const startInp=inp2(seg.s||'',e=>{t.segs=t.segs.map((x,i)=>i===si?{...x,s:e.target.value||null}:x);renderWd();validateDates(si)},'date');
      sw2.appendChild(startInp);sg.appendChild(sw2);
      // End date column with FIX CP5: validation
      const ew=el('div');ew.style.flex='1';ew.appendChild(lbl2('End'));
      const endInp=inp2(seg.e||'',e=>{t.segs=t.segs.map((x,i)=>i===si?{...x,e:e.target.value||null}:x);renderWd();validateDates(si)},'date');
      ew.appendChild(endInp);
      const dateErr=el('div');dateErr.className='field-err';ew.appendChild(dateErr);
      sg.appendChild(ew);
      // FIX CP5: validate on load too
      function validateDates(segIdx){
        const s=t.segs[segIdx].s,ee=t.segs[segIdx].e;
        if(s&&ee&&ee<s){endInp.classList.add('inp-err');dateErr.textContent='End date must be on or after start date.'}
        else{endInp.classList.remove('inp-err');dateErr.textContent=''}
      }
      if(seg.s&&seg.e&&seg.e<seg.s){endInp.classList.add('inp-err');dateErr.textContent='End date must be on or after start date.'}
      // Work days display
      if(seg.s&&seg.e&&seg.e>=seg.s){
        const wn=el('div');wn.style.cssText='text-align:center;min-width:46px;padding-top:18px';
        const wll=el('div');wll.style.cssText='font-size:10px;color:#888';wll.textContent='Days';wn.appendChild(wll);
        const wv=el('div');wv.style.cssText='font-size:16px;font-weight:700;color:#1F3864';wv.textContent=workDays([seg],holDates,t.wknd);wn.appendChild(wv);
        sg.appendChild(wn);
      }
      if(si>0){
        const cl=el('button');cl.style.cssText='color:#999;background:none;border:none;cursor:pointer;font-size:14px;padding:0;margin-top:18px';
        cl.textContent='×';cl.onclick=()=>{t.segs=t.segs.map((x,i)=>i===si?{s:null,e:null}:x);renderSegs()};sg.appendChild(cl);
      }
      box.appendChild(sg);segsDiv.appendChild(box);
    });renderWd();
  }
  function renderWd(){
    // Only count segments where end >= start
    const validSegs=t.segs.filter(seg=>seg.s&&seg.e&&seg.e>=seg.s);
    const wd=workDays(validSegs,holDates,t.wknd);
    if(wd>0){wdDiv.className='wd-total';wdDiv.textContent='Total work days: '+wd}
    else{wdDiv.className='';wdDiv.textContent=''}
  }
  renderSegs();m.appendChild(segsDiv);m.appendChild(wdDiv);
  const delBtn=(()=>{const b=el('button');b.className='btn-danger';b.textContent='Delete Task';
    b.onclick=async()=>{if(confirm('Delete this task?')){await deleteTask(t.id);S.tasks=S.tasks.filter(x=>x.id!==t.id);closeModal();render()}};return b})();
  mkFooter(m,delBtn,async()=>{
    // FIX CP5: block save if any segment has end < start
    const invalid=t.segs.some(seg=>seg.s&&seg.e&&seg.e<seg.s);
    if(invalid){toast('⚠ Fix date errors before saving.','error');return}
    closeModal();
    if(S.tasks.find(x=>x.id===t.id))S.tasks=S.tasks.map(x=>x.id===t.id?t:x);
    else S.tasks=[...S.tasks,t];
    render();await upsertTask(t);
  });
}

    // Step 6: Route based on what we found.
    if(_pendingUrlType==='invite'&&session){
      _pendingUrlType=null;
      showNewPass('Welcome! Set a password to complete your account setup.');
    }else if(_pendingUrlType==='recovery'&&session){
      _pendingUrlType=null;
      showNewPass('Enter a new password for your account.');
    }else if(session?.user){
      _pendingUrlType=null;
      await enterApp(session.user);
    }else{
      _pendingUrlType=null;
      showLogin();
    }
  }catch(e){
    console.error('Init failed:',e);
    showLogin();
  }
})();
</script>
</body>
