// ── DAILY FIELD REPORT MODAL (M6) ────────────────────────────────────────────
// S.modal = {type:'field-report', report:{...}, isNew:bool, localEntries:[...]}
function buildFieldReportModal(m){
  const ms=S.modal;const r=ms.report;
  mhdr(m,(ms.isNew?'New Field Report':'Field Report — ')+fmtDateLong(r.report_date));

  // ── Section 1: Report Header ───────────────────────────────────────────────
  const sec1=el('div');sec1.style.cssText='background:#f8f9fc;border-radius:7px;padding:12px;margin-bottom:12px';
  const s1l=el('p');s1l.style.cssText='font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px';
  s1l.textContent='Report Details';sec1.appendChild(s1l);
  const g1=el('div');g1.className='fg';

  // Project
  const projW=el('div');projW.className='fg-full';projW.appendChild(lbl2('Project'));
  const projSel=inp2(r.project_id||'',e=>{
    r.project_id=e.target.value||null;
    // Auto-populate crew when project changes (only for new reports with no entries yet)
    if(ms.isNew&&ms.localEntries.length===0&&r.project_id&&r.report_date){
      ms.localEntries=crewOnDate(r.project_id,r.report_date).map(empId=>({
        id:crypto.randomUUID(),report_id:r.id,employee_id:empId,hours:8,entry_type:'labour',
      }));
      renderEntries();
    }
  },'select',[['','— Select project —'],...S.projects.filter(p=>!p.archived).map(p=>[p.id,p.job_num+' — '+p.client])]);
  projW.appendChild(projSel);g1.appendChild(projW);

  // Date + Supervisor
  const dW=el('div');dW.appendChild(lbl2('Report Date'));
  const dInp=inp2(r.report_date||TODAY,e=>{r.report_date=e.target.value},'date');dW.appendChild(dInp);g1.appendChild(dW);
  const supW=el('div');supW.appendChild(lbl2('Site Supervisor'));
  supW.appendChild(inp2(r.supervisor_employee_id||'',e=>{r.supervisor_employee_id=e.target.value||null},'select',
    [['','— Select —'],...activeEmployees().map(e=>[e.id,e.name])]));g1.appendChild(supW);

  // Status
  const stW=el('div');stW.appendChild(lbl2('Status'));
  stW.appendChild(inp2(r.status||'draft',e=>{r.status=e.target.value},'select',
    [['draft','Draft'],['submitted','Submitted']]));g1.appendChild(stW);
  sec1.appendChild(g1);

  // Weather row — icon toggle buttons
  const wRow=el('div');wRow.style.cssText='margin-top:10px';wRow.appendChild(lbl2('Weather Conditions'));
  const wBtns=el('div');wBtns.style.cssText='display:flex;flex-wrap:wrap;gap:6px;margin-top:4px';
  WEATHER_OPTS.forEach(w=>{
    const btn=el('button');btn.className='weather-btn'+(r.weather===w?' active':'');
    btn.textContent=w;
    btn.onclick=()=>{
      r.weather=r.weather===w?'':w; // toggle off if already selected
      wBtns.querySelectorAll('.weather-btn').forEach(b=>b.classList.toggle('active',b.textContent===r.weather));
    };
    wBtns.appendChild(btn);
  });
  wRow.appendChild(wBtns);
  // Temperature
  const tmpRow=el('div');tmpRow.style.cssText='display:flex;align-items:center;gap:8px;margin-top:8px';
  tmpRow.appendChild(lbl2('Temp (°C)'));
  const tmpInp=el('input');tmpInp.type='number';tmpInp.className='inp';tmpInp.style.cssText='width:80px';
  tmpInp.value=r.temp_celsius!=null?r.temp_celsius:'';
  tmpInp.placeholder='e.g. 18';tmpInp.oninput=e=>{r.temp_celsius=e.target.value!==''?parseInt(e.target.value):null};
  tmpRow.appendChild(tmpInp);wRow.appendChild(tmpRow);
  sec1.appendChild(wRow);m.appendChild(sec1);

  // ── Section 2: Crew Hours ──────────────────────────────────────────────────
  const sec2=el('div');sec2.style.cssText='background:#f0f4ff;border:1px solid #c5d0e8;border-radius:7px;padding:12px;margin-bottom:12px';
  const s2hdr=el('div');s2hdr.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:8px';
  const s2l=el('p');s2l.style.cssText='font-size:10px;font-weight:700;color:#1F3864;text-transform:uppercase;letter-spacing:.5px;margin:0';
  s2l.textContent='Crew Hours (feeds job costing)';
  const addEntryBtn=el('button');addEntryBtn.className='btn-sm';addEntryBtn.style.fontSize='11px';addEntryBtn.textContent='+ Add Person';
  s2hdr.appendChild(s2l);s2hdr.appendChild(addEntryBtn);sec2.appendChild(s2hdr);

  // Auto-populate note
  if(ms.isNew&&ms.localEntries.length>0){
    const note=el('div');note.style.cssText='font-size:11px;color:#1F3864;background:#dbeafe;border-radius:4px;padding:4px 8px;margin-bottom:8px';
    note.textContent='✓ Crew auto-populated from the Gantt schedule for this date.';sec2.appendChild(note);
  }

  const entryList=el('div');sec2.appendChild(entryList);
  // Hours summary
  const hrsSummary=el('div');hrsSummary.style.cssText='margin-top:8px;font-size:12px;font-weight:700;color:#1F3864;text-align:right';sec2.appendChild(hrsSummary);

  function renderEntries(){
    entryList.innerHTML='';
    if(!ms.localEntries.length){
      const none=el('div');none.style.cssText='color:#9ca3af;font-size:12px;text-align:center;padding:8px 0';
      none.textContent='No crew on report yet — click + Add Person or select a project to auto-populate.';
      entryList.appendChild(none);hrsSummary.textContent='';return;
    }
    ms.localEntries.forEach((entry,ei)=>{
      const row=el('div');row.className='fr-entry-row';
      // Employee select
      const empSel=inp2(entry.employee_id||'',e=>{entry.employee_id=e.target.value||null},'select',
        [['','— Select employee —'],...activeEmployees().map(e=>[e.id,e.name])]);
      empSel.style.cssText='flex:1;font-size:11px;min-width:120px';row.appendChild(empSel);
      // Hours
      const hrsInp=el('input');hrsInp.type='number';hrsInp.className='inp';
      hrsInp.style.cssText='width:64px;font-size:11px';hrsInp.min='0';hrsInp.max='24';hrsInp.step='0.5';
      hrsInp.value=entry.hours!=null?entry.hours:'';
      hrsInp.placeholder='hrs';
      hrsInp.oninput=e=>{entry.hours=e.target.value!==''?parseFloat(e.target.value):0;updateHrsSummary()};
      row.appendChild(hrsInp);
      // Hrs label
      const hLbl=el('span');hLbl.style.cssText='font-size:11px;color:#6b7280;flex-shrink:0';hLbl.textContent='hrs';row.appendChild(hLbl);
      // Entry type
      const typeSel=inp2(entry.entry_type||'labour',e=>{entry.entry_type=e.target.value},'select',
        [['labour','Labour'],['equipment','Equipment']]);
      typeSel.style.cssText='width:90px;font-size:11px';row.appendChild(typeSel);
      // Delete
      const delB=el('button');delB.style.cssText='background:none;border:none;color:#d1d5db;cursor:pointer;font-size:14px;flex-shrink:0';
      delB.textContent='×';delB.onclick=async()=>{
        if(entry._saved){
          await deleteReportEntry(entry.id);
          S.reportEntries=S.reportEntries.filter(x=>x.id!==entry.id);
        }
        ms.localEntries.splice(ei,1);renderEntries();
      };row.appendChild(delB);
      entryList.appendChild(row);
    });
    updateHrsSummary();
  }
  function updateHrsSummary(){
    const total=ms.localEntries.reduce((s,e)=>s+Number(e.hours||0),0);
    hrsSummary.textContent=total>0?'Total: '+total+'h on site':'';
  }
  // Mark existing saved entries
  ms.localEntries.forEach(e=>{e._saved=!ms.isNew&&!!S.reportEntries.find(x=>x.id===e.id)});
  renderEntries();
  addEntryBtn.onclick=()=>{
    ms.localEntries.push({id:crypto.randomUUID(),report_id:r.id,employee_id:null,hours:8,entry_type:'labour',_saved:false});
    renderEntries();
  };
  m.appendChild(sec2);

  // ── Section 3: Work Description & Notes ───────────────────────────────────
  const sec3=el('div');sec3.style.cssText='background:#f8f9fc;border-radius:7px;padding:12px;margin-bottom:12px';
  const s3l=el('p');s3l.style.cssText='font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px';
  s3l.textContent='Site Notes';sec3.appendChild(s3l);
  const addTA=(parent,labelTxt,key,placeholder,minH=52)=>{
    parent.appendChild(lbl2(labelTxt));
    const ta=el('textarea');ta.className='inp';ta.style.cssText='min-height:'+minH+'px;resize:vertical;margin-bottom:8px';
    ta.placeholder=placeholder;ta.value=r[key]||'';ta.oninput=e=>{r[key]=e.target.value||null};parent.appendChild(ta);
  };
  addTA(sec3,'Work Completed (description of work done today)','work_description',
    'Describe work completed — quantities, locations, materials placed…',72);
  addTA(sec3,'Site Visitors (inspector name, client rep, etc.)','visitors',
    'e.g. City inspector John Smith — checked base compaction');
  addTA(sec3,'Issues / Delays','issues',
    'e.g. Equipment breakdown, material delay, weather stop…');
  m.appendChild(sec3);

  // ── Footer ────────────────────────────────────────────────────────────────
  const delBtn=!ms.isNew?(()=>{
    const b=el('button');b.className='btn-danger';b.textContent='Delete Report';
    b.onclick=async()=>{
      if(!await confirmModal('Delete this field report? All crew hours will also be deleted.','Delete',true))return;
      await deleteFieldReport(r.id);
      S.fieldReports=S.fieldReports.filter(x=>x.id!==r.id);
      S.reportEntries=S.reportEntries.filter(x=>x.report_id!==r.id);
      closeModal();render();
    };return b;
  })():null;

  mkFooter(m,delBtn,async()=>{
    if(!r.project_id){toast('Please select a project.','error');return}
    // Optimistic update
    if(S.fieldReports.find(x=>x.id===r.id))
      S.fieldReports=S.fieldReports.map(x=>x.id===r.id?r:x);
    else
      S.fieldReports=[r,...S.fieldReports];
    // Optimistic entries
    ms.localEntries.forEach(e=>{
      e.report_id=r.id;
      if(S.reportEntries.find(x=>x.id===e.id))
        S.reportEntries=S.reportEntries.map(x=>x.id===e.id?e:x);
      else
        S.reportEntries=[...S.reportEntries,e];
    });
    closeModal();render();
    // Persist to Supabase
    try{
      await upsertFieldReport(r);
      for(const e of ms.localEntries)if(e.employee_id)await upsertReportEntry(e);
      await loadAll();render();
    }catch(err){
      // Handle UNIQUE constraint violation gracefully
      if(err.message&&err.message.includes('unique')){
        toast('⚠ A report already exists for this project on this date.','error');
      }else{
        toast('⚠ Save failed: '+err.message,'error');
      }
    }
  });
}

// ── H&S INCIDENT MODAL (M2) ───────────────────────────────────────────────────
// S.modal = {type:'hs-incident', inc:{...}, isNew:bool, localActions:[...]}
function buildHSIncidentModal(m){
  const ms=S.modal;
  const inc=ms.inc;
  const INC_TYPES_M={
    'near-miss':  'Near Miss',
    'first-aid':  'First Aid',
    'recordable': 'Recordable',
    'critical':   'Critical / Serious',
  };
  mhdr(m,(ms.isNew?'Log Incident':'Edit Incident')+': '+inc.incident_type.replace('-',' ').replace(/\b\w/g,c=>c.toUpperCase()));

  // ── Section 1: Incident Details ──────────────────────────────────────────
  const sec1=el('div');sec1.style.cssText='background:#fff5f5;border:1px solid #fecaca;border-radius:7px;padding:12px;margin-bottom:12px';
  const s1l=el('p');s1l.style.cssText='font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px';s1l.textContent='Incident Details';sec1.appendChild(s1l);
  const g1=el('div');g1.className='fg';

  // Description (full width)
  const dw=el('div');dw.className='fg-full';dw.appendChild(lbl2('Description of what happened'));
  const dInp=el('textarea');dInp.className='inp';dInp.style.cssText='min-height:60px;resize:vertical';
  dInp.value=inc.description||'';dInp.oninput=e=>{inc.description=e.target.value};dw.appendChild(dInp);g1.appendChild(dw);

  // Type + Status
  const tw=el('div');tw.appendChild(lbl2('Incident Type'));
  tw.appendChild(inp2(inc.incident_type,e=>{inc.incident_type=e.target.value},'select',
    Object.entries(INC_TYPES_M).map(([k,v])=>[k,v])));g1.appendChild(tw);
  const sw=el('div');sw.appendChild(lbl2('Status'));
  sw.appendChild(inp2(inc.status,e=>{inc.status=e.target.value},'select',
    [['open','Open'],['in-progress','In Progress'],['closed','Closed']]));g1.appendChild(sw);

  // Date + Location
  const datew=el('div');datew.appendChild(lbl2('Incident Date'));
  datew.appendChild(inp2(inc.incident_date||TODAY,e=>{inc.incident_date=e.target.value},'date'));g1.appendChild(datew);
  const locw=el('div');locw.appendChild(lbl2('Location / Site'));
  const locInp=inp2(inc.location||'',e=>{inc.location=e.target.value},'text');locInp.placeholder='e.g. 135 Craig Henry Dr — sidewalk area';
  locw.appendChild(locInp);g1.appendChild(locw);

  // Injured employee + Project

  empw.appendChild(inp2(inc.injured_employee_id||'',e=>{inc.injured_employee_id=e.target.value||null},'select',
    [['','— None / Unknown —'],...(S.employees||[]).filter(e=>e.active!==false).map(e=>[e.id,e.name])]));g1.appendChild(empw);
  const projw=el('div');projw.appendChild(lbl2('Related Project'));
  projw.appendChild(inp2(inc.project_id||'',e=>{inc.project_id=e.target.value||null},'select',
    [['','— No project —'],...S.projects.filter(p=>!p.archived).map(p=>[p.id,p.job_num+' — '+p.client])]));g1.appendChild(projw);

  // Root cause
  const rcw=el('div');rcw.className='fg-full';rcw.appendChild(lbl2('Root Cause (4-Why Analysis)'));
  const rcInp=el('textarea');rcInp.className='inp';rcInp.style.cssText='min-height:52px;resize:vertical';
  rcInp.placeholder='Why did this happen? Work backwards to the root cause…';
  rcInp.value=inc.root_cause||'';rcInp.oninput=e=>{inc.root_cause=e.target.value};rcw.appendChild(rcInp);g1.appendChild(rcw);
  sec1.appendChild(g1);m.appendChild(sec1);

  // ── Section 2: WSIB / Regulatory ────────────────────────────────────────
  const sec2=el('div');sec2.style.cssText='background:#fffbeb;border:1px solid #fcd34d;border-radius:7px;padding:12px;margin-bottom:12px';
  const s2l=el('p');s2l.style.cssText='font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px';s2l.textContent='WSIB / Regulatory';sec2.appendChild(s2l);
  const g2=el('div');g2.className='fg';

  // WSIB required toggle
  const wsibW=el('div');wsibW.className='fg-full';
  const wsibLbl=el('label');wsibLbl.style.cssText='display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:#444;margin-bottom:6px';
  const wsibCb=el('input');wsibCb.type='checkbox';wsibCb.checked=!!inc.wsib_required;
  const wsibDueSec=el('div');wsibDueSec.style.display=inc.wsib_required?'contents':'none';
  wsibCb.onchange=e=>{
    inc.wsib_required=e.target.checked;
    wsibDueSec.style.display=e.target.checked?'contents':'none';
    // Auto-calculate Form 7 due date: incident date + 3 business days
    if(e.target.checked&&inc.incident_date&&!inc.wsib_form7_due){
      inc.wsib_form7_due=addBusinessDays(inc.incident_date,3);
      dueInp.value=inc.wsib_form7_due;
    }
  };
  wsibLbl.appendChild(wsibCb);wsibLbl.appendChild(document.createTextNode('WSIB reporting required (Form 7 obligation)'));
  wsibW.appendChild(wsibLbl);sec2.appendChild(wsibW);

  // Form 7 fields — shown when WSIB required
  const dueW=el('div');dueW.appendChild(lbl2('Form 7 Due Date (auto: +3 business days)'));
  const dueInp=inp2(inc.wsib_form7_due||'',e=>{inc.wsib_form7_due=e.target.value||null},'date');
  if(inc.wsib_required&&!inc.wsib_form7_due&&inc.incident_date){
    inc.wsib_form7_due=addBusinessDays(inc.incident_date,3);dueInp.value=inc.wsib_form7_due;
  }
  dueW.appendChild(dueInp);wsibDueSec.appendChild(dueW);
  const filedW=el('div');filedW.appendChild(lbl2('Form 7 Filed Date'));
  filedW.appendChild(inp2(inc.wsib_form7_filed||'',e=>{inc.wsib_form7_filed=e.target.value||null},'date'));
  wsibDueSec.appendChild(filedW);
  const rtwW=el('div');rtwW.className='fg-full';rtwW.appendChild(lbl2('Return-to-Work Plan'));
  const rtwInp=el('textarea');rtwInp.className='inp';rtwInp.style.cssText='min-height:44px;resize:vertical';
  rtwInp.placeholder='Modified duties, expected return date, restrictions…';
  rtwInp.value=inc.rtw_plan||'';rtwInp.oninput=e=>{inc.rtw_plan=e.target.value};
  rtwW.appendChild(rtwInp);wsibDueSec.appendChild(rtwW);
  g2.appendChild(wsibDueSec);
  sec2.appendChild(g2);m.appendChild(sec2);

  // ── Section 3: Corrective Actions ────────────────────────────────────────
  const sec3=el('div');sec3.style.cssText='background:#f0f4ff;border:1px solid #c5d0e8;border-radius:7px;padding:12px;margin-bottom:12px';
  const s3hdr=el('div');s3hdr.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:8px';
  const s3l=el('p');s3l.style.cssText='font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;margin:0';s3l.textContent='Corrective Actions';
  const addActBtn=el('button');addActBtn.className='btn-sm';addActBtn.style.fontSize='11px';addActBtn.textContent='+ Add Action';
  s3hdr.appendChild(s3l);s3hdr.appendChild(addActBtn);sec3.appendChild(s3hdr);
  const actList=el('div');sec3.appendChild(actList);
  m.appendChild(sec3);

  function renderActions(){
    actList.innerHTML='';
    if(!ms.localActions.length){
      const none=el('div');none.style.cssText='color:#9ca3af;font-size:12px;text-align:center;padding:8px 0';
      none.textContent='No corrective actions yet — add at least one to document the response.';
      actList.appendChild(none);return;
    }
    ms.localActions.forEach((act,ai)=>{
      const row=el('div');row.className='hs-action-row';
      // Description
      const dIn=el('input');dIn.className='inp';dIn.style.cssText='flex:1;font-size:11px';
      dIn.value=act.description;dIn.placeholder='What corrective action will be taken?';
      dIn.oninput=e=>{act.description=e.target.value};row.appendChild(dIn);
      // Assigned to
      const empSel=inp2(act.assigned_to_employee_id||'',e=>{act.assigned_to_employee_id=e.target.value||null},'select',
        [['','Unassigned'],...(S.employees||[]).filter(e=>e.active!==false).map(e=>[e.id,e.name.split(' ')[0]])]);
      empSel.style.cssText='width:100px;font-size:11px;padding:2px 4px';row.appendChild(empSel);
      // Due date
      const dueI=el('input');dueI.type='date';dueI.className='inp';
      dueI.style.cssText='width:120px;font-size:11px;padding:2px 5px';
      dueI.value=act.due_date||'';dueI.onchange=e=>{act.due_date=e.target.value||null};row.appendChild(dueI);
      // Status toggle
      const stSel=inp2(act.status||'open',e=>{act.status=e.target.value},'select',
        [['open','Open'],['complete','Complete']]);
      stSel.style.cssText='width:80px;font-size:11px;padding:2px 4px';row.appendChild(stSel);
      // Delete
      const delB=el('button');delB.style.cssText='background:none;border:none;color:#d1d5db;cursor:pointer;font-size:14px;flex-shrink:0';
      delB.textContent='×';delB.onclick=async()=>{
        if(act._saved){
          if(!await confirmModal('Remove this corrective action?','Remove',true))return;
          await deleteHsAction(act.id);
          S.hsActions=S.hsActions.filter(x=>x.id!==act.id);
        }
        ms.localActions.splice(ai,1);renderActions();
      };row.appendChild(delB);
      actList.appendChild(row);
    });
  }
  // Mark existing saved actions
  ms.localActions.forEach(a=>{a._saved=!ms.isNew});
  renderActions();
  addActBtn.onclick=()=>{
    ms.localActions.push({id:crypto.randomUUID(),incident_id:inc.id,description:'',
      assigned_to_employee_id:null,due_date:null,status:'open',_saved:false});
    renderActions();
  };

  // ── Footer ────────────────────────────────────────────────────────────────
  const delBtn=!ms.isNew?(()=>{
    const b=el('button');b.className='btn-danger';b.textContent='Delete Incident';
    b.onclick=async()=>{
      if(!await confirmModal('Permanently delete this incident record?','Delete',true))return;
      await deleteHsIncident(inc.id);
      S.hsIncidents=S.hsIncidents.filter(x=>x.id!==inc.id);
      S.hsActions=S.hsActions.filter(x=>x.incident_id!==inc.id);
      closeModal();render();
    };return b;
  })():null;

  mkFooter(m,delBtn,async()=>{
    if(!inc.description.trim()){toast('Please enter an incident description.','error');return}
    // Optimistic update
    if(S.hsIncidents.find(x=>x.id===inc.id))
      S.hsIncidents=S.hsIncidents.map(x=>x.id===inc.id?inc:x);
    else
      S.hsIncidents=[inc,...S.hsIncidents];
    // Save actions
    for(const act of ms.localActions){
      act.incident_id=inc.id;
      if(S.hsActions.find(x=>x.id===act.id))
        S.hsActions=S.hsActions.map(x=>x.id===act.id?act:x);
      else
        S.hsActions=[...S.hsActions,act];
    }
    closeModal();render();
    // Persist to Supabase
    await upsertHsIncident(inc);
    for(const act of ms.localActions)await upsertHsAction(act);
    await loadAll();render();
  });
}

  const crewSel=inp2(emp.crew_id||'',e=>{emp.crew_id=e.target.value||null},'select',
    [['','— Not a crew lead —'],...S.crews.map(c=>[c.id,c.name])]);
  crewW.appendChild(crewSel);g2.appendChild(crewW);
  sec2.appendChild(g2);m.appendChild(sec2);

  // ── Section 3: Certifications ────────────────────────────────────────────
  const sec3=el('div');sec3.style.cssText='background:#f8f9fc;border-radius:7px;padding:12px;margin-bottom:12px';
  const s3hdr=el('div');s3hdr.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:8px';
  const s3lbl=el('p');s3lbl.style.cssText='font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;margin:0';s3lbl.textContent='Certifications';
  const addCertBtn=el('button');addCertBtn.className='btn-sm';addCertBtn.style.fontSize='11px';addCertBtn.textContent='+ Add Cert';
  s3hdr.appendChild(s3lbl);s3hdr.appendChild(addCertBtn);sec3.appendChild(s3hdr);
  const certList=el('div');sec3.appendChild(certList);
  m.appendChild(sec3);

  // Combine saved certs + pending new certs for display
  const savedCerts=empCerts(emp.id);

  function renderCerts(){
    certList.innerHTML='';
    const all=[...savedCerts,...(ms.pendingCerts||[])];
    if(!all.length){
      const none=el('div');none.style.cssText='color:#9ca3af;font-size:12px;text-align:center;padding:10px 0';
      none.textContent='No certifications recorded yet.';certList.appendChild(none);return;
    }
    all.forEach((cert,ci)=>{
      const isNew=ci>=savedCerts.length;
      const d=certDaysLeft(cert);const st=certStatus(cert);
      const row=el('div');row.className='cert-row';
      // Type
      const typeSel=inp2(cert.cert_type||'',e=>{cert.cert_type=e.target.value},'select',
        CERT_TYPES.map(t=>[t,t]));
      typeSel.style.cssText='flex:1;font-size:11px;padding:2px 4px';
      row.appendChild(typeSel);
      // Expiry
      const expI=el('input');expI.type='date';expI.className='inp cert-expiry '+st;
      expI.style.cssText='width:120px;font-size:11px;padding:2px 5px';
      expI.value=cert.expiry_date||'';
      expI.title=d===null?'No expiry':d<0?'Expired '+(Math.abs(d))+' days ago':d+' days remaining';
      expI.onchange=e=>{cert.expiry_date=e.target.value||null;renderCerts()};
      row.appendChild(expI);
      // Days indicator
      if(d!==null){
        const dSp=el('span');dSp.className='cert-expiry '+st;dSp.style.cssText='font-size:10px;font-weight:700;min-width:55px;text-align:right';
        dSp.textContent=d<0?'Exp.'+Math.abs(d)+'d':d+'d left';row.appendChild(dSp);
      }
      // Delete
      const delBtn=el('button');delBtn.style.cssText='background:none;border:none;color:#d1d5db;cursor:pointer;font-size:14px;padding:0 2px';
      delBtn.textContent='×';
      delBtn.onclick=async()=>{
        if(isNew){ms.pendingCerts.splice(ci-savedCerts.length,1);renderCerts();return}
        if(!await confirmModal('Remove "'+cert.cert_type+'" certification?','Remove',true))return;
        await deleteCert(cert.id);
        S.employeeCerts=S.employeeCerts.filter(x=>x.id!==cert.id);
        renderCerts();
      };
      row.appendChild(delBtn);
      certList.appendChild(row);
    });
  }
  renderCerts();
  addCertBtn.onclick=()=>{
    if(!ms.pendingCerts)ms.pendingCerts=[];
    ms.pendingCerts.push({id:crypto.randomUUID(),employee_id:emp.id,cert_type:'WHMIS 2015',issuer:'',issued_date:'',expiry_date:'',notes:''});
    renderCerts();
  };

  // ── Footer ────────────────────────────────────────────────────────────────
  const delBtn2=!ms.isNew?(()=>{
    const b=el('button');b.className='btn-danger';b.textContent='Delete Employee';
    b.onclick=async()=>{
      if(!await confirmModal('Permanently delete '+emp.name+'? All their certifications will also be deleted.','Delete',true))return;
      await deleteEmployee(emp.id);
      S.employees=S.employees.filter(x=>x.id!==emp.id);
      S.employeeCerts=S.employeeCerts.filter(x=>x.employee_id!==emp.id);
      closeModal();render();
    };return b;
  })():null;

  mkFooter(m,delBtn2,async()=>{
    if(!emp.name.trim()){toast('Please enter the employee\'s name.','error');return}
    // Save employee
    if(!ms.isNew&&!S.employees.find(x=>x.id===emp.id)){
      // New employee being saved for first time
      S.employees=[...S.employees,emp];
    }else if(!ms.isNew){
      S.employees=S.employees.map(x=>x.id===emp.id?emp:x);
    }else{
      S.employees=[...S.employees,emp];
    }
    closeModal();render();
    await upsertEmployee(emp);
    // Save any pending new certifications
    for(const c of(ms.pendingCerts||[])){
      c.employee_id=emp.id;
      S.employeeCerts=[...S.employeeCerts,c];
      await upsertCert(c);
    }
    await loadAll();render();
  });
}

        if(!await confirmModal('This will replace all data. Continue?','Replace All Data',true))return;
        S.syncing=true;refreshToolbar();
        if(data.crews?.length)await sb.from('crews').upsert(data.crews);
        if(data.holidays?.length)await sb.from('holidays').upsert(data.holidays);
        if(data.projects?.length)for(let i=0;i<data.projects.length;i+=20)await sb.from('projects').upsert(data.projects.slice(i,i+20));
        if(data.tasks?.length)for(let i=0;i<data.tasks.length;i+=50)await sb.from('tasks').upsert(data.tasks.map(appTaskToDB).slice(i,i+50));

  card('Import & Restore','Restore from a JSON backup file.',[fi,impBtn]);
  return d;
}

function buildImportInput(m,ms){
  // ── PRIMARY: Paste text (no API key, no internet needed) ─────────────────
  const pasteHdr=el('div');pasteHdr.style.cssText='font-size:13px;font-weight:700;color:#1F3864;margin-bottom:6px';
  pasteHdr.textContent='📋 Paste estimate or quote text';m.appendChild(pasteHdr);
  const pasteWrap=el('div');pasteWrap.style.cssText='background:#f0f7ff;border:1.5px solid #93c5fd;border-radius:8px;padding:10px 12px;margin-bottom:10px';
  const pasteLbl=el('div');pasteLbl.style.cssText='font-size:11px;color:#1d4ed8;margin-bottom:6px;line-height:1.5';
  pasteLbl.innerHTML='Copy all text from your QBO estimate or any quote document and paste it here.<br><strong>No API key or internet connection required.</strong> Works immediately.';
  const ta=el('textarea');ta.className='import-textarea';ta.style.cssText='min-height:110px;background:#fff';
  ta.placeholder='Paste your estimate text here — include the estimate number, client name, and all line items…';
  ta.value=ms.pasteText||'';
  const MAX_PASTE=20000;
  const pasteCounter=el('div');
  pasteCounter.style.cssText='font-size:10px;color:#9ca3af;text-align:right;margin-top:3px';
  pasteCounter.textContent=(ms.pasteText||'').length+' / '+MAX_PASTE+' characters';
  ta.oninput=e=>{
    if(e.target.value.length>MAX_PASTE)e.target.value=e.target.value.slice(0,MAX_PASTE);
    ms.pasteText=e.target.value;
    const len=e.target.value.length;
    pasteCounter.textContent=len+' / '+MAX_PASTE+' characters';
    pasteCounter.style.color=len>MAX_PASTE*0.9?'#ea580c':'#9ca3af';
  };
  pasteWrap.appendChild(pasteLbl);pasteWrap.appendChild(ta);pasteWrap.appendChild(pasteCounter);m.appendChild(pasteWrap);

  // ── SECONDARY: File upload (requires API key) ─────────────────────────────
  const orDiv=el('div');orDiv.className='import-or';orDiv.textContent='or upload a file (requires Anthropic API key in Settings)';m.appendChild(orDiv);
  const zone=el('div');zone.className='drop-zone';zone.style.cssText='margin-top:0;padding:16px 20px';
  const ico=el('div');ico.className='drop-zone-icon';ico.style.fontSize='22px';ico.textContent='📄';zone.appendChild(ico);
  const dt=el('div');dt.className='drop-zone-text';dt.textContent='Click to select a PDF or Word (.docx) file';zone.appendChild(dt);
  const fl=el('div');fl.className='drop-zone-file';fl.textContent=ms.file?'📎 '+ms.file.name:'';zone.appendChild(fl);
  const fi=el('input');fi.type='file';fi.accept='.pdf,.docx';fi.style.display='none';
  fi.onchange=e=>{
    const f=e.target.files[0];ms.file=f||null;
    fl.textContent=f?'📎 '+f.name:'';dt.textContent=f?'File selected — click Analyze to continue':'Click to select a PDF or Word (.docx) file';
  };
  zone.onclick=()=>fi.click();
  zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag-over')});
  zone.addEventListener('dragleave',()=>zone.classList.remove('drag-over'));
  zone.addEventListener('drop',e=>{
    e.preventDefault();zone.classList.remove('drag-over');
    const f=e.dataTransfer.files[0];if(!f)return;
    ms.file=f;fl.textContent='📎 '+f.name;dt.textContent='File selected — click Analyze to continue';
  });
  m.appendChild(fi);m.appendChild(zone);

  const footer=el('div');footer.className='modal-footer';
  const lb=el('div');footer.appendChild(lb);
  const rb=el('div');rb.style.cssText='display:flex;gap:8px';
  const cancel=el('button');cancel.className='btn-sec';cancel.textContent='Cancel';cancel.addEventListener('click',closeModal);rb.appendChild(cancel);
  const btn=el('button');btn.className='btn-primary';btn.textContent='📥 Extract & Preview';
  btn.addEventListener('click',async()=>{
    if(!ms.file&&!(ms.pasteText&&ms.pasteText.trim().length>20)){
      toast('Paste your estimate text or select a file first.','error');return;
    }
    ms.state='analyzing';openModal();
    try{
      const result=await runAnalysis(ms.file,ms.pasteText||'');
      ms.editProj={
        job_num:sanitize(result.job_num,30),
        client:sanitize(result.client,120),
        location:sanitize(result.location,200),
        status:'Not started'
      };
      ms.editTasks=(result.tasks||[]).filter(t=>(t.description||'').trim()).map(t=>({
        id:uid(),
        description:sanitize(t.description,300),
        quantity:sanitize(t.quantity,80)
      }));
      if(ms.editTasks.length===0)throw new Error('No tasks were extracted. Make sure the pasted text includes line item descriptions.');
      ms.state='preview';ms.error=null;
    }catch(e){ms.error=e.message;ms.state='error'}
    openModal();
  });
  rb.appendChild(btn);footer.appendChild(rb);m.appendChild(footer);
}

  impBtn.addEventListener('click',async()=>{
    if(!ms.editProj.client&&!ms.editProj.location){toast('Please enter a client name or location.','error');return}
    if(ms.editTasks.length===0){toast('Please add at least one task.','error');return}

      await upsertProject(proj);
      const tasks=ms.editTasks.map((t,i)=>({
        id:t.id,project_id:pid,

  });
  rb.appendChild(impBtn);footer.appendChild(rb);m.appendChild(footer);
}

// ── MODALS ────────────────────────────────────────────────────────────────────
// FIX CP1: modal header always uses closeModal() — no stale S.modal=null;render()
function mhdr(m,title){
  const h=el('div');h.className='modal-hdr';
  const t=el('h3');
  // Unique heading id so aria-labelledby can reference it from the dialog element
  const headingId='mhdr-'+Math.random().toString(36).slice(2,8);
  t.id=headingId;
  t.textContent=title;h.appendChild(t);
  m.setAttribute('aria-labelledby',headingId);
  const c=el('button');c.className='modal-close';c.innerHTML='&times;';
  c.setAttribute('aria-label','Close dialog');
  c.addEventListener('click',closeModal); // direct function ref, not inline
  h.appendChild(c);m.appendChild(h);
}
function lbl2(t){const l=el('label');l.className='lbl';l.textContent=t;return l}
function inp2(val,fn,type,opts){
  const i=el(type==='select'?'select':'input');i.className='inp';
  if(type==='select'){(opts||[]).forEach(([v,t])=>{const o=el('option');o.value=v;o.textContent=t;if(v===val)o.selected=true;i.appendChild(o)})}
  else{if(type)i.type=type;i.value=val||'';if(type==='date'){i.min=SEASON_DATE_MIN;i.max=SEASON_DATE_MAX}}
  if(fn){i.onchange=fn;i.oninput=fn}return i;
}
function mkFooter(m,leftContent,onSave){
  const footer=el('div');footer.className='modal-footer';
  const lb=el('div');
  if(leftContent){
    // Accept either a single element or a pre-built div
    if(leftContent.tagName==='DIV')lb.appendChild(leftContent);
    else lb.appendChild(leftContent);
  }
  footer.appendChild(lb);
  const rb=el('div');rb.style.cssText='display:flex;gap:8px';
  // FIX CP1: Cancel always calls closeModal directly
  const cancel=el('button');cancel.className='btn-sec';cancel.textContent='Cancel';
  cancel.addEventListener('click',closeModal);
  rb.appendChild(cancel);
  const save=el('button');save.className='btn-primary';save.textContent='Save';
  save.addEventListener('click',onSave);
  rb.appendChild(save);footer.appendChild(rb);m.appendChild(footer);
}

  // ── Section 2: Requirements ────────────────────────────────────────────────

  // ── STAGE 1: Does this project require locates? ──────────────────────────
  const locHdr=el('div');locHdr.style.cssText='font-size:11px;font-weight:700;color:#374151;margin-bottom:4px';locHdr.textContent='Utility Locates';sec2.appendChild(locHdr);

  // Normalise legacy boolean → string
  if(p.locates_req===true)p.locates_req='yes';
  else if(p.locates_req===false||!p.locates_req)p.locates_req='no';

  const locToggle=el('div');locToggle.className='loc-stage-toggle';
  function mkLocBtn(val,label){
    const b=el('button');b.type='button';b.className='loc-stage-btn';b.dataset.val=val;b.textContent=label;
    b.onclick=()=>{p.locates_req=val;refreshLocUI()};
    return b;
  }
  const btnNo=mkLocBtn('no','✕  No');
  const btnYes=mkLocBtn('yes','✓  Yes');
  const btnUnk=mkLocBtn('unknown','?  Unknown');
  locToggle.appendChild(btnNo);locToggle.appendChild(btnYes);locToggle.appendChild(btnUnk);
  sec2.appendChild(locToggle);

  // ── STAGE 2: Have locates been ordered? (shown when locates_req="yes") ───
  const stage2=el('div');stage2.className='loc-stage2';
  const s2hdr=el('div');s2hdr.className='loc-stage2-hdr';s2hdr.textContent='Stage 2 — Have locates been ordered?';stage2.appendChild(s2hdr);

  // Public locates row
  const pubRow=el('div');pubRow.className='loc-ordered-row';
  const pubChkLbl=el('label');pubChkLbl.className='loc-ordered-chk';
  const pubChk=el('input');pubChk.type='checkbox';pubChk.checked=!!p.locate_public_ordered;
  pubChk.onchange=e=>{p.locate_public_ordered=e.target.checked;refreshLocUI()};
  pubChkLbl.appendChild(pubChk);pubChkLbl.appendChild(document.createTextNode('Public (Ontario One Call)'));
  const pubTicket=el('input');pubTicket.className='inp loc-ticket-inp';pubTicket.type='text';
  pubTicket.placeholder='Ticket / request #';pubTicket.value=p.locate_public_req||'';
  pubTicket.oninput=e=>{p.locate_public_req=e.target.value||null};
  pubRow.appendChild(pubChkLbl);pubRow.appendChild(pubTicket);stage2.appendChild(pubRow);

  // Private locates row
  const privRow=el('div');privRow.className='loc-ordered-row';
  const privChkLbl=el('label');privChkLbl.className='loc-ordered-chk';
  const privChk=el('input');privChk.type='checkbox';privChk.checked=!!p.locate_private_ordered;
  privChk.onchange=e=>{p.locate_private_ordered=e.target.checked;refreshLocUI()};
  privChkLbl.appendChild(privChk);privChkLbl.appendChild(document.createTextNode('Private (utility locator)'));
  const privTicket=el('input');privTicket.className='inp loc-ticket-inp';privTicket.type='text';
  privTicket.placeholder='Ticket / request #';privTicket.value=p.locate_private_req||'';
  privTicket.oninput=e=>{p.locate_private_req=e.target.value||null};
  privRow.appendChild(privChkLbl);privRow.appendChild(privTicket);stage2.appendChild(privRow);
  sec2.appendChild(stage2);

  // ── STAGE 3: Are locates complete and active? (shown when any ordered) ───
  const stage3=el('div');stage3.className='loc-stage3';
  const s3hdr=el('div');s3hdr.className='loc-stage3-hdr';s3hdr.textContent='Stage 3 — Are locates complete and active?';stage3.appendChild(s3hdr);

  const s3grid=el('div');s3grid.className='fg';
  // Public complete
  const pubDoneRow=el('div');pubDoneRow.className='fg-full';
  const pubDoneLbl=el('label');pubDoneLbl.className='toggle-lbl';
  const pubDoneCb=el('input');pubDoneCb.type='checkbox';pubDoneCb.checked=!!p.locate_public_complete;
  pubDoneCb.onchange=e=>{p.locate_public_complete=e.target.checked};
  pubDoneLbl.appendChild(pubDoneCb);pubDoneLbl.appendChild(document.createTextNode('Public locates complete & active'));
  pubDoneRow.appendChild(pubDoneLbl);s3grid.appendChild(pubDoneRow);
  // Private complete
  const privDoneRow=el('div');privDoneRow.className='fg-full';
  const privDoneLbl=el('label');privDoneLbl.className='toggle-lbl';
  const privDoneCb=el('input');privDoneCb.type='checkbox';privDoneCb.checked=!!p.locate_private_complete;
  privDoneCb.onchange=e=>{p.locate_private_complete=e.target.checked};
  privDoneLbl.appendChild(privDoneCb);privDoneLbl.appendChild(document.createTextNode('Private locates complete & active'));
  privDoneRow.appendChild(privDoneLbl);s3grid.appendChild(privDoneRow);
  // Expiry date
  const expW=el('div');expW.appendChild(lbl2('Expiry Date'));
  const expInp=inp2(p.loc_exp||'',e=>{p.loc_exp=e.target.value||null;refreshExpWarn()},'date');
  expW.appendChild(expInp);s3grid.appendChild(expW);
  // Expiry warning
  const expWarn=el('div');expWarn.className='fg-full';s3grid.appendChild(expWarn);
  function refreshExpWarn(){
    expWarn.innerHTML=''; // safe — only clears the container, no user data involved
    if(!p.loc_exp)return;
    const exp=new Date(p.loc_exp+'T12:00:00');
    const daysLeft=Math.round((exp-new Date(TODAY+'T12:00:00'))/86400000);
    const cfg=daysLeft<0
      ?{text:'🔴 Expired '+Math.abs(daysLeft)+' day'+(Math.abs(daysLeft)===1?'':'s')+' ago — remark required before work can proceed',
        bg:'#fee2e2',col:'#dc2626',bdr:'#dc2626'}
      :daysLeft<=3
      ?{text:'🟠 Expiring in '+daysLeft+' day'+(daysLeft===1?'':'s')+' — arrange remark soon',
        bg:'#fed7aa',col:'#ea580c',bdr:'#f97316'}
      :{text:'🟢 Active — '+daysLeft+' days remaining',
        bg:'#dcfce7',col:'#166534',bdr:'#16a34a'};
    const sp=el('span');sp.className='loc-warning';
    sp.style.cssText='background:'+cfg.bg+';color:'+cfg.col+';border:1px solid '+cfg.bdr;
    sp.textContent=cfg.text; // textContent — never innerHTML — nothing user-supplied flows in
    expWarn.appendChild(sp);
  }
  refreshExpWarn();
  stage3.appendChild(s3grid);
  sec2.appendChild(stage3);

  // ── refresh visibility of stages based on current state ──────────────────
  function refreshLocUI(){
    const req=p.locates_req;
    [btnNo,btnYes,btnUnk].forEach(b=>{
      b.className='loc-stage-btn';
      if(b.dataset.val===req)b.className+=' active-'+req;
    });
    stage2.style.display=req==='yes'?'block':'none';
    const anyOrdered=p.locate_public_ordered||p.locate_private_ordered;
    stage3.style.display=(req==='yes'&&anyOrdered)?'block':'none';
  }
  refreshLocUI();

  // Soils toggle
  const soilRow=el('div');soilRow.className='toggle-row';soilRow.style.marginTop='8px';
  const soilLbl=el('label');soilLbl.className='toggle-lbl';
  const soilCb=el('input');soilCb.type='checkbox';soilCb.checked=!!p.soils_req;
  soilCb.onchange=e=>{p.soils_req=e.target.checked};
  soilLbl.appendChild(soilCb);soilLbl.appendChild(document.createTextNode('Soils Report Required'));soilRow.appendChild(soilLbl);sec2.appendChild(soilRow);

  // ── Section 3: Financial ───────────────────────────────────────────────────
  const sec3=mkSecHdr(m,'💰 Financial');
  const g3=el('div');g3.className='fg';
  // Job Value
  const jvw=el('div');jvw.className='fg-full';jvw.appendChild(lbl2('Job Value (CAD $)'));
  const jvInp=el('input');jvInp.className='inp';jvInp.type='text';jvInp.placeholder='e.g. 12500';
  jvInp.value=p.job_value?((p.job_value/100).toLocaleString('en-CA',{minimumFractionDigits:0,maximumFractionDigits:0})):'';
  jvInp.oninput=e=>{p.job_value=dollarsToCents(e.target.value)};
  jvw.appendChild(jvInp);g3.appendChild(jvw);
  // PO Number
  const pow=el('div');pow.appendChild(lbl2('PO Number'));pow.appendChild(inp2(p.po_num||'',e=>{p.po_num=e.target.value||null}));g3.appendChild(pow);
  // Estimate Number
  const estw=el('div');estw.appendChild(lbl2('Estimate #'));estw.appendChild(inp2(p.estimate_num||'',e=>{p.estimate_num=e.target.value||null}));g3.appendChild(estw);
  // Invoice Number (full width so the prompt has room)
  const invw=el('div');invw.className='fg-full';invw.appendChild(lbl2('Invoice #'));
  const invInp=inp2(p.invoice_num||'',e=>{p.invoice_num=e.target.value||null;chkInvoice()});
  invw.appendChild(invInp);g3.appendChild(invw);
  sec3.appendChild(g3);
  chkInvoice(); // show prompt immediately if modal opens already in "To invoice" with no invoice#

  // ── Section 4: Tasks (unchanged logic) ────────────────────────────────────
  const tsec=el('div');tsec.style.cssText='margin-top:14px;border-top:1px solid #e4e8f0;padding-top:12px';
  const tasks=[...projTasks(p.id)];
  // Track IDs of tasks the user removes via × so we can delete them from DB on save.
  // Only tracks tasks that already exist in the DB (have a matching entry in S.tasks).
  const deletedTaskIds=new Set();
  const thdr2=el('div');thdr2.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:8px';
  const tcnt=el('span');tcnt.style.cssText='font-weight:700;font-size:13px;color:#1F3864';thdr2.appendChild(tcnt);
  const addt=el('button');addt.className='btn-sm';addt.style.fontWeight='700';addt.textContent='+ Task';
  addt.onclick=()=>{tasks.push({id:uid(),project_id:p.id,descr:'',crew:'',status:p.status,wknd:false,sort_order:tasks.length,segs:[{s:null,e:null,crews:[]}]});rTL()};
  thdr2.appendChild(addt);tsec.appendChild(thdr2);
  const tl=el('div');tl.className='task-list';
  function rTL(){
    tl.innerHTML='';tcnt.textContent='Tasks ('+tasks.length+')';
    tasks.forEach((t,ti)=>{
      const row=el('div');row.className='task-edit-row';
      row.draggable=true;
      row.dataset.idx=ti;
      row.style.cursor='default';
      // Drag handle
      const handle=el('span');handle.textContent='⠿';
      handle.style.cssText='color:#bbb;font-size:14px;cursor:grab;padding:0 6px 0 2px;flex-shrink:0;user-select:none';
      handle.title='Drag to reorder';
      row.appendChild(handle);
      const di=inp2(t.descr,e=>{tasks[ti].descr=e.target.value});di.placeholder='Task description';di.style.flex='1';row.appendChild(di);
      const db=el('button');db.style.cssText='color:#dc3545;background:none;border:none;cursor:pointer;font-size:15px;padding:0 4px';
      db.textContent='×';db.onclick=()=>{
        // If this task already exists in the DB, mark it for deletion on save
        if(S.tasks.find(x=>x.id===t.id))deletedTaskIds.add(t.id);
        tasks.splice(ti,1);rTL();
      };row.appendChild(db);
      // HTML5 drag-and-drop for reorder
      row.addEventListener('dragstart',e=>{
        e.dataTransfer.effectAllowed='move';
        e.dataTransfer.setData('text/plain',ti);
        row.style.opacity='0.4';
      });
      row.addEventListener('dragend',()=>{row.style.opacity='1'});
      row.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';row.style.background='#e8f0fe'});
      row.addEventListener('dragleave',()=>{row.style.background=''});
      row.addEventListener('drop',e=>{
        e.preventDefault();row.style.background='';
        const fromIdx=parseInt(e.dataTransfer.getData('text/plain'),10);
        const toIdx=ti;
        if(fromIdx===toIdx)return;
        const moved=tasks.splice(fromIdx,1)[0];
        tasks.splice(toIdx,0,moved);
        tasks.forEach((t2,i)=>{t2.sort_order=i});
        rTL();
      });
      tl.appendChild(row);
    });
  }
  rTL();tsec.appendChild(tl);
  // Phase 10 CP4: reconciliation line — task values total vs contract value
  const reconDiv=el('div');reconDiv.id='recon-line-'+p.id;
  function updateRecon(){
    const taskTotal=tasks.reduce((s,t)=>s+(t.task_value||0),0);
    if(taskTotal===0&&!p.job_value){reconDiv.textContent='';reconDiv.className='';return}
    const contract=p.job_value||0;
    const diff=contract>0?Math.abs(taskTotal-contract)/contract:0;
    const warn=contract>0&&diff>0.05;
    reconDiv.className='recon-line '+(warn?'recon-warn':'recon-ok');
    reconDiv.textContent='Task values total: '+(taskTotal>0?centsToDisplay(taskTotal):'$0')+'  |  Contract: '+(contract>0?centsToDisplay(contract):'not set')+(warn?'  ⚠ Differs by '+Math.round(diff*100)+'%':'  ✓');
  }
  updateRecon();tsec.appendChild(reconDiv);m.appendChild(tsec);
  const delBtn=!S.modal.isNew?
    (()=>{const b=el('button');b.className='btn-danger';b.textContent='Delete Project';
      b.onclick=async()=>{if(!await confirmModal('Delete "'+p.client+'"? This removes all tasks.','Delete Project',true))return;
        await deleteProject(p.id);S.projects=S.projects.filter(x=>x.id!==p.id);S.tasks=S.tasks.filter(x=>x.project_id!==p.id);closeModal();render();
      };return b})():null;
  // Phase 9: Archive / Restore button
  const arcBtn=!S.modal.isNew?(()=>{
    const b=el('button');
    if(p.archived){
      b.className='btn-sec';b.textContent='📁 Restore from Archive';
      b.onclick=async()=>{
        const prev={...p,archived:true};
        p.archived=false;
        S.projects=S.projects.map(x=>x.id===p.id?{...x,archived:false}:x);
        closeModal();render();
        try{
          await upsertProject({...p,archived:false});
          toast('✓ Project restored to active schedule','ok');
        }catch(e){
          S.projects=S.projects.map(x=>x.id===p.id?prev:x);
          render();toast('⚠ Restore failed — '+e.message,'error');
        }
      };
    }else{
      b.className='btn-archive';b.textContent='📁 Archive Project';
      b.onclick=async()=>{
        if(!await confirmModal('Move "'+p.client+'" to the archive? It will be hidden from the active schedule.','Archive',false))return;
        const prev={...p,archived:false};
        p.archived=true;
        S.projects=S.projects.map(x=>x.id===p.id?{...x,archived:true}:x);
        closeModal();render();
        try{
          await upsertProject({...p,archived:true});
          toast('✓ Project archived','ok');
        }catch(e){
          S.projects=S.projects.map(x=>x.id===p.id?prev:x);
          render();toast('⚠ Archive failed — '+e.message,'error');
        }
      };
    }
    return b;
  })():null;
  // Put archive btn in left slot, delete btn next to it
  const leftDiv=el('div');leftDiv.style.cssText='display:flex;gap:6px';
  if(arcBtn)leftDiv.appendChild(arcBtn);
  if(delBtn)leftDiv.appendChild(delBtn);
  mkFooter(m,leftDiv,async()=>{
    // Optimistically update S.tasks so the Gantt shows changes immediately:
    // — remove tasks the user deleted via ×
    // — add brand-new tasks (not yet in S.tasks) so they appear before loadAll()
    S.tasks=S.tasks.filter(x=>!deletedTaskIds.has(x.id));
    const newTasks=tasks.filter(t=>!S.tasks.find(x=>x.id===t.id));
    if(newTasks.length)S.tasks=[...S.tasks,...newTasks];
    _projTaskCache=null;
    closeModal();render();
    try{
      // Delete removed tasks from the database first
      for(const id of deletedTaskIds)await deleteTask(id);
      await upsertProject(p);
      for(const t of tasks)await upsertTask(t);
      // M3: auto-create a draft PHA for every new project so it never starts without one
      if(S.modal&&S.modal.isNew){
        const draftPha={
          id:crypto.randomUUID(),project_id:p.id,pha_date:TODAY,
          supervisor_employee_id:null,hazards_identified:'',
          controls:'',crew_ids:[],status:'draft',
        };
        S.hsPhas=[draftPha,...S.hsPhas];
        await upsertHsPha(draftPha);
      }
      await loadAll();render(); // final refresh with confirmed server state
    }catch(e){
      // Save failed — reload from server to restore consistent state
      toast('⚠ Save failed: '+e.message+'. Reloading…','error');
      await loadAll();render();
    }
  });
}

// ── buildTaskDatesSection ─────────────────────────────────────────────────────
// Builds the "Scheduled Dates" segment list with crew pickers, day counts, and
// validation. Mutates t.segs directly (t is passed by reference).
// Returns the segsDiv DOM element.
function buildTaskDatesSection(t,holDates){
  const segsDiv=el('div');segsDiv.style.cssText='margin-top:14px;border-top:1px solid #e4e8f0;padding-top:10px';
  const segHdr=el('div');segHdr.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:8px';
  const segTitle=el('span');segTitle.style.cssText='font-weight:700;font-size:12px;color:#1F3864';segTitle.textContent='Scheduled Dates';segHdr.appendChild(segTitle);
  const addBtn=el('button');addBtn.className='btn-sm';addBtn.style.fontWeight='700';addBtn.textContent='+ Add Date';
  addBtn.onclick=()=>{t.segs.push({s:null,e:null,crews:[]});renderSegs()};
  segHdr.appendChild(addBtn);segsDiv.appendChild(segHdr);
  const listDiv=el('div');
  segsDiv.appendChild(listDiv);
  const wdDiv=el('div');wdDiv.style.marginTop='6px';
  segsDiv.appendChild(wdDiv);

  function renderSegs(){
    listDiv.innerHTML='';
    t.segs.forEach((seg,si)=>{
      const row=el('div');row.style.cssText='margin-bottom:8px;padding:8px 10px;background:#f8fafc;border-radius:6px;border:1px solid #e4e8f0';
      // ── Date row ──
      const dateRow=el('div');dateRow.style.cssText='display:flex;gap:8px;align-items:flex-start;margin-bottom:8px';
      const sw2=el('div');sw2.style.flex='1';sw2.appendChild(lbl2('Start'));
      const startInp=el('input');startInp.type='date';startInp.className='inp';
      startInp.min=SEASON_DATE_MIN;startInp.max=SEASON_DATE_MAX;
      startInp.value=seg.s||'';
      startInp.onchange=e=>{t.segs[si].s=e.target.value||null;validate();renderWd()};
      sw2.appendChild(startInp);dateRow.appendChild(sw2);
      const ew=el('div');ew.style.flex='1';ew.appendChild(lbl2('End'));
      const endInp=el('input');endInp.type='date';endInp.className='inp';
      endInp.min=SEASON_DATE_MIN;endInp.max=SEASON_DATE_MAX;
      endInp.value=seg.e||'';
      endInp.onchange=e=>{t.segs[si].e=e.target.value||null;validate();renderWd()};
      ew.appendChild(endInp);
      const errDiv=el('div');errDiv.className='field-err';ew.appendChild(errDiv);
      dateRow.appendChild(ew);
      const dn=el('div');dn.style.cssText='min-width:38px;text-align:center;padding-top:18px';
      const dlbl=el('div');dlbl.style.cssText='font-size:10px;color:#888';dlbl.textContent='Days';dn.appendChild(dlbl);
      const dval=el('div');dval.style.cssText='font-size:15px;font-weight:700;color:#1F3864;line-height:1.2';
      dval.textContent=(seg.s&&seg.e&&seg.e>=seg.s)?workDays([seg],holDates,t.wknd):'—';
      dn.appendChild(dval);dateRow.appendChild(dn);
      const xb=el('button');xb.style.cssText='color:#dc3545;background:none;border:none;cursor:pointer;font-size:16px;padding:2px 4px;border-radius:4px;flex-shrink:0;margin-top:18px';
      xb.textContent='×';xb.title='Remove this date';
      xb.onclick=()=>{t.segs.splice(si,1);if(t.segs.length===0)t.segs.push({s:null,e:null,crews:[]});renderSegs()};
      dateRow.appendChild(xb);
      row.appendChild(dateRow);
      // ── Crew picker row ──
      const crewSec=el('div');crewSec.style.cssText='border-top:1px solid #e8ecf2;padding-top:7px';
      const crewLblRow=el('div');crewLblRow.style.cssText='display:flex;align-items:center;gap:6px;margin-bottom:5px';
      const crewLbl=el('span');crewLbl.style.cssText='font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.4px';crewLbl.textContent='Crew';crewLblRow.appendChild(crewLbl);
      if(seg.crews&&seg.crews.length>1){
        const hint=el('span');hint.style.cssText='font-size:10px;color:#888';hint.textContent='1st = bar colour · 2nd = stripe';crewLblRow.appendChild(hint);
      }
      crewSec.appendChild(crewLblRow);
      const crewChips=el('div');crewChips.style.cssText='display:flex;flex-wrap:wrap;gap:5px';
      S.crews.forEach(crew=>{
        const idx=(seg.crews||[]).indexOf(crew.name);
        const isSelected=idx>=0;
        const chip=el('button');
        chip.style.cssText='padding:2px 9px;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;transition:all .12s;position:relative;'
          +(isSelected
            ?'background:'+crew.color+';color:'+crew.tc+';border:2px solid '+crew.color+';opacity:1'
            :'background:#f0f2f5;color:#888;border:2px solid #e4e8f0;opacity:.7');
        chip.textContent=crew.name;
        if(isSelected&&(seg.crews||[]).length>1){
          const badge=el('span');badge.style.cssText='position:absolute;top:-5px;right:-4px;background:#fff;color:'+crew.color+';border:1.5px solid '+crew.color+';border-radius:8px;font-size:8px;font-weight:800;padding:0 3px;line-height:13px;min-width:13px;text-align:center';
          badge.textContent=idx+1;chip.appendChild(badge);
        }
        chip.onclick=()=>{
          const current=t.segs[si].crews||[];
          const pos=current.indexOf(crew.name);
          if(pos>=0){t.segs[si].crews=current.filter(c=>c!==crew.name)}
          else{t.segs[si].crews=[...current,crew.name]}
          if(si===0)t.crew=(t.segs[0].crews[0])||'';
          renderSegs();
        };
        crewChips.appendChild(chip);
      });
      crewSec.appendChild(crewChips);
      row.appendChild(crewSec);
      listDiv.appendChild(row);
      function validate(){
        const s=t.segs[si]?.s,e2=t.segs[si]?.e;
        if(s&&e2&&e2<s){endInp.classList.add('inp-err');errDiv.textContent='End must be on or after start.'}
        else{endInp.classList.remove('inp-err');errDiv.textContent=''}
      }
      if(seg.s&&seg.e&&seg.e<seg.s){endInp.classList.add('inp-err');errDiv.textContent='End must be on or after start.'}
    });
    renderWd();
  }
  function renderWd(){
    const valid=t.segs.filter(sg=>sg.s&&sg.e&&sg.e>=sg.s);
    const wd=workDays(valid,holDates,t.wknd);
    if(wd>0){wdDiv.className='wd-total';wdDiv.textContent='Total work days across all dates: '+wd+' day'+(wd!==1?'s':'')}
    else{wdDiv.className='';wdDiv.textContent=''}
  }
  renderSegs();
  return segsDiv;
}

// ── buildTaskSubtaskSection ──────────────────────────────────────────────────
// Builds the "Supporting Items" (subtask) section with type selector, list,
// complete toggle, and add-item form. Mutates S.subtasks on save/delete.
// Returns the subSec DOM element.
function buildTaskSubtaskSection(t){
  const STYPE_META={
    equipment:{icon:'🚜',label:'Equipment',detailLabel:'Unit / ID'},
    delivery: {icon:'📦',label:'Delivery', detailLabel:'Supplier & qty'},
    dependency:{icon:'🔗',label:'Dependency',detailLabel:'What must be done'},
    note:     {icon:'📋',label:'Note',     detailLabel:'Details'}
  };
  const subSec=el('div');subSec.className='subtask-section';
  const subHdr=el('div');subHdr.className='subtask-hdr';
  const subTitle=el('span');subTitle.className='subtask-hdr-title';subTitle.textContent='⚙ Supporting Items';subHdr.appendChild(subTitle);
  const subCount=el('span');subCount.className='subtask-count';subHdr.appendChild(subCount);
  const addItemBtn=el('button');addItemBtn.className='btn-sm';addItemBtn.style.fontSize='11px';addItemBtn.textContent='+ Add Item';subHdr.appendChild(addItemBtn);
  subSec.appendChild(subHdr);
  const subList=el('div');
  subSec.appendChild(subList);
  const addForm=el('div');addForm.className='subtask-add-form';addForm.style.display='none';subSec.appendChild(addForm);

  let localSubs=taskSubtasks(t.id).map(s=>({...s}));

  function renderSubtasks(){
    subList.innerHTML='';
    const done=localSubs.filter(s=>s.complete).length;
    subCount.textContent=localSubs.length+' item'+(localSubs.length!==1?'s':'')+
      (localSubs.length>0?' · '+done+' complete':'');
    localSubs.forEach((sub,si)=>{
      const meta=STYPE_META[sub.type]||STYPE_META.note;
      const row=el('div');row.className='subtask-row'+(sub.complete?' done':'');
      const ico=el('span');ico.className='subtask-type-icon';ico.textContent=meta.icon;row.appendChild(ico);
      const desc=el('span');desc.className='subtask-descr';desc.textContent=sub.descr||'—';row.appendChild(desc);
      if(sub.detail){const det=el('span');det.className='subtask-detail';det.textContent=sub.detail;row.appendChild(det)}
      if(sub.assigned_to){
        const cm2=crewMap();
        const crew=cm2[sub.assigned_to];
        const chip=el('span');chip.style.cssText='font-size:10px;font-weight:700;padding:1px 6px;border-radius:9px;flex-shrink:0;white-space:nowrap;'+(crew?'background:'+crew.color+';color:'+crew.tc:'background:#f3f4f6;color:#374151');
        chip.textContent=sub.assigned_to;row.appendChild(chip);
      }
      if(sub.scheduled_dt){
        const isPast=sub.scheduled_dt<TODAY;
        const dt=el('span');dt.className='subtask-date '+(isPast&&!sub.complete?'past':'ok');
        dt.textContent=fmtDate(sub.scheduled_dt);row.appendChild(dt);
      }
      const chkBtn=el('button');chkBtn.style.cssText='background:none;border:1.5px solid '+(sub.complete?'#16a34a':'#d1d5db')+';color:'+(sub.complete?'#16a34a':'#9ca3af')+';border-radius:4px;width:22px;height:22px;cursor:pointer;font-size:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center';
      chkBtn.textContent=sub.complete?'✓':'○';chkBtn.title=sub.complete?'Mark incomplete':'Mark complete';
      chkBtn.onclick=async()=>{
        localSubs[si].complete=!localSubs[si].complete;
        // Sync to S.subtasks immediately so the Gantt re-renders correctly when
        // the modal closes. Without this, render() reads the stale S.subtasks
        // array and the Gantt still shows the old complete state.
        S.subtasks=S.subtasks.map(x=>x.id===localSubs[si].id?{...x,complete:localSubs[si].complete}:x);
        renderSubtasks();
        await upsertSubtask(localSubs[si]);
      };
      row.appendChild(chkBtn);
      const delBtn2=el('button');delBtn2.style.cssText='background:none;border:none;color:#dc3545;cursor:pointer;font-size:15px;padding:0 2px;flex-shrink:0';
      delBtn2.textContent='×';delBtn2.title='Remove this item';
      delBtn2.onclick=async()=>{
        if(!await confirmModal('Remove this item?','Remove Item',true))return;
        await deleteSubtask(sub.id);
        localSubs=localSubs.filter(s=>s.id!==sub.id);
        S.subtasks=S.subtasks.filter(s=>s.id!==sub.id);
        renderSubtasks();
      };
      row.appendChild(delBtn2);
      subList.appendChild(row);
    });
  }

  let addFormType='equipment';
  function buildAddForm(){
    addForm.innerHTML='';
    const typeBtns=el('div');typeBtns.className='subtask-type-btns';
    Object.entries(STYPE_META).forEach(([type,meta])=>{
      const b=el('button');b.className='subtask-type-btn'+(type===addFormType?' active':'');
      b.textContent=meta.icon+' '+meta.label;
      b.onclick=()=>{addFormType=type;buildAddForm()};
      typeBtns.appendChild(b);
    });
    addForm.appendChild(typeBtns);
    const meta=STYPE_META[addFormType];
    const grid=el('div');grid.className='fg';
    const dw=el('div');dw.className='fg-full';dw.appendChild(lbl2('Description'));
    const dInp=el('input');dInp.className='inp';dInp.placeholder='e.g. 310 excavator needed on site';dw.appendChild(dInp);grid.appendChild(dw);
    const tw=el('div');tw.appendChild(lbl2(meta.detailLabel+' (optional)'));
    const tInp=el('input');tInp.className='inp';tInp.placeholder=addFormType==='equipment'?'e.g. CAT 310 / unit 04':addFormType==='delivery'?'e.g. RMCC, 10m³, 7am':'';
    tw.appendChild(tInp);grid.appendChild(tw);
    const aw=el('div');aw.appendChild(lbl2('Assigned to (optional)'));
    const aInp=el('input');aInp.className='inp';aInp.placeholder='Crew name or company';
    aInp.setAttribute('list','crew-datalist-sub');
    const dl=el('datalist');dl.id='crew-datalist-sub';
    S.crews.forEach(c=>{const opt=el('option');opt.value=c.name;dl.appendChild(opt)});
    aw.appendChild(aInp);aw.appendChild(dl);grid.appendChild(aw);
    const dtw=el('div');dtw.appendChild(lbl2('Date needed (optional)'));
    const dtInp=el('input');dtInp.type='date';dtInp.className='inp';dtInp.min=SEASON_DATE_MIN;dtInp.max=SEASON_DATE_MAX;
    dtw.appendChild(dtInp);grid.appendChild(dtw);
    addForm.appendChild(grid);
    const footer=el('div');footer.style.cssText='display:flex;gap:8px;margin-top:8px;justify-content:flex-end';
    const cancelBtn=el('button');cancelBtn.className='btn-sec';cancelBtn.style.fontSize='11px';cancelBtn.textContent='Cancel';
    cancelBtn.onclick=()=>{addForm.style.display='none';addItemBtn.style.display='inline-block'};
    const saveBtn=el('button');saveBtn.className='btn-primary';saveBtn.style.fontSize='11px';saveBtn.textContent='Add Item';
    saveBtn.onclick=async()=>{
      const descr=dInp.value.trim();
      if(!descr){toast('Please enter a description.','error');return}
      const newSub={id:uid(),task_id:t.id,project_id:t.project_id,type:addFormType,descr,
        detail:tInp.value.trim()||null,assigned_to:aInp.value.trim()||null,
        scheduled_dt:dtInp.value||null,complete:false,sort_order:localSubs.length};
      saveBtn.disabled=true;saveBtn.textContent='Saving…';
      try{
        await upsertSubtask(newSub);
        localSubs=[...localSubs,newSub];S.subtasks=[...S.subtasks,newSub];
        addForm.style.display='none';addItemBtn.style.display='inline-block';
        renderSubtasks();
      }catch(e){toast('⚠ Could not save: '+e.message,'error')}
      finally{saveBtn.disabled=false;saveBtn.textContent='Add Item'}
    };
    footer.appendChild(cancelBtn);footer.appendChild(saveBtn);addForm.appendChild(footer);
  }
  addItemBtn.onclick=()=>{addFormType='equipment';buildAddForm();addForm.style.display='block';addItemBtn.style.display='none'};
  renderSubtasks();
  return subSec;
}

function buildTaskModal(m){
  const t=S.modal.t;
  const holDates=S.holidays.map(h=>h.date);
  mhdr(m,'Edit Task');
  // Ensure segs is a valid mutable array with crews on every segment
  if(!Array.isArray(t.segs)||t.segs.length===0){
    t.segs=[{s:null,e:null,crews:[]}];
  }else{
    t.segs=t.segs.map(sg=>({
      s:sg.s||null, e:sg.e||null,
      crews:Array.isArray(sg.crews)?[...sg.crews]:(t.crew?[t.crew]:[])
    }));
  }

  const g=el('div');g.className='fg';
  const dw=el('div');dw.className='fg-full';dw.appendChild(lbl2('Description'));dw.appendChild(inp2(t.descr,e=>{t.descr=e.target.value}));g.appendChild(dw);
  const stw=el('div');stw.appendChild(lbl2('Status'));stw.appendChild(inp2(t.status,e=>{t.status=e.target.value},'select',ST_OPTS.map(s=>[s,s])));g.appendChild(stw);
  const ww=el('div');ww.className='fg-full';ww.style.marginTop='8px';
  const wl=el('label');wl.style.cssText='display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:#444';
  const cb=el('input');cb.type='checkbox';cb.checked=t.wknd;
  cb.onchange=e=>{t.wknd=e.target.checked;m.replaceChild(buildTaskDatesSection(t,holDates),m.querySelector('[data-section="dates"]'))};
  wl.appendChild(cb);wl.appendChild(document.createTextNode('Include weekends & holidays in Work Days'));ww.appendChild(wl);g.appendChild(ww);
  m.appendChild(g);

  const datesEl=buildTaskDatesSection(t,holDates);
  datesEl.dataset.section='dates';
  m.appendChild(datesEl);
  m.appendChild(buildTaskSubtaskSection(t));
  m.appendChild(buildTaskFinancialSection(t));

  const delBtn=(()=>{const b=el('button');b.className='btn-danger';b.textContent='Delete Task';
    b.onclick=async()=>{if(!await confirmModal('Delete this task?','Delete Task',true))return;
    await deleteTask(t.id);S.tasks=S.tasks.filter(x=>x.id!==t.id);closeModal();render()};return b})();
  mkFooter(m,delBtn,async()=>{
    const invalid=t.segs.some(sg=>sg.s&&sg.e&&sg.e<sg.s);
    if(invalid){toast('⚠ Fix date errors before saving.','error');return}
    // Snapshot current state for rollback if the save fails
    const prevTasks=S.tasks;
    if(S.tasks.find(x=>x.id===t.id))S.tasks=S.tasks.map(x=>x.id===t.id?t:x);
    else S.tasks=[...S.tasks,t];
    closeModal();render();
    try{
      await upsertTask(t);
    }catch(e){
      // Revert the optimistic update and re-open with the original data
      S.tasks=prevTasks;
      S.modal={type:'task',t};
      render();
      toast('⚠ Save failed — changes reverted. '+e.message,'error');
    }
  });
}

      await upsertCrew(c);

      S.crews=prevCrews;
      render();
      toast('⚠ Save failed — changes reverted. '+e.message,'error');

(async function init(){
  const SUPABASE_URL='https://fzkhsifaajcdvnthaxff.supabase.co';
  const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6a2hzaWZhYWpjZHZudGhheGZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDIzOTMsImV4cCI6MjA5MTY3ODM5M30.lZheM3v971YAGBTbA2-zLuglXXCe10C1fUWmrWYJj3M';
  try{
    // Step 1: Read the URL hash type BEFORE creating the Supabase client.
    // The invite/recovery access_token is in the hash fragment.
    const hash=window.location.hash;
    const hashParams=new URLSearchParams(hash.replace(/^#/,''));
    _pendingUrlType=hashParams.get('type'); // 'invite', 'recovery', or null

    // Step 2: Create client. Supabase v2 will read the hash and exchange the
    // token internally when getSession() is called.
    sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{
      auth:{detectSessionInUrl:true,persistSession:true,autoRefreshToken:true}
    });

    // Step 3: Register listener BEFORE getSession so no events are missed.
    setupAuthListener();

    // Step 4: getSession() awaits Supabase's internal initializePromise which
    // includes reading and exchanging the hash tokens.
    const{data:{session},error}=await sb.auth.getSession();

    // Step 5: Clean the URL now that tokens have been processed.
    if(_pendingUrlType){
      history.replaceState(null,'',window.location.pathname+window.location.search);
    }

    // Step 6: Route based on what we found.
    if(_pendingUrlType==='invite'&&session){
      _pendingUrlType=null;
      showNewPass('Welcome! Set a password to complete your account setup.');
    }else if(_pendingUrlType==='recovery'&&session){
      _pendingUrlType=null;
      showNewPass('Enter a new password for your account.');
    }else if(session?.user){
      _pendingUrlType=null;
      await enterApp(session.user);
    }else{
      _pendingUrlType=null;
      showLogin();
    }
  }catch(e){
    console.error('Init failed:',e);
    showLogin();
  }
})();
</script>
