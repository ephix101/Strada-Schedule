<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Strada Schedule</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;font-size:13px;background:#f0f2f5;overflow:hidden;height:100vh}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit;font-size:12px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#eee}
::-webkit-scrollbar-thumb{background:#bbb;border-radius:3px}
/* Auth screens */
.screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:1000;background:linear-gradient(135deg,#1F3864 0%,#2563eb 100%)}
.screen-card{background:#fff;border-radius:14px;padding:32px;width:420px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.screen-logo{font-size:26px;font-weight:800;color:#1F3864;margin-bottom:4px}
.screen-sub{color:#888;font-size:13px;margin-bottom:22px;line-height:1.5}
.screen-lbl{display:block;font-size:11px;font-weight:700;color:#555;margin-bottom:4px;margin-top:14px}
.screen-inp{width:100%;padding:9px 12px;border:1.5px solid #d0d7e3;border-radius:7px;font-size:13px;outline:none;transition:border-color .15s;color:#222}
.screen-inp:focus{border-color:#1F3864}
.screen-btn{width:100%;margin-top:18px;padding:11px;background:#1F3864;color:#fff;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;transition:background .15s}
.screen-btn:hover{background:#2d5a9e}
.screen-btn:disabled{background:#bbb;cursor:not-allowed}
.screen-err{color:#dc3545;font-size:12px;margin-top:8px;min-height:18px}
.screen-link{display:block;text-align:center;margin-top:12px;font-size:12px;color:#1F3864;cursor:pointer;text-decoration:underline}
.screen-note{color:#aaa;font-size:11px;margin-top:14px;text-align:center;line-height:1.5}
.screen-divider{border:none;border-top:1px solid #eee;margin:16px 0}
/* App shell */
.app{display:flex;flex-direction:column;height:100vh}
.toolbar{display:flex;align-items:center;gap:10px;padding:0 14px;height:44px;background:#1F3864;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.25);z-index:100}
.logo{font-weight:700;font-size:14px;margin-right:4px;letter-spacing:.2px}
.tabs{display:flex;background:rgba(255,255,255,.12);border-radius:6px;padding:2px;gap:1px}
.tab{padding:3px 11px;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;background:transparent;color:rgba(255,255,255,.8);transition:all .15s}
.tab.active{background:#fff;color:#1F3864}
.spacer{flex:1}
.user-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border-radius:20px;padding:3px 10px 3px 3px}
.user-av{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0}
.user-email{font-size:11px;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-left:2px}
.sync-dot.ok{background:#4ade80}
.sync-dot.busy{background:#fbbf24;animation:pulse .8s infinite}
.sync-dot.err{background:#f87171}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.logout-btn{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.8);border-radius:5px;padding:3px 9px;font-size:11px;cursor:pointer;white-space:nowrap}
.logout-btn:hover{background:rgba(255,255,255,.2)}
.main{flex:1;overflow:hidden;display:flex}
/* Loading */
.loading-screen{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:#666}
.spinner{width:32px;height:32px;border:3px solid #e0e4ed;border-top-color:#1F3864;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Toast */
.toast-ctr{position:fixed;top:52px;right:16px;z-index:900;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:#1a2b4a;color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;opacity:0;transform:translateX(20px);transition:all .25s;max-width:300px}
.toast.show{opacity:1;transform:translateX(0)}
/* Gantt */
.gantt-wrap{flex:1;overflow:auto;position:relative;user-select:none}
.gantt-hdr{position:sticky;top:0;z-index:20;display:flex;flex-shrink:0}
.corner{position:sticky;left:0;z-index:30;background:#1F3864;border-bottom:1px solid #0d2748;border-right:2px solid #0d2748;display:flex;align-items:flex-end;padding:0 10px 4px;flex-shrink:0}
.cal-wrap{background:#1F3864;flex-shrink:0}
.month-row,.day-row,.wd-row{display:flex}
.mc{display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:700;letter-spacing:.5px;border-right:1px solid rgba(255,255,255,.1);flex-shrink:0}
.dc{display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;flex-shrink:0;border-right:1px solid rgba(255,255,255,.04)}
.wc{display:flex;align-items:center;justify-content:center;font-size:7px;flex-shrink:0}
.g-row{display:flex;flex-shrink:0}
.lc{position:sticky;left:0;z-index:10;overflow:hidden;display:flex;align-items:center;padding:0 8px;flex-shrink:0}
.gc{position:relative;overflow:hidden;flex-shrink:0}
.proj-row .lc{background:#2F4F8F;border-right:2px solid #1a3d6e;border-bottom:1px solid #1a3d6e}
.proj-row .gc{background:#243f6e}
.task-row .lc{border-right:2px solid #d0d7e3;border-bottom:1px solid #e4e8f0}
.task-even .lc,.task-even .gc{background:#f7f9fc}
.task-odd  .lc,.task-odd  .gc{background:#fff}
.status-badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:9px;white-space:nowrap;flex-shrink:0}
.crew-badge{font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0;max-width:70px;overflow:hidden;text-overflow:ellipsis}
.icon-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:1px 4px;border-radius:3px;line-height:1}
.bar-seg{position:absolute;pointer-events:none}
.bar-hit{position:absolute;cursor:grab;z-index:5;background:transparent;box-sizing:border-box}
.bar-hit:active{cursor:grabbing}
.today-col{position:absolute;top:0;width:24px;pointer-events:none;background:rgba(255,210,0,0.15);border-left:2px solid rgba(255,210,0,0.7);border-right:1px solid rgba(255,210,0,0.3);}
.proj-span{position:absolute;pointer-events:none;border-radius:3px;background:rgba(255,255,255,.18)}
/* Board */
.board-wrap{flex:1;overflow:auto;padding:16px;background:#f0f2f5}
.board-cols{display:flex;gap:12px;align-items:flex-start}
.board-col{min-width:200px;max-width:256px;flex-shrink:0}
.board-col-hdr{display:flex;align-items:center;gap:6px;margin-bottom:8px;padding:4px 8px;border-radius:6px}
.board-card{background:#fff;border-radius:8px;padding:10px 12px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid #e4e8f0;margin-bottom:6px;transition:box-shadow .15s}
.board-card:hover{box-shadow:0 3px 10px rgba(0,0,0,.12)}
/* Empty state */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:#888;padding:40px}
.empty-state-icon{font-size:48px;opacity:.4}
.empty-state-title{font-size:18px;font-weight:700;color:#1F3864}
.empty-state-body{font-size:13px;text-align:center;max-width:340px;line-height:1.6}
.empty-state-btn{padding:9px 22px;background:#1F3864;color:#fff;border:none;border-radius:7px;font-weight:700;font-size:13px;cursor:pointer}
/* Settings */
.settings-wrap{flex:1;overflow:auto;padding:20px;max-width:640px}
.settings-tabs{display:flex;gap:8px;margin-bottom:16px}
.settings-tab{padding:6px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s}
.panel-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.crew-card,.hol-card,.user-card{display:flex;align-items:center;gap:10px;background:#fff;padding:10px 14px;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.07);margin-bottom:7px}
.crew-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.info-card{background:#f0f4ff;border:1px solid #c5d0e8;border-radius:8px;padding:14px;margin-bottom:10px;font-size:12px;color:#334;line-height:1.6}
/* Modal — FIX: rendered in dedicated #modal-root, never inside #main */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:10px;padding:22px;width:560px;max-width:95vw;max-height:88vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.22)}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-hdr h3{font-size:14px;color:#1F3864;font-weight:700}
.modal-close{background:none;border:none;font-size:22px;line-height:1;padding:2px 6px;cursor:pointer;color:#999;border-radius:4px}
.modal-close:hover{background:#f0f2f5;color:#333}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
.fg-full{grid-column:span 2}
.lbl{display:block;font-size:11px;font-weight:700;color:#555;margin-bottom:3px;margin-top:10px}
.inp{width:100%;padding:6px 9px;border:1px solid #cdd3de;border-radius:5px;font-size:12px;outline:none;transition:border-color .15s}
.inp:focus{border-color:#1F3864}
.inp-err{border-color:#dc3545!important}
.field-err{font-size:11px;color:#dc3545;margin-top:3px;min-height:16px}
.seg-box{border-radius:8px;padding:10px 12px;margin-bottom:8px;border:1px solid}
.seg0{background:#f0f4ff;border-color:#c5d0e8}
.seg1{background:#fff8f0;border-color:#ffe0b2}
.seg2{background:#f0fff4;border-color:#c3e6cb}
.seg-grid{display:flex;gap:10px;align-items:flex-start}
.wd-total{background:#f0f4ff;border-radius:6px;padding:8px 12px;font-size:13px;color:#1F3864;font-weight:700;margin-top:10px}
.modal-footer{display:flex;gap:8px;margin-top:18px;justify-content:space-between;align-items:center}
.task-list{max-height:180px;overflow-y:auto;margin-top:6px}
.task-edit-row{display:flex;gap:6px;align-items:center;margin-bottom:4px}
.btn-primary{padding:7px 18px;background:#1F3864;color:#fff;border:none;border-radius:6px;font-weight:700;font-size:12px;cursor:pointer}
.btn-sec{padding:7px 14px;background:#fff;border:1px solid #cdd3de;border-radius:6px;font-size:12px;cursor:pointer}
.btn-danger{padding:7px 14px;background:#fff;color:#dc3545;border:1px solid #dc3545;border-radius:6px;font-size:12px;cursor:pointer}
.btn-sm{padding:4px 10px;border-radius:5px;border:1px solid #d0d7e3;background:#f8f9fb;font-size:12px;cursor:pointer}
/* AI Import modal */
.drop-zone{border:2px dashed #cdd3de;border-radius:10px;padding:28px 20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;background:#fafbfc;margin-top:4px}
.drop-zone:hover,.drop-zone.drag-over{border-color:#1F3864;background:#f0f4ff}
.drop-zone-icon{font-size:30px;margin-bottom:6px;opacity:.5}
.drop-zone-text{font-size:13px;color:#777;line-height:1.5}
.drop-zone-file{font-size:12px;color:#1F3864;font-weight:700;margin-top:6px;min-height:18px}
.import-or{display:flex;align-items:center;gap:10px;margin:14px 0;color:#bbb;font-size:12px}
.import-or::before,.import-or::after{content:'';flex:1;height:1px;background:#e4e8f0}
.import-textarea{width:100%;padding:9px 10px;border:1px solid #cdd3de;border-radius:7px;font-size:12px;resize:vertical;min-height:90px;outline:none;font-family:inherit;color:#333}
.import-textarea:focus{border-color:#1F3864}
.import-spin-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding:36px 0}
.import-error{background:#fff5f5;border:1px solid #fecaca;border-radius:8px;padding:14px 16px;margin-bottom:12px;color:#dc2626;font-size:13px;line-height:1.5}
.import-error strong{display:block;font-weight:700;margin-bottom:3px}
.preview-table{width:100%;border-collapse:collapse;margin-top:6px;font-size:12px}
.preview-table th{background:#f0f4ff;color:#1F3864;font-size:11px;font-weight:700;padding:6px 8px;text-align:left;border-bottom:2px solid #c5d0e8}
.preview-table td{padding:5px 6px;border-bottom:1px solid #f0f2f5;vertical-align:middle}
.preview-inp{width:100%;padding:4px 7px;border:1px solid #e4e8f0;border-radius:4px;font-size:12px;background:#fff;outline:none;color:#333}
.preview-inp:focus{border-color:#1F3864}
.import-btn{padding:5px 12px;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:6px;cursor:pointer;font-size:12px;white-space:nowrap}
.import-btn:hover{background:rgba(255,255,255,.25)}
/* Filter bar */
.filter-bar{display:flex;align-items:center;gap:6px;padding:0 14px;min-height:40px;background:#f8f9fb;border-bottom:1px solid #d1d5db;flex-shrink:0;flex-wrap:wrap}
.filter-bar.active{background:#fffbeb;border-bottom-color:#f59e0b}
.fb-label{font-size:11px;font-weight:700;color:#6b7280;white-space:nowrap;flex-shrink:0}
.fb-sep{width:1px;height:20px;background:#d1d5db;flex-shrink:0;margin:0 2px}
.fb-crew-btn{padding:2px 9px;border-radius:12px;border:1.5px solid transparent;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:opacity .12s,transform .1s}
.fb-crew-btn.on{opacity:1}
.fb-crew-btn.off{opacity:.35;filter:grayscale(.4)}
.fb-crew-btn:hover{opacity:.9!important;transform:scale(1.04)}
.fb-sel{padding:3px 6px;border:1px solid #cdd3de;border-radius:5px;font-size:12px;background:#fff;cursor:pointer;height:26px;max-width:130px}
.fb-date{width:108px;padding:3px 6px;border:1px solid #cdd3de;border-radius:5px;font-size:12px;height:26px}
.fb-chk-lbl{display:flex;align-items:center;gap:5px;font-size:12px;color:#374151;cursor:pointer;white-space:nowrap;user-select:none}
.fb-clear{padding:2px 10px;border-radius:5px;border:1px solid #f59e0b;background:#fff8ed;color:#b45309;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
.fb-save-btn{padding:2px 10px;border-radius:5px;border:1px solid #cdd3de;background:#fff;color:#374151;font-size:11px;cursor:pointer;white-space:nowrap}
.fb-del-btn{padding:2px 8px;border-radius:5px;border:1px solid #fecaca;background:#fff5f5;color:#dc2626;font-size:11px;cursor:pointer}
.filter-count{background:#f59e0b;color:#fff;border-radius:10px;font-size:10px;font-weight:700;padding:0 5px;min-width:16px;text-align:center;line-height:16px}
/* ── Phase 7 ──────────────────────────────────────────────────────────── */
.job-val-badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:9px;background:#d4edda;color:#155724;border:1px solid #c3e6cb;white-space:nowrap;flex-shrink:0;margin-left:3px}
.toggle-row{display:flex;align-items:center;padding:6px 0}
.toggle-lbl{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:#374151;font-weight:600;user-select:none}
.modal-sec{margin-top:14px;padding-top:10px;border-top:1px solid #e4e8f0}
.modal-sec-hdr{font-size:10px;font-weight:800;color:#1F3864;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.invoice-prompt{font-size:11px;color:#fd7e14;margin-top:3px;min-height:16px;line-height:1.4}
.req-flag{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;padding:1px 5px;border-radius:9px;white-space:nowrap;flex-shrink:0;margin-left:3px}
.req-flag.on{background:#fff3cd;color:#856404;border:1px solid #ffc107}
/* Phase 12A: locate workflow */
.loc-stage-toggle{display:flex;gap:6px;margin:6px 0 2px}
.loc-stage-btn{flex:1;padding:5px 8px;border:1.5px solid #d1d5db;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;background:#f9fafb;color:#6b7280;transition:all .15s;text-align:center}
.loc-stage-btn.active-no{border-color:#6b7280;background:#f3f4f6;color:#374151}
.loc-stage-btn.active-yes{border-color:#1d4ed8;background:#dbeafe;color:#1d4ed8}
.loc-stage-btn.active-unknown{border-color:#d97706;background:#fef3c7;color:#92400e}
.loc-stage2,.loc-stage3{margin-top:8px;padding:10px 12px;border-radius:8px;border:1px solid #e4e8f0;background:#f8fafc}
.loc-stage2-hdr,.loc-stage3-hdr{font-size:10px;font-weight:800;color:#1F3864;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.loc-ordered-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.loc-ordered-chk{display:flex;align-items:center;gap:6px;min-width:200px;cursor:pointer;font-size:12px;font-weight:600;color:#374151}
.loc-ticket-inp{flex:1;min-width:140px}
.loc-warning{font-size:11px;font-weight:700;padding:4px 8px;border-radius:5px;margin-top:6px;display:inline-block}
/* ── Export modal ─────────────────────────────────────────────────────────── */
.modal-wide{width:820px;max-width:97vw}
.exp-tabs{display:flex;gap:2px;margin-bottom:14px;background:#f0f2f5;border-radius:7px;padding:3px}
.exp-tab{flex:1;padding:6px 0;border:none;background:transparent;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;color:#555;transition:all .15s}
.exp-tab.active{background:#1F3864;color:#fff}
.exp-ctrl{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px;padding:8px 10px;background:#f8f9fb;border-radius:6px;border:1px solid #e4e8f0}
.exp-ctrl label{font-size:11px;font-weight:700;color:#555;white-space:nowrap}
.exp-ctrl input[type=date]{padding:4px 7px;border:1px solid #cdd3de;border-radius:5px;font-size:12px;height:28px}
.exp-ctrl select{padding:3px 7px;border:1px solid #cdd3de;border-radius:5px;font-size:12px;height:28px}
.exp-ctrl .spacer{flex:1}
.print-frame-wrap{border:1px solid #d0d7e3;border-radius:6px;overflow:hidden;background:#fff}
.exp-tbl{width:100%;border-collapse:collapse;font-size:11px}
.exp-tbl th{background:#1F3864;color:#fff;font-size:10px;font-weight:700;padding:5px 7px;text-align:left;white-space:nowrap}
.exp-tbl td{padding:5px 7px;border-bottom:1px solid #f0f2f5;vertical-align:top;line-height:1.4}
.exp-tbl tr:nth-child(even) td{background:#f8fafc}
.exp-scroll{max-height:420px;overflow-y:auto}
.fs-crew-hdr{font-size:11px;font-weight:800;padding:6px 10px;border-radius:5px;margin:10px 0 4px;letter-spacing:.3px}
.fs-task-row{display:flex;align-items:baseline;gap:6px;padding:3px 8px;border-radius:4px;font-size:11px;margin-bottom:2px}
.fs-job{color:#555;font-size:10px;min-width:50px;flex-shrink:0}
.fs-desc{flex:1;color:#1a2b4a}
.fs-dates{color:#888;font-size:10px;white-space:nowrap}
.fs-nowork{color:#bbb;font-size:11px;padding:4px 8px;font-style:italic}
@media print{
  .modal-bg,.toolbar,.filter-bar{display:none!important}
  .print-only{display:block!important}
}
/* Phase 10: task value badge */
.task-val-badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:9px;background:#dcfce7;color:#166534;border:1px solid #86efac;white-space:nowrap;flex-shrink:0;margin-left:3px}
/* Phase 12B: subtask supporting items */
.subtask-section{margin-top:12px;padding-top:10px;border-top:1px solid #e4e8f0}
.subtask-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.subtask-hdr-title{font-size:10px;font-weight:800;color:#1F3864;text-transform:uppercase;letter-spacing:.6px;flex:1}
.subtask-count{font-size:10px;color:#6b7280;background:#f3f4f6;border-radius:10px;padding:1px 7px;font-weight:600}
.subtask-row{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;border:1px solid #e4e8f0;margin-bottom:4px;background:#f8fafc;transition:opacity .15s}
.subtask-row.done{opacity:.45}
.subtask-type-icon{font-size:14px;flex-shrink:0;width:20px;text-align:center}
.subtask-descr{flex:1;font-size:12px;color:#1a2b4a;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.subtask-detail{font-size:11px;color:#6b7280;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px}

// ── SUPABASE & STATE ───────────────────────────────────────────────────────────

  view:'gantt',settingsTab:'crews',modal:null,boardSearch:'',

// Preserve scroll across re-renders
const _scroll={ganttX:0,ganttY:0,boardX:0,boardY:0};
function saveScroll(){
  const g=document.querySelector('.gantt-wrap'),b=document.querySelector('.board-wrap');
  if(g){_scroll.ganttX=g.scrollLeft;_scroll.ganttY=g.scrollTop}
  if(b){_scroll.boardX=b.scrollLeft;_scroll.boardY=b.scrollTop}
}
function restoreScroll(){
  const g=document.querySelector('.gantt-wrap'),b=document.querySelector('.board-wrap');
  if(g){g.scrollLeft=_scroll.ganttX;g.scrollTop=_scroll.ganttY}
  if(b){b.scrollLeft=_scroll.boardX;b.scrollTop=_scroll.boardY}
}

// ── FILTER PERSISTENCE ────────────────────────────────────────────────────────
function _filterKey(){return FILTER_KEY+(currentUser?'_'+currentUser.email:'')}
function _presetsKey(){return PRESETS_KEY+(currentUser?'_'+currentUser.email:'')}
function saveFilters(){
  try{
    localStorage.setItem(_filterKey(),JSON.stringify(S.filter));
    localStorage.setItem(_presetsKey(),JSON.stringify(S.presets));
  }catch(e){}
}
function loadFilters(){
  try{
    const f=JSON.parse(localStorage.getItem(_filterKey())||'null');

  }catch(e){}

// ── LOADING SAFETY NET ────────────────────────────────────────────────────────
// setLoading(true/false) replaces all direct S.loading writes.
// When set to true, a 12-second failsafe auto-clears loading so the app
// can never be permanently stuck on the spinner, regardless of future bugs.
let _loadTimeout=null;
function setLoading(val){
  if(_loadTimeout){clearTimeout(_loadTimeout);_loadTimeout=null}
  S.loading=val;
  if(val){
    _loadTimeout=setTimeout(()=>{
      if(!S.loading)return;
      console.warn('[Strada] Loading timeout — force-clearing loading state');
      S.loading=false;_loadTimeout=null;
      renderSafe();
    },12000);
  }
}

// renderSafe() wraps render() so a thrown error never crashes the app
// silently. On error it logs to console and shows a recoverable message.
function renderSafe(){
  // If the loading spinner is still showing but data has arrived, clear it
  if(S.loading&&S.projects.length>0){setLoading(false);}
  try{render()}catch(e){
    console.error('[Strada] render() threw:',e);
    const main=document.getElementById('main');
    if(main){
      main.innerHTML='';
      const wrap=document.createElement('div');
      wrap.style.cssText='flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:40px;color:#666';
      const msg=document.createElement('div');msg.style.cssText='font-size:14px;font-weight:700;color:#dc3545';msg.textContent='Something went wrong while rendering.';
      const sub=document.createElement('div');sub.style.cssText='font-size:12px';sub.textContent=e.message;
      const btn=document.createElement('button');btn.style.cssText='padding:8px 18px;background:#1F3864;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;margin-top:8px';
      btn.textContent='Reload page';btn.onclick=()=>location.reload();
      wrap.appendChild(msg);wrap.appendChild(sub);wrap.appendChild(btn);main.appendChild(wrap);
    }
  }
}
// ── PHASE 7: CURRENCY HELPERS ─────────────────────────────────────────────────
function centsToDisplay(cents){
  if(!cents||cents===0)return'';
  return'$'+(cents/100).toLocaleString('en-CA',{minimumFractionDigits:0,maximumFractionDigits:0});
}
function centsToBadge(cents){
  if(!cents||cents===0)return null;
  const d=cents/100;
  if(d>=1000000)return'$'+(d/1000000).toFixed(1).replace(/\.0$/,'')+'M';
  if(d>=1000)return'$'+(d/1000).toFixed(1).replace(/\.0$/,'')+'k';
  return'$'+Math.round(d).toLocaleString('en-CA');
}
function dollarsToCents(str){
  if(!str||str.toString().trim()==='')return null;
  const n=parseFloat(str.toString().replace(/[$,\s]/g,''));
  if(isNaN(n)||n<=0)return null;
  return Math.round(n*100);
}
// Phase 10: value-per-working-day — uses task_value sum when available,
// falls back to project job_value / total days.
function projValuePerDay(proj){
  const holDates=S.holidays.map(h=>h.date);
  const tasks=projTasks(proj.id);
  // Try task-level values first
  const tasksWithValue=tasks.filter(t=>t.task_value&&t.task_value>0);
  if(tasksWithValue.length>0){
    const totalVal=tasksWithValue.reduce((s,t)=>s+t.task_value,0);
    const totalDays=tasksWithValue.reduce((s,t)=>s+workDays(t.segs,holDates,t.wknd),0);
    if(totalDays<=0)return null;
    return totalVal/totalDays;
  }
  // Fall back to project job_value / all task days
  if(!proj.job_value||proj.job_value<=0)return null;
  const totalDays=tasks.reduce((s,t)=>s+workDays(t.segs,holDates,t.wknd),0);
  if(totalDays<=0)return null;
  return proj.job_value/totalDays;
}
function fmtValPerDay(cpd){
  if(!cpd)return null;
  const d=cpd/100;
  if(d>=1000)return'$'+(d/1000).toFixed(1).replace(/\.0$/,'')+'k/day';
  return'$'+Math.round(d)+'/day';
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
// FIX CP2/CP3: onAuthStateChange is the single routing authority after init.
// No _initComplete gate — we use a pendingUrlType variable instead.
let _pendingUrlType=null; // set before client creation, consumed once

function setupAuthListener(){
  sb.auth.onAuthStateChange(async(event,session)=>{
    // If we're currently on a set-password screen, ignore re-fires
    if(document.getElementById('screen-newpass').style.display==='flex')return;

    if(event==='PASSWORD_RECOVERY'){
      showNewPass('Enter a new password for your account.');
      return;
    }
    if(event==='SIGNED_IN'&&_pendingUrlType==='invite'){
      _pendingUrlType=null;
      showNewPass('Welcome! Set a password to complete your account setup.');
      return;
    }
    if(event==='SIGNED_IN'&&session?.user){
      // Normal sign-in — only enter app if we're on a login screen
      const onAuthScreen=AUTH_SCREENS.some(s=>document.getElementById('screen-'+s).style.display==='flex');
      if(onAuthScreen||!currentUser){
        await enterApp(session.user);
      }
      return;
    }
    if(event==='SIGNED_OUT'){
      currentUser=null;
      if(realtimeCh){realtimeCh.unsubscribe();realtimeCh=null}
      showLogin();
    }
  });
}

// enterApp is guarded by _appBusy so concurrent auth events never run it twice.
let _appBusy=false;
async function enterApp(user){
  if(_appBusy){console.log('[Strada] enterApp already running — skipping duplicate call');return}
  _appBusy=true;
  try{
    currentUser=user;
    saveCfg({lastEmail:user.email});
    loadFilters();

    // Show a warning banner if today is past Dec 31 of the configured season year.
    // This means SEASON_YEAR needs to be updated for the new schedule year.
    if(TODAY>SEASON_END_STR){
      setTimeout(()=>toast(
        '⚠ Schedule is configured for '+SEASON_YEAR+'. Update SEASON_YEAR in the code for the new season.',
        'warn'
      ),2000);
    }

    showApp();
    setLoading(true);renderSafe();

    // Attempt initial load. Do NOT show any error toast here regardless of outcome.
    // If loadAll() fails (Supabase waking up), keep the loading spinner — do NOT
    // render the empty state. startRealtime() will recover via scheduleReload()
    // and call setLoading(false) once data arrives.
    try{
      await loadAll();
      setLoading(false);renderSafe(); // only clear loading if data actually arrived
    }catch(e){
      console.warn('[Strada] Initial loadAll failed — keeping spinner, waiting for realtime:',e.message);
      // Do not call setLoading(false) here. scheduleReload() will do it.
    }
    if(!realtimeCh)startRealtime();

    // Late-check: if still loading or no data after 18s, something is genuinely wrong.
    setTimeout(()=>{
      if(S.projects.length===0){
        if(S.loading){setLoading(false);renderSafe();}
        console.warn('[Strada] No data after 18s — database may be unreachable');
        toast('Schedule is empty. Check your connection or visit supabase.com to wake the project.','warn');
      }
    },18000);

  }finally{
    _appBusy=false;
  }
}

// ── DATA LAYER ────────────────────────────────────────────────────────────────
// Phase 11: reads crews[] per segment. Backward-compat: if seg has no crews,
// falls back to the task-level crew field (pre-Phase-11 data).
function dbTaskToApp(t){
  const taskCrew=t.crew||'';
  const segs=Array.isArray(t.segments)&&t.segments.length>0
    ?t.segments.map(sg=>({
        s:sg.s||null,
        e:sg.e||null,
        // crews[] on segment; fall back to task-level crew for old data
        crews:Array.isArray(sg.crews)&&sg.crews.length>0
          ?sg.crews
          :(taskCrew?[taskCrew]:[])
      }))
    :[{s:null,e:null,crews:taskCrew?[taskCrew]:[]}];
  // crew on the task object = first crew of first segment (convenience for legacy code)
  const primaryCrew=(segs[0]?.crews[0])||taskCrew;
  return{id:t.id,project_id:t.project_id,descr:t.descr||'',crew:primaryCrew,
    status:t.status,wknd:t.wknd,sort_order:t.sort_order,
    task_value:t.task_value||null,segs};
}
function appTaskToDB(t){
  // Derive primary crew from first segment's first crew (keeps tasks.crew in sync)
  const primaryCrew=(t.segs&&t.segs[0]&&t.segs[0].crews&&t.segs[0].crews[0])||t.crew||null;
  return{id:t.id,project_id:t.project_id,descr:t.descr,crew:primaryCrew,
    status:t.status,wknd:t.wknd,sort_order:t.sort_order||0,
    task_value:t.task_value||null,
    segments:(t.segs||[]).filter(sg=>sg.s||sg.e).map(sg=>({
      s:sg.s||null,
      e:sg.e||null,
      crews:Array.isArray(sg.crews)?sg.crews.filter(Boolean):[]
    }))};
}

// ── PHASE 8: Undo/redo history for drag operations ────────────────────────────
const MAX_UNDO=20;
let _undoStack=[]; // [{taskId,si,prevS,prevE,newS,newE}]
let _redoStack=[];
function undoPush(entry){_undoStack.push(entry);if(_undoStack.length>MAX_UNDO)_undoStack.shift();_redoStack=[];}
function undoApply(){
  if(!_undoStack.length)return;
  const e=_undoStack.pop();
  _redoStack.push(e);
  _applyDragHistory(e.taskId,e.si,e.prevS,e.prevE);
}
function redoApply(){
  if(!_redoStack.length)return;
  const e=_redoStack.pop();
  _undoStack.push(e);
  _applyDragHistory(e.taskId,e.si,e.newS,e.newE);
}
function _applyDragHistory(taskId,si,s,e2){
  S.tasks=S.tasks.map(t=>{
    if(t.id!==taskId)return t;
    const segs=t.segs.map((sg,i)=>i===si?{...sg,s,e:e2}:sg);
    return{...t,segs};
  });
  _projTaskCache=null;
  renderSafe();
  const t=S.tasks.find(x=>x.id===taskId);
  if(t)upsertTask(t);
}

// Query timeout — 20s gives Supabase free-tier projects time to wake from sleep.
const QUERY_TIMEOUT_MS=20000;
function withTimeout(promise,ms,msg){
  return Promise.race([
    promise,
    new Promise((_,reject)=>setTimeout(()=>reject(new Error(msg||'Database query timed out. Check your Supabase project is active at supabase.com.')),ms))
  ]);
}

        sb.from('subtasks').select('*').order('task_id').order('sort_order')

    );

  }finally{

  }

// Debounced realtime reload — coalesces multiple rapid change events into one
// loadAll(). Without this, saving a project+tasks fires 2 separate loadAll() calls.
let _reloadTimer=null;
function scheduleReload(){
  clearTimeout(_reloadTimer);
  _reloadTimer=setTimeout(()=>loadAll().then(()=>{
    // Clear loading spinner if it's still showing (startup recovery path)
    if(S.loading){setLoading(false);}
    renderSafe();
  }).catch(e=>console.warn('[Strada] realtime reload failed (will retry on next event):',e.message)),400);
}

// Granular realtime handler — updates only the changed row.
// Falls back to full scheduleReload() if payload is missing or unexpected.
function handleRealtimeEvent(table, payload){
  try{
    const{eventType,new:nw,old:ol}=payload;
    if(eventType==='INSERT'||eventType==='UPDATE'){
      if(table==='projects'){
        const p=nw;
        if(S.projects.find(x=>x.id===p.id))S.projects=S.projects.map(x=>x.id===p.id?p:x);
        else S.projects=[...S.projects,p].sort((a,b)=>a.sort_order-b.sort_order);
        _projTaskCache=null;renderSafe();return;
      }
      if(table==='tasks'){
        const t=dbTaskToApp(nw);
        if(S.tasks.find(x=>x.id===t.id))S.tasks=S.tasks.map(x=>x.id===t.id?t:x);
        else S.tasks=[...S.tasks,t];
        _projTaskCache=null;renderSafe();return;
      }
      if(table==='subtasks'){
        const st=nw;
        if(S.subtasks.find(x=>x.id===st.id))S.subtasks=S.subtasks.map(x=>x.id===st.id?st:x);
        else S.subtasks=[...S.subtasks,st];
        renderSafe();return;
      }
    }
    if(eventType==='DELETE'){
      const id=(ol||{}).id;if(!id)throw new Error('no id');
      if(table==='projects'){S.projects=S.projects.filter(x=>x.id!==id);S.tasks=S.tasks.filter(x=>x.project_id!==id);S.subtasks=S.subtasks.filter(x=>x.project_id!==id)}
      if(table==='tasks'){S.tasks=S.tasks.filter(x=>x.id!==id);S.subtasks=S.subtasks.filter(x=>x.task_id!==id)}
      if(table==='subtasks'){S.subtasks=S.subtasks.filter(x=>x.id!==id)}
      _projTaskCache=null;renderSafe();return;
    }
  }catch(e){
    // Payload incomplete (crews/holidays changes, or Supabase delta truncation) — fall back
  }
  scheduleReload();
}

function startRealtime(){
  realtimeCh=sb.channel('db-changes')
    .on('postgres_changes',{event:'*',schema:'public',table:'projects'},p=>handleRealtimeEvent('projects',p))
    .on('postgres_changes',{event:'*',schema:'public',table:'tasks'},p=>handleRealtimeEvent('tasks',p))
    .on('postgres_changes',{event:'*',schema:'public',table:'subtasks'},p=>handleRealtimeEvent('subtasks',p))
    .on('postgres_changes',{event:'*',schema:'public',table:'crews'},scheduleReload)
    .on('postgres_changes',{event:'*',schema:'public',table:'holidays'},scheduleReload)
    .subscribe();
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const d2s=d=>d?d.toISOString().slice(0,10):null;
const s2d=s=>s?new Date(s+'T12:00:00'):null;
const dayOff=s=>{if(!s)return-1;return Math.round((s2d(s)-GS)/86400000)};
const offToS=i=>{const d=new Date(GS);d.setDate(d.getDate()+i);return d.toISOString().slice(0,10)};
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));

/**
 * Count working days across an array of date segments.
 * @param {{s:string|null, e:string|null}[]} segs - array of {s:'YYYY-MM-DD', e:'YYYY-MM-DD'} segments
 * @param {string[]} holDates - ISO date strings for statutory holidays (used as fallback when _holDateSet is empty)
 * @param {boolean} wknd - when true, weekends and holidays are counted as working days
 * @returns {number} total working days
 */
function workDays(segs,holDates,wknd){
  // Memoization key: segment spans + wknd flag. Identical calls within the same
  // render cycle (same task viewed in Gantt + export) return instantly.
  const key=(segs||[]).map(sg=>(sg.s||'')+'-'+(sg.e||'')).join('|')+':'+wknd;
  if(_wdCache.has(key))return _wdCache.get(key);
  // Use _holDateSet (O(1) .has) when populated by buildHolCache().
  // Falls back to a fresh Set from the holDates array when called outside render()
  // (e.g. from modal date pickers that haven't triggered a full render yet).
  const holSet=_holDateSet.size>0?_holDateSet:new Set(holDates||[]);
  let n=0;
  (segs||[]).forEach(seg=>{
    if(!seg.s||!seg.e)return;
    let d=s2d(seg.s),e=s2d(seg.e);
    if(d>e)return;
    while(d<=e){const s=d2s(d),wd=d.getDay();if(wknd||(wd>0&&wd<6&&!holSet.has(s)))n++;d.setDate(d.getDate()+1)}
  });
  _wdCache.set(key,n);
  return n;
}
function projSpan(tasks){let s=null,e=null;tasks.forEach(t=>(t.segs||[]).forEach(sg=>{if(sg.s&&(!s||sg.s<s))s=sg.s;if(sg.e&&(!e||sg.e>e))e=sg.e}));return{s,e}}

/**
 * Derive the state-aware locate badge config for a project.
 * Returns null when locates are not required (no badge shown).
 * @param {{locates_req: string|boolean, locate_public_ordered: boolean,
 *   locate_private_ordered: boolean, locate_public_complete: boolean,
 *   locate_private_complete: boolean, loc_exp: string|null}} proj
 * @returns {{text:string, color:string, bg:string, border:string}|null}
 */
function getLocateBadge(proj){
  const req=proj.locates_req;
  // No badge when not required (handles both boolean false and string "no")
  if(!req||req==='no'||req===false)return null;
  if(req==='unknown')return{text:'❓ LOC?',color:'#92400e',bg:'#fef3c7',border:'#f59e0b'};
  // req is "yes" or boolean true — check stages
  const pubOrd=proj.locate_public_ordered;
  const privOrd=proj.locate_private_ordered;
  const pubDone=proj.locate_public_complete;
  const privDone=proj.locate_private_complete;
  const anyOrdered=pubOrd||privOrd;
  const anyDone=pubDone||privDone;
  // Check expiry (only relevant once something is ordered)
  if(anyOrdered&&proj.loc_exp){
    const exp=new Date(proj.loc_exp+'T12:00:00');
    const today=new Date(TODAY+'T12:00:00');
    const daysLeft=Math.round((exp-today)/86400000);
    if(daysLeft<0)return{text:'🔴 EXPIRED',color:'#dc2626',bg:'#fee2e2',border:'#dc2626'};
    if(daysLeft<=3)return{text:'🟠 EXPIRING',color:'#ea580c',bg:'#fed7aa',border:'#f97316'};
  }
  if(anyOrdered&&anyDone)return{text:'🟢 ACTIVE',color:'#166534',bg:'#dcfce7',border:'#16a34a'};
  if(anyOrdered)return{text:'🟡 PENDING',color:'#854d0e',bg:'#fef9c3',border:'#ca8a04'};
  return{text:'🔵 ORDER',color:'#1d4ed8',bg:'#dbeafe',border:'#3b82f6'};
}

// ── segCrews: resolve the crew list for a single segment ────────────────────
// Phase 11+ stores crews per-segment in seg.crews[].
// Older tasks use the task-level crew string. This helper centralises the
// backward-compat fallback so it never needs to be repeated inline.
// Returns an array of crew name strings (may be empty, never null).
/**
 * Resolve the crew list for a single segment with backward-compat fallback.
 * Phase 11+ stores crews per-segment in seg.crews[]. Older tasks use the
 * task-level crew string. Always returns an array — never null.
 * @param {{crews?: string[]}} seg
 * @param {{crew?: string}} task
 * @returns {string[]} crew name strings for this segment
 */
function segCrews(seg,task){
  if(seg&&Array.isArray(seg.crews)&&seg.crews.length>0)return seg.crews;
  if(task&&task.crew)return[task.crew];
  return[];
}

// ── PERFORMANCE: projTasks memoisation ───────────────────────────────────────
// projTasks() was O(N_tasks) per call; called ~50+ times per render = O(N²).
// We build a lookup map once per render and reuse it.
let _projTaskCache=null;
function buildProjTaskCache(){
  _projTaskCache={};
  S.tasks.forEach(t=>{
    if(!_projTaskCache[t.project_id])_projTaskCache[t.project_id]=[];
    _projTaskCache[t.project_id].push(t);
  });
  Object.values(_projTaskCache).forEach(arr=>arr.sort((a,b)=>a.sort_order-b.sort_order));
}
function projTasks(pid){
  if(_projTaskCache)return _projTaskCache[pid]||[];
  return S.tasks.filter(t=>t.project_id===pid).sort((a,b)=>a.sort_order-b.sort_order);
}

// ── PERFORMANCE: holiday Set + workDays memoization ─────────────────────────
// _holDateSet: Set<string> — O(1) .has() replaces O(N) .includes() in workDays.
// Switching from Array.includes (O(N) per day) to Set.has (O(1)) removes ~130 000
// operations per full render when 40+ tasks span a 90-day range with 10 holidays.
// _wdCache: Map — memoizes workDays results keyed by seg-hash + wknd flag.
// On repeat renders (filter toggle, sort, crew chip) all 13+ workDays calls are
// cache hits — reducing cost from O(N×days) iterations to O(1) Map.get() each.
// Both are rebuilt/cleared at the top of render() and after loadAll().
let _holDateSet=new Set();
function buildHolCache(){_holDateSet=new Set(S.holidays.map(h=>h.date))}
let _wdCache=new Map();

// ── PERFORMANCE: Calendar header cache ───────────────────────────────────────
// The 275-day calendar header (9 month + 275 day + 275 weekday cells = 559 DOM
// elements) is identical on every render. We build it once and clone it.
let _calCache=null; // {key:string, node:Element}
function getCalHeader(totalW,holI){

  const dr=el('div');dr.className='day-row';
  ALL_DATES.forEach((d,i)=>{

    dc.style.color=tod?'#333':'#fff';if(tod||wk)dc.style.fontWeight='700';dc.textContent=d.getDate();dr.appendChild(dc);
  });calw.appendChild(dr);
  const wr=el('div');wr.className='wd-row';
  ALL_DATES.forEach((d,i)=>{

    wc.style.cssText='width:'+DW+'px;height:10px;background:'+(wk?'#9a9ea8':'#1a3a6a');
    wc.style.color=wk?'#555':'rgba(255,255,255,.5)';wc.textContent='SMTWTFS'[d.getDay()];wr.appendChild(wc);
  });calw.appendChild(wr);
  _calCache={key,node:calw};

function toast(msg,type){
  const tc=document.getElementById('toasts');const t=el('div');t.className='toast';t.textContent=msg;
  if(type==='error')t.style.background='#7f1d1d';

function refreshToolbar(){const h=document.getElementById('toolbar');if(h){const n=buildToolbar();h.parentNode.replaceChild(n,h)}}
let bgGrad=null;
function buildBgGrad(holI){
  const all=[...new Set([...WDAY_IDXS,...holI])].sort((a,b)=>a-b);
  if(!all.length)return'';const parts=[];let prev=0;
  all.forEach(i=>{const l=i*DW,r=(i+1)*DW,isH=holI.includes(i);if(l>prev)parts.push('transparent '+prev+'px,transparent '+l+'px');const clr=isH?'rgba(220,53,69,.07)':'rgba(0,0,0,.04)';parts.push(clr+' '+l+'px,'+clr+' '+r+'px');prev=r});
  const tot=NDAYS*DW;if(prev<tot)parts.push('transparent '+prev+'px,transparent '+tot+'px');
  return'linear-gradient(to right,'+parts.join(',')+')'
}

// ── MODAL SYSTEM — FIX CP1 ────────────────────────────────────────────────────
// Modals render into #modal-root (outside #main) so main.innerHTML='' never
// destroys them, and there is always exactly one modal in the DOM at a time.
function closeModal(){
  S.modal=null;
  document.getElementById('modal-root').innerHTML='';
}
function openModal(){
  const root=document.getElementById('modal-root');
  root.innerHTML=''; // always clear first — prevents ghost modals
  if(!S.modal)return;
  const bg=el('div');bg.className='modal-bg';
  bg.setAttribute('role','presentation'); // backdrop is not the dialog
  bg.addEventListener('click',e=>{if(e.target===bg)closeModal()});
  const m=el('div');m.className='modal';
  m.setAttribute('role','dialog');
  m.setAttribute('aria-modal','true');
  // aria-labelledby is set by mhdr() after the heading element is created
  if(S.modal.type==='proj')buildProjModal(m);
  else if(S.modal.type==='task')buildTaskModal(m);
  else if(S.modal.type==='crew')buildCrewModal(m);
  else if(S.modal.type==='import')buildImportModal(m);
  else if(S.modal.type==='export')buildExportModal(m);
  bg.appendChild(m);root.appendChild(bg);
  // Move focus to first interactive element so keyboard users land inside the modal
  requestAnimationFrame(()=>{
    const first=m.querySelector('input,select,textarea,button:not(.modal-close)');
    if(first)first.focus();
  });
}
// Escape key closes modal. Ctrl+Z/Y handle undo/redo for drag operations.
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&S.modal)closeModal();
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();undoApply();refreshToolbar()}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();redoApply();refreshToolbar()}
});

// ── confirmModal ──────────────────────────────────────────────────────────────
// Async replacement for native confirm(). Uses the existing modal-root so it
// matches the app design and doesn't block the main thread.
// Usage: if(!await confirmModal('Delete this task?','Delete',true))return;
// @param {string}  message       — text shown to the user
// @param {string}  confirmLabel  — confirm button label (default 'Confirm')
// @param {boolean} danger        — true = red btn-danger, false = btn-primary
// @returns {Promise<boolean>}
function confirmModal(message,confirmLabel='Confirm',danger=true){
  return new Promise(resolve=>{
    const root=document.getElementById('modal-root');
    root.innerHTML='';
    const bg=el('div');bg.className='modal-bg';
    bg.setAttribute('role','presentation');
    bg.addEventListener('click',e=>{if(e.target===bg){root.innerHTML='';resolve(false)}});
    const m=el('div');m.className='modal';
    m.style.cssText='max-width:400px;padding:28px';
    m.setAttribute('role','alertdialog');
    m.setAttribute('aria-modal','true');
    const msgP=el('p');
    msgP.style.cssText='font-size:14px;color:#1a2b4a;margin-bottom:24px;line-height:1.6';
    msgP.textContent=message;m.appendChild(msgP);
    const btns=el('div');btns.style.cssText='display:flex;gap:8px;justify-content:flex-end';
    const cancel=el('button');cancel.className='btn-sec';cancel.textContent='Cancel';
    cancel.setAttribute('aria-label','Cancel');
    cancel.onclick=()=>{root.innerHTML='';resolve(false)};
    const ok=el('button');
    ok.className=danger?'btn-danger':'btn-primary';
    ok.textContent=confirmLabel;
    ok.setAttribute('aria-label',confirmLabel);
    ok.onclick=()=>{root.innerHTML='';resolve(true)};
    btns.appendChild(cancel);btns.appendChild(ok);m.appendChild(btns);
    bg.appendChild(m);root.appendChild(bg);
    // Escape cancels
    const onKey=e=>{
      if(e.key==='Escape'){root.innerHTML='';document.removeEventListener('keydown',onKey);resolve(false)}
    };
    document.addEventListener('keydown',onKey);
    // Auto-focus the confirm button for keyboard accessibility
    requestAnimationFrame(()=>ok.focus());
  });
}

// ── FILTER & SORT LOGIC ───────────────────────────────────────────────────────
function taskOverlapsRange(task,from,to){
  return (task.segs||[]).some(seg=>{
    if(!seg.s||!seg.e)return false;
    if(from&&seg.e<from)return false;
    if(to&&seg.s>to)return false;
    return true;
  });
}
function isFilterActive(){
  const f=S.filter;
  return f.crews.length>0||f.hideComplete||!!f.dateFrom||!!f.dateTo||f.sortBy!=='default';
}
function countActiveFilters(){
  const f=S.filter;
  let n=0;
  if(f.crews.length>0)n++;
  if(f.hideComplete)n++;
  if(f.dateFrom||f.dateTo)n++;
  if(f.sortBy!=='default')n++;
  return n;
}
function clearFilters(){
  S.filter={crews:[],hideComplete:false,dateFrom:null,dateTo:null,sortBy:'default',showArchived:false};
  saveFilters();
}
/**
 * Apply the current filter state (S.filter) to S.projects and their tasks.
 * Filters by crew, date range, status, and archived state. Also applies sort.
 * Must be called after buildProjTaskCache() so projTasks() lookups are O(1).
 * @returns {{projects: object[], visibleTasks: Object.<string, object[]>}}
 *   projects — filtered+sorted project list
 *   visibleTasks — map of project_id → filtered task array
 */
function applyFilters(){
  let projects=[...S.projects];
  const f=S.filter;
  // 0. Archive filter — hide archived unless showArchived is ON
  if(!f.showArchived)projects=projects.filter(p=>!p.archived);
  // 1. Hide complete projects
  if(f.hideComplete)projects=projects.filter(p=>p.status!=='Complete');
  // 2. Crew filter — keep project if any task has any segment with a matching crew
  if(f.crews.length>0)projects=projects.filter(p=>
    projTasks(p.id).some(t=>
      t.segs.some(sg=>segCrews(sg,t).some(c=>f.crews.includes(c)))
    )
  );
  // 3. Date range — keep project if at least one task overlaps range
  if(f.dateFrom||f.dateTo)projects=projects.filter(p=>projTasks(p.id).some(t=>taskOverlapsRange(t,f.dateFrom,f.dateTo)));
  // 4. Sort
  if(f.sortBy==='startDate'){
    projects=[...projects].sort((a,b)=>{
      const sa=projSpan(projTasks(a.id)).s||'9999-12-31';
      const sb=projSpan(projTasks(b.id)).s||'9999-12-31';
      return sa.localeCompare(sb);
    });
  }else if(f.sortBy==='client'){
    projects=[...projects].sort((a,b)=>a.client.localeCompare(b.client));
  }else if(f.sortBy==='jobNum'){
    projects=[...projects].sort((a,b)=>a.job_num.localeCompare(b.job_num));
  }else if(f.sortBy==='valuePerDay'){
    // Phase 8 CP9: sort by value/day descending; no-value projects go to bottom
    projects=[...projects].sort((a,b)=>{
      const va=projValuePerDay(a),vb=projValuePerDay(b);
      if(va===null&&vb===null)return 0;
      if(va===null)return 1;
      if(vb===null)return -1;
      return vb-va;
    });
  }
  // Build per-project visible task arrays (crew+date filter applied to tasks too)
  const visibleTasks={};
  projects.forEach(p=>{
    let tasks=projTasks(p.id);
    if(f.hideComplete)tasks=tasks.filter(t=>t.status!=='Complete');
    if(f.crews.length>0)tasks=tasks.filter(t=>
      t.segs.some(sg=>segCrews(sg,t).some(c=>f.crews.includes(c)))
    );
    if(f.dateFrom||f.dateTo)tasks=tasks.filter(t=>taskOverlapsRange(t,f.dateFrom,f.dateTo));
    visibleTasks[p.id]=tasks;
  });
  return{projects,visibleTasks};
}

    // Build crew → tasks map for the date window
    const crewTasks={};
    crewNames.forEach(cn2=>{crewTasks[cn2]=[]});

    projs.forEach(proj=>{
      projTasks(proj.id).forEach(task=>{
        // Check if any segment overlaps [from,to]
        const overlapping=(task.segs||[]).filter(seg=>{
          if(!seg.s||!seg.e)return false;
          return seg.e>=from&&seg.s<=to;
        });
        if(overlapping.length===0)return;
        // Collect all unique crews across overlapping segments
        const taskCrews=[...new Set(overlapping.flatMap(sg=>segCrews(sg,task)))];
        // Add task to each crew's section (so joint tasks appear under both)
        taskCrews.forEach(cn2=>{
          if(crewTasks[cn2])crewTasks[cn2].push({proj,task,segs:overlapping});
        });
        // If task has no crew at all, put it under an 'Unassigned' bucket
        if(taskCrews.length===0&&crewTasks[''])crewTasks[''].push({proj,task,segs:overlapping});
      });
    });

    const hasAny=crewNames.some(cn2=>crewTasks[cn2].length>0);
    if(!hasAny){
      const emp=el('div');emp.style.cssText='padding:20px;text-align:center;color:#aaa;font-size:12px';
      emp.textContent='No tasks scheduled in this date range.';bodyWrap.appendChild(emp);return;
    }

    crewNames.forEach(cn2=>{
      const crew=cm[cn2];if(!crew)return;
      const tasks=crewTasks[cn2];

      const hdr=el('div');hdr.className='fs-crew-hdr';
      hdr.style.cssText='background:'+crew.color+';color:'+crew.tc+';font-size:11px;font-weight:800;padding:6px 10px;border-radius:5px;margin:10px 0 4px;letter-spacing:.3px';
      hdr.textContent=crew.name+(tasks.length===0?' — No work scheduled':' — '+tasks.length+' task'+(tasks.length!==1?'s':''));
      bodyWrap.appendChild(hdr);

      if(tasks.length===0){
        const nw=el('div');nw.className='fs-nowork';nw.textContent='No work scheduled this period.';bodyWrap.appendChild(nw);return;
      }
      tasks.forEach(({proj,task,segs})=>{
        const row=el('div');row.className='fs-task-row';row.style.background=crew.color+'12';
        const jn=el('span');jn.className='fs-job';jn.textContent=proj.job_num;row.appendChild(jn);
        const desc=el('span');desc.className='fs-desc';desc.textContent=task.descr||'(no description)';row.appendChild(desc);
        const wd=workDays(segs,holDates,task.wknd);
        const dspan=el('span');dspan.className='fs-dates';
        const rangeStr=segs.map(sg=>fmtDate(sg.s)+(sg.s!==sg.e?'–'+fmtDate(sg.e):'')).join(', ');
        dspan.textContent=rangeStr+(wd>0?' ('+wd+'d)':'');row.appendChild(dspan);
        const loc=el('span');loc.style.cssText='font-size:10px;color:#888;white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis';
        loc.textContent=proj.loc;row.appendChild(loc);
        // Subtask alerts for this task
        const subs=taskSubtasks(task.id).filter(s=>!s.complete);
        if(subs.length>0){
          const alert=el('span');alert.style.cssText='font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;background:#fef3c7;color:#92400e;white-space:nowrap;flex-shrink:0';
          alert.textContent='⚙ '+subs.length+' item'+(subs.length!==1?'s':'')+' pending';
          alert.title=subs.map(s=>s.descr).join(', ');
          row.appendChild(alert);
        }
        bodyWrap.appendChild(row);
      });
    });
  }
  rebuildBody();
}

// buildGanttSVG: renders a print-quality SVG Gantt for the given date range and crew filter.
function buildGanttSVG(from,to,crewFilter,showGrid=false){
  const dayW=18,leftW=340,daysColW=30,rowH=22,projH=34,hdrH=32;
  const holDates=S.holidays.map(h=>h.date);
  const cm=crewMap();
  buildProjTaskCache();

  // Build list of dates in range
  const fromD=new Date(from+'T12:00:00'),toD=new Date(to+'T12:00:00');
  const nDays=Math.round((toD-fromD)/86400000)+1;
  if(nDays<=0||nDays>550)return'<svg><text y="20" x="10">Invalid date range</text></svg>';

  const dates=Array.from({length:nDays},(_,i)=>{const d=new Date(fromD);d.setDate(d.getDate()+i);return d});
  const dateStrs=dates.map(d=>d.toISOString().slice(0,10));
  const totalW=leftW+nDays*dayW;

  // Collect rows
  const projs=applyFilters().projects.filter(p=>!p.archived);
  const rows=[];
  projs.forEach(proj=>{
    const tasks=projTasks(proj.id).filter(t=>!crewFilter.length||crewFilter.includes(t.crew));
    const hasWork=tasks.some(t=>(t.segs||[]).some(sg=>sg.s&&sg.e&&sg.e>=from&&sg.s<=to));
    if(!hasWork)return;
    rows.push({type:'proj',proj});
    tasks.forEach(task=>{
      const hasSegs=(task.segs||[]).some(sg=>sg.s&&sg.e&&sg.e>=from&&sg.s<=to);
      if(hasSegs)rows.push({type:'task',proj,task});
    });
  });

  // Calculate actual total height — project rows are taller than task rows
  const totalH=hdrH+rows.reduce((s,r)=>s+(r.type==='proj'?projH:rowH),0)+4;
  let svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${totalW}" height="${totalH}" style="font-family:Arial,sans-serif">`;

  // ── Background: weekend columns ──────────────────────────────────────────
  dates.forEach((d,i)=>{
    const wd=d.getDay();
    if(wd===0||wd===6){
      svg+=`<rect x="${leftW+i*dayW}" y="0" width="${dayW}" height="${totalH}" fill="#f0f0f0" opacity="0.6"/>`;
    }
  });

  // ── Month header row (18px) ──────────────────────────────────────────────
  const MCOL={'APRIL':'#1565A9','MAY':'#217346','JUNE':'#BF5700','JULY':'#7B3F00',
               'AUGUST':'#5C2D91','SEPTEMBER':'#005B70','OCTOBER':'#7D4000',
               'NOVEMBER':'#2B4B6E','DECEMBER':'#8B0000','JANUARY':'#1F3864','FEBRUARY':'#374151','MARCH':'#065F46'};
  const MNAMES=['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
  let curMonth=-1,mStart=0,mName='';
  const flushMonth=(endI)=>{
    if(curMonth<0)return;
    const col=MCOL[mName]||'#1F3864';
    const mx=leftW+mStart*dayW,mw=(endI-mStart)*dayW;
    svg+=`<rect x="${mx}" y="0" width="${mw}" height="18" fill="${col}"/>`;
    svg+=`<text x="${mx+4}" y="13" font-size="9" font-weight="700" fill="white" letter-spacing="0.5">${escSvg(mName)}</text>`;
    svg+=`<line x1="${mx}" y1="0" x2="${mx}" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>`;
  };
  dates.forEach((d,i)=>{
    const mn=d.getMonth();
    if(mn!==curMonth){flushMonth(i);curMonth=mn;mStart=i;mName=MNAMES[mn]}
  });
  flushMonth(nDays);

  // ── Day header row (14px at y=18) ────────────────────────────────────────
  dates.forEach((d,i)=>{
    const wd=d.getDay();const isWknd=wd===0||wd===6;const isToday=dateStrs[i]===TODAY;
    const bg=isToday?'#FFD700':isWknd?'#b0b4be':'#2a4a80';
    svg+=`<rect x="${leftW+i*dayW}" y="18" width="${dayW}" height="14" fill="${bg}"/>`;
    svg+=`<text x="${leftW+i*dayW+dayW/2}" y="29" font-size="8" fill="${isToday?'#333':'white'}" text-anchor="middle">${escSvg(String(d.getDate()))}</text>`;
  });

  // ── Left panel header ────────────────────────────────────────────────────
  svg+=`<rect x="0" y="0" width="${leftW}" height="${hdrH}" fill="#1F3864"/>`;
  svg+=`<text x="8" y="22" font-size="10" fill="rgba(255,255,255,0.6)">${escSvg('Task / Project')}</text>`;

  // ── Rows ─────────────────────────────────────────────────────────────────
  let y=hdrH;
  rows.forEach((row,ri)=>{
    const h=row.type==='proj'?projH:rowH;
    if(row.type==='proj'){
      // Project row — full navy background, two lines of info
      svg+=`<rect x="0" y="${y}" width="${totalW}" height="${h}" fill="#2F4F8F"/>`;
      // Line 1: job# + client
      const line1=`${row.proj.job_num}  ${row.proj.client}`.slice(0,55);
      svg+=`<text x="8" y="${y+11}" font-size="10" font-weight="700" fill="white">${escSvg(line1)}</text>`;
      // Line 2: address + estimate# + locates flag
      const locBadgeSvg=getLocateBadge(row.proj);
      const locFlag=locBadgeSvg?locBadgeSvg.text:'';
      const estPart=row.proj.estimate_num?'Est#'+row.proj.estimate_num:'';
      const line2=[row.proj.loc,estPart,locFlag].filter(Boolean).join('  ·  ').slice(0,60);
      if(line2)svg+=`<text x="8" y="${y+23}" font-size="8" fill="rgba(255,255,255,0.75)">${escSvg(line2)}</text>`;
      // Project span bar
      const sp=projSpan(projTasks(row.proj.id));
      if(sp.s&&sp.e){
        const sx=Math.max(0,dateStrs.indexOf(sp.s));
        const ex=Math.min(nDays-1,dateStrs.indexOf(sp.e));
        if(sx>=0&&ex>=sx){
          svg+=`<rect x="${leftW+sx*dayW}" y="${y+h/2-3}" width="${(ex-sx+1)*dayW}" height="6" fill="rgba(255,255,255,0.25)" rx="2"/>`;
        }
      }
    }else{
      // Task row
      const bg=ri%2===0?'#EFF3FA':'#F8FAFC';
      svg+=`<rect x="0" y="${y}" width="${leftW}" height="${h}" fill="${bg}"/>`;
      svg+=`<rect x="${leftW}" y="${y}" width="${totalW-leftW}" height="${h}" fill="${bg}"/>`;
      svg+=`<line x1="0" y1="${y+h}" x2="${totalW}" y2="${y+h}" stroke="#e2e6ed" stroke-width="1"/>`;
      svg+=`<line x1="${leftW}" y1="${y}" x2="${leftW}" y2="${y+h}" stroke="#c0cce0" stroke-width="2"/>`;
      // Days badge area (right side of left panel)
      const taskWd=workDays(row.task.segs,holDates,row.task.wknd);
      if(taskWd>0){
        svg+=`<rect x="${leftW-daysColW}" y="${y+2}" width="${daysColW-2}" height="${h-4}" fill="#e0e7ff" rx="3"/>`;
        svg+=`<text x="${leftW-daysColW/2-1}" y="${y+h/2+4}" font-size="8" font-weight="700" fill="#3730a3" text-anchor="middle">${escSvg(String(taskWd))}d</text>`;
      }
      // Separator line between task text and days column
      svg+=`<line x1="${leftW-daysColW}" y1="${y}" x2="${leftW-daysColW}" y2="${y+h}" stroke="#d0d7e3" stroke-width="0.5"/>`;
      const descr=(row.task.descr||'').slice(0,34);
      svg+=`<text x="22" y="${y+h/2+4}" font-size="9" fill="#1a2b4a">${escSvg(descr)}</text>`;
      // Crew dot (primary crew of first segment)
      const firstSegCrews=(row.task.segs[0]?.crews&&row.task.segs[0].crews.length>0)?row.task.segs[0].crews:(row.task.crew?[row.task.crew]:[]);
      const firstCrew=cm[firstSegCrews[0]];
      if(firstCrew)svg+=`<circle cx="13" cy="${y+h/2}" r="4" fill="${firstCrew.color}"/>`;
      // Segment bars — per-segment crew colors
      (row.task.segs||[]).forEach(seg=>{
        if(!seg.s||!seg.e)return;
        if(seg.e<from||seg.s>to)return;
        const crewsForSeg=segCrews(seg,row.task);
        const primCrew=cm[crewsForSeg[0]];const color=primCrew?primCrew.color:'#aaa';
        const secCrew=crewsForSeg[1]?cm[crewsForSeg[1]]:null;
        const clampS=seg.s<from?from:seg.s;
        const clampE=seg.e>to?to:seg.e;
        const si=dateStrs.indexOf(clampS);
        const ei=dateStrs.indexOf(clampE);
        if(si<0||ei<0||ei<si)return;
        let rxs=null,rxe=null;
        for(let i=si;i<=ei;i++){
          const wd=dates[i].getDay();
          const skip=!row.task.wknd&&(wd===0||wd===6||(_holDateSet.size>0?_holDateSet:new Set(holDates)).has(dateStrs[i]));
          if(!skip){if(rxs===null)rxs=i;rxe=i;}
          else{if(rxs!==null){
            svg+=`<rect x="${leftW+rxs*dayW+1}" y="${y+3}" width="${(rxe-rxs+1)*dayW-2}" height="${h-6}" fill="${color}" rx="3"/>`;
            if(secCrew)svg+=`<rect x="${leftW+rxs*dayW+1}" y="${y+3}" width="${(rxe-rxs+1)*dayW-2}" height="3" fill="${secCrew.color}" rx="1"/>`;
            rxs=rxe=null;
          }}
        }
        if(rxs!==null){
          svg+=`<rect x="${leftW+rxs*dayW+1}" y="${y+3}" width="${(rxe-rxs+1)*dayW-2}" height="${h-6}" fill="${color}" rx="3"/>`;
          if(secCrew)svg+=`<rect x="${leftW+rxs*dayW+1}" y="${y+3}" width="${(rxe-rxs+1)*dayW-2}" height="3" fill="${secCrew.color}" rx="1"/>`;
        }
      });
    }
    y+=h;
  });

  // ── Grid lines (drawn on top of rows, under today marker) ────────────────
  if(showGrid){
    // Vertical day separators across full chart height
    for(let i=1;i<nDays;i++){
      const x=leftW+i*dayW;
      svg+=`<line x1="${x}" y1="${hdrH}" x2="${x}" y2="${totalH}" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>`;
    }
  }

  // ── Today marker — full column highlight ─────────────────────────────────
  const todayIdx=dateStrs.indexOf(TODAY);
  if(todayIdx>=0){
    const tx=leftW+todayIdx*dayW;
    svg+=`<rect x="${tx}" y="${hdrH}" width="${dayW}" height="${totalH-hdrH}" fill="rgba(255,210,0,0.12)"/>`;
    svg+=`<line x1="${tx}" y1="0" x2="${tx}" y2="${totalH}" stroke="rgba(255,180,0,0.8)" stroke-width="2"/>`;
  }

  // ── Border ───────────────────────────────────────────────────────────────
  svg+=`<rect x="0" y="0" width="${totalW}" height="${totalH}" fill="none" stroke="#d0d7e3" stroke-width="1"/>`;
  svg+='</svg>';
  return svg;
}

// escSvg() MUST wrap ALL dynamic values inserted into svg+= template literals.
// Static string literals are exempt. User-data fields and computed values are never exempt.
function escSvg(s){
  return(s||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

// sanitize(): strip HTML tags and control characters from AI-extracted or user-supplied strings.
// Apply to all fields stored in the database that originate from the import flow.
const sanitize=(s,maxLen=500)=>(s||'')
  .replace(/<[^>]*>/g,'')                        // strip HTML tags
  .replace(/[\x00-\x08\x0B\x0C\x0E-\x1F]/g,'')  // strip non-printable control chars
  .trim()
  .slice(0,maxLen);

function csvRowValues(p,holDates){
  const tasks=projTasks(p.id);
  const sp2=projSpan(tasks);
  const totalWd=tasks.reduce((s,t)=>s+workDays(t.segs,holDates,t.wknd),0);
  const crews=[...new Set(tasks.flatMap(t=>t.segs.flatMap(sg=>segCrews(sg,t))))].filter(Boolean).join('; ')||'';
  const taskDescs=tasks.map(t=>t.descr).filter(Boolean).join('; ');
  const subtaskCount=tasks.reduce((n,t)=>n+taskSubtasks(t.id).length,0);
  // Locate status string
  const locReq=p.locates_req;
  const locatesStr=(!locReq||locReq==='no')?'No':locReq==='unknown'?'Unknown':'Yes';
  const locBadge=getLocateBadge(p);
  const locStage=locBadge?locBadge.text.replace(/[^\w\s]/g,'').trim():'';
  return[
    p.job_num,p.client,p.loc,p.status,
    p.job_value?(p.job_value/100).toFixed(2):'',
    p.po_num||'',p.estimate_num||'',p.invoice_num||'',
    locatesStr,p.soils_req?'Yes':'No',
    locStage,p.loc_exp||'',
    sp2.s||'',sp2.e||'',totalWd||0,
    crews,tasks.length,subtaskCount||'',
    p.notes||'',taskDescs
  ];
}

}
async function saveApiKey(key){
  try{
    const{error}=await withTimeout(
      sb.from('settings').upsert({key:'anthropic_api_key',value:key.trim()}),
      QUERY_TIMEOUT_MS,
      'Save timed out. Your Supabase project may be paused — visit supabase.com to wake it up.'

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();r.onload=e=>resolve(e.target.result.split(',')[1]);r.onerror=reject;r.readAsDataURL(file);
  });
}
async function docxToText(file){
  // Load mammoth.js on demand — only when a .docx file is actually being analysed.
  // This avoids a blocking synchronous CDN request on every page load.
  if(typeof mammoth==='undefined'){
    await new Promise((resolve,reject)=>{
      const s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js';
      s.onload=resolve;
      s.onerror=()=>reject(new Error('Could not load Word doc parser. Please paste the text manually instead.'));
      document.head.appendChild(s);
    });
  }
  const buf=await file.arrayBuffer();
  const result=await mammoth.extractRawText({arrayBuffer:buf});
  if(!result.value||result.value.trim().length<20)throw new Error('Could not extract readable text from this file. Try pasting the content manually.');
  return result.value;
}
const CLAUDE_SYSTEM=`You extract project info from construction quotes and price schedules.
Return ONLY a valid JSON object — no markdown, no explanation, nothing else:
{"job_num":"","client":"","location":"","tasks":[{"description":"","quantity":""}]}
Rules: job_num=project/job number if shown, else ""; client=customer/company name; location=project address or site name; tasks=each scope item or line item as one entry; quantity=qty+unit if shown (e.g. "304 m²", "50mm HL3F") else "".`;

async function callClaude(apiKey,content){
  // Phase 9 FIX: 30-second timeout + friendly CORS error message
  const controller=new AbortController();
  const timer=setTimeout(()=>controller.abort(),30000);
  let resp;
  try{
    resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      signal:controller.signal,
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-allow-browser':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:2000,system:CLAUDE_SYSTEM,messages:[{role:'user',content}]})
    });
  }catch(fetchErr){
    clearTimeout(timer);
    if(fetchErr.name==='AbortError')throw new Error('Request timed out after 30 seconds. Check your internet connection and try again.');
    // "Failed to fetch" / NetworkError — almost always a browser extension blocking the request
    throw new Error('Browser blocked the request. Try disabling extensions (uBlock Origin, Privacy Badger, AdBlock) or use the text paste field below instead — it works without an internet connection to the AI.');
  }finally{clearTimeout(timer)}
  if(!resp.ok){
    let msg='Claude API error '+resp.status;
    try{const e=await resp.json();msg=e.error?.message||msg}catch{}
    throw new Error(msg);
  }
  const data=await resp.json();
  const raw=(data.content||[])[0]?.text||'';
  const clean=raw.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
  const parsed=JSON.parse(clean);
  if(!Array.isArray(parsed.tasks))throw new Error('Unexpected response — Claude did not return tasks array.');
  return parsed;
}
// ── LOCAL ESTIMATE PARSER ────────────────────────────────────────────────────
// Parses pasted QBO / Strada estimate text without requiring an API call.
// Handles the standard QBO format: ESTIMATE # XXXX, ADDRESS block, line items.
function parseEstimateLocally(t){
  const result={job_num:'',client:'',location:'',tasks:[]};

  // Estimate / job number
  const estMatch=t.match(/(?:estimate|job)\s*#\s*([A-Za-z0-9\-]+)/i);
  if(estMatch)result.job_num=estMatch[1].trim();

  // Client — QBO puts client name right after ADDRESS label
  const addrMatch=t.match(/ADDRESS[\s\n]+([^\n]+)/i);
  if(addrMatch)result.client=addrMatch[1].trim();

  // Location — QBO "SHIP TO" block
  const shipMatch=t.match(/SHIP\s*TO[\s\n]+([^\n]+)/i);
  if(shipMatch)result.location=shipMatch[1].trim();

  // Line items — scan lines after the ACTIVITY header
  // QBO format: activity title (short line), description lines, then QTY RATE AMOUNT
  const lines=t.split('\n');
  const amtRe=/^([\d,]+)\s+([\d,]+\.\d{2})\s+([\d,]+\.\d{2})\s*$/;
  const skipRe=/subtotal|hst|total|gst|tax|activity|rate|amount|date|address|ship|accepted|estimate|registration/i;

  let inItems=false;
  let firstTitle=null;
  for(let i=0;i<lines.length;i++){
    const line=lines[i].trim();
    if(!line)continue;
    // Start scanning after the ACTIVITY QTY RATE AMOUNT header row
    if(/^ACTIVITY\s+QTY/i.test(line)){inItems=true;continue;}
    if(!inItems)continue;
    const amtMatch=line.match(amtRe);
    if(amtMatch){
      const qty=amtMatch[1],amount=amtMatch[3];
      if(firstTitle){
        result.tasks.push({
          description:firstTitle,
          quantity:qty+(qty==='1'?' unit':' units')+' — $'+amount
        });
      }
      firstTitle=null;
    }else if(firstTitle===null&&line.length<55&&/^[A-Z]/.test(line)&&!skipRe.test(line)&&!/^\d/.test(line)){
      // First short title-case line after an amount = next activity header
      firstTitle=line;
    }
  }

  // Return null if nothing useful was found
  if(!result.client&&result.tasks.length===0)return null;
  return result;
}

async function runAnalysis(file,pasteText){
  // ── PASTE TEXT PATH ───────────────────────────────────────────────────────
  // If the user pasted text, try the local parser first — no API key required.
  // This works reliably for QBO estimates and Strada estimates.
  if(pasteText&&pasteText.trim().length>20){
    const local=parseEstimateLocally(pasteText.trim());
    if(local&&(local.client||local.tasks.length>0)){
      return local; // success — no API call needed
    }
    // Local parser couldn't extract enough — try API
    const apiKey=await fetchApiKey();
    if(!apiKey)throw new Error('Could not parse this document automatically. Go to Settings → Data → save your Anthropic API key, then try again — or make sure the pasted text includes the client name and line items.');
    return await callClaude(apiKey,'Extract project info from this construction document:\n\n'+pasteText.trim());
  }

  // ── FILE PATH — requires API ──────────────────────────────────────────────
  if(!file)throw new Error('Please select a file or paste some text.');
  const apiKey=await fetchApiKey();
  if(!apiKey)throw new Error('No Anthropic API key found. Go to Settings → Data → API Keys and save your key first. Or paste the document text directly into the text field — that works without an API key.');
  const ext=file.name.split('.').pop().toLowerCase();
  if(ext==='pdf'){
    const b64=await fileToBase64(file);
    return await callClaude(apiKey,[
      {type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},
      {type:'text',text:'Extract the project information from this construction quote or price schedule.'}
    ]);
  }else if(ext==='docx'){
    const text=await docxToText(file);
    return await callClaude(apiKey,'Extract project info from this construction document:\n\n'+text);
  }else{
    throw new Error('File type ".'+ext+'" is not supported. Please use a PDF or .docx file, or paste the text directly.');
  }
}

// ── DRAG ──────────────────────────────────────────────────────────────────────
let drag=null;
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  const delta=Math.round((e.clientX-drag.startX)/DW);
  if(delta===drag.lastDelta)return;
  drag.lastDelta=delta;

  const origSI=dayOff(drag.origS),origEI=dayOff(drag.origE);
  let ns=drag.origS,ne=drag.origE;
  if(drag.type==='move'){
    ns=offToS(clamp(origSI+delta,0,NDAYS-1));
    ne=offToS(clamp(origEI+delta,0,NDAYS-1));
  }else if(drag.type==='left'){
    ns=offToS(clamp(origSI+delta,0,origEI));
  }else{
    ne=offToS(clamp(origEI+delta,origSI,NDAYS-1));
  }
  drag.curS=ns;drag.curE=ne;

  const newSI=dayOff(ns),newEI=dayOff(ne);
  const pxShift=(newSI-origSI)*DW;

  // 1. Move the hit overlay (the drag handle) — instant, no layout
  const hit=document.querySelector('[data-hit-task="'+drag.taskId+'"][data-hit-si="'+drag.si+'"]');
  if(hit){
    hit.style.left=newSI*DW+'px';
    hit.style.width=(newEI-newSI+1)*DW+'px';
  }
  // 2. Shift all bar-seg divs for this task+segment by the pixel delta
  document.querySelectorAll('[data-bar-task="'+drag.taskId+'"][data-bar-si="'+drag.si+'"]').forEach(bar=>{
    const origLeft=parseInt(bar.dataset.origLeft,10);
    bar.style.left=(origLeft+pxShift)+'px';
  });

  // 3. Keep S.tasks in sync for save on mouseup
  S.tasks=S.tasks.map(t=>t.id!==drag.taskId?t:
    {...t,segs:t.segs.map((sg,i)=>i!==drag.si?sg:{...sg,s:ns,e:ne})});
  _projTaskCache=null;
});
window.addEventListener('mouseup',()=>{
  if(!drag)return;
  document.body.style.cursor='';
  const task=S.tasks.find(t=>t.id===drag.taskId);
  if(task){
    const seg=task.segs[drag.si];
    if(seg&&(seg.s!==drag.origS||seg.e!==drag.origE)){
      undoPush({taskId:drag.taskId,si:drag.si,prevS:drag.origS,prevE:drag.origE,newS:seg.s,newE:seg.e});
      refreshToolbar();
      toast('Bar moved — Ctrl+Z to undo','ok');
    }
    upsertTask(task);
  }
  drag=null;
  // Single clean rebuild after drop to ensure bars are pixel-perfect
  refreshGanttRows();
});

// ── RENDER ────────────────────────────────────────────────────────────────────
/**
 * Full application re-render. Rebuilds toolbar, filter bar, and the active view
 * (Gantt / Board / Settings). Preserves scroll position across re-renders.
 * Calls buildProjTaskCache(), buildHolCache(), and clearWdCache() first so all
 * downstream helpers have fresh, memoized data.
 * Safe to call from any event handler — errors are caught by renderSafe().
 */
function render(){
  const toolbar=document.getElementById('toolbar');const main=document.getElementById('main');
  if(!toolbar||!main)return;
  saveScroll();
  buildProjTaskCache(); // build O(N) lookup once per render
  buildHolCache();      // rebuild holiday Set once per render (O(1) .has in workDays)
  clearWdCache();       // clear memoization — task/holiday data may have changed
  toolbar.parentNode.replaceChild(buildToolbar(),toolbar);
  const fb=document.getElementById('filter-bar');
  if(fb){const nfb=buildFilterBar();fb.parentNode.replaceChild(nfb,fb)}
  if(S.loading){
    main.innerHTML='';
    const ls=document.createElement('div');ls.className='loading-screen';
    const sp=document.createElement('div');sp.className='spinner';
    const lb=document.createElement('div');lb.textContent='Loading schedule…';
    ls.appendChild(sp);ls.appendChild(lb);main.appendChild(ls);
    return;
  }
  main.innerHTML='';
  bgGrad=buildBgGrad(getHolIdxs());
  if(S.view==='gantt')main.appendChild(buildGantt());
  else if(S.view==='board')main.appendChild(buildBoard());
  else main.appendChild(buildSettings());
  restoreScroll(); // FIX CP4: apply after new DOM is attached
  // Modal renders into its own root — call after main render
  if(S.modal)openModal();else document.getElementById('modal-root').innerHTML='';
}

// ── scheduleRender ────────────────────────────────────────────────────────────
// rAF-gated render: coalesces multiple synchronous state mutations in the same
// JS frame into a single DOM pass. Use from filter-bar event handlers only.
// Async save handlers (upsertTask etc.) call render() directly after awaiting.
let _rafId=null;
function scheduleRender(){
  if(_rafId)return; // already queued for this frame
  _rafId=requestAnimationFrame(()=>{_rafId=null;render()});
}

function refreshGanttRows(){
  // FIX CP4: explicit scroll save/restore on gantt-only refresh
  const old=document.querySelector('.gantt-wrap');if(!old)return;
  const sl=old.scrollLeft,st=old.scrollTop;
  const ng=buildGantt();old.parentNode.replaceChild(ng,old);
  ng.scrollLeft=sl;ng.scrollTop=st;
}

  // Phase 8: undo button with badge count

// ── GANTT ─────────────────────────────────────────────────────────────────────
function buildGantt(){
  const totalW=NDAYS*DW,holI=getHolIdxs(),cm=crewMap(),holDates=S.holidays.map(h=>h.date);
  const wrap=el('div');wrap.className='gantt-wrap';

    const es=el('div');es.className='empty-state';

    const title=el('div');title.className='empty-state-title';title.textContent='No projects yet';es.appendChild(title);
    const body=el('div');body.className='empty-state-body';

    const btn=el('button');btn.className='empty-state-btn';btn.textContent='🌱 Load Sample Data';btn.onclick=seedData;es.appendChild(btn);
    wrap.appendChild(es);return wrap;
  }

  // Apply filters & sort (Phase 2)
  const{projects:visProjs,visibleTasks}=applyFilters();
  const totalProjCount=S.projects.length;

  if(visProjs.length===0){

    btn.onclick=()=>{clearFilters();scheduleRender()};es.appendChild(btn);

  const flatRows=[];

    flatRows.push({type:'proj',proj});

  // Header
  const hdr=el('div');hdr.className='gantt-hdr';

  const ci=el('span');ci.style.cssText='color:rgba(255,255,255,.4);font-size:11px';
