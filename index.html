  hdr.appendChild(getCalHeader(totalW,holI)); // cached — not rebuilt every render
  wrap.appendChild(hdr);

  flatRows.forEach((row,ri)=>{
    const isP=row.type==='proj';const h=isP?PH:RH;
    const g=el('div');
    const arcClass=isP&&row.proj.archived?' proj-row-archived':'';
    g.className='g-row '+(isP?'proj-row'+arcClass:'task-row task-'+(ri%2===0?'even':'odd'));g.style.height=h+'px';
    const lc=el('div');lc.className='lc';lc.style.cssText='width:'+LW+'px;height:'+h+'px';
    if(isP){
      lc.appendChild(iBtn(row.proj.collapsed?'▶':'▼',()=>{
        const up={...row.proj,collapsed:!row.proj.collapsed};
        S.projects=S.projects.map(p=>p.id===row.proj.id?up:p);
        upsertProject(up);render();
      },'rgba(255,255,255,.7)',(row.proj.collapsed?'Expand ':'Collapse ')+row.proj.client));
      const info=el('div');info.style.cssText='flex:1;overflow:hidden;min-width:0;margin:0 6px';
      const top=el('div');top.style.cssText='display:flex;align-items:center;gap:5px;overflow:hidden';
      const jn=el('span');jn.style.cssText='color:rgba(255,255,255,.6);font-size:11px;font-weight:700;flex-shrink:0';
      if(row.proj.archived){const ab=el('span');ab.className='archive-badge';ab.textContent='📁';top.appendChild(ab)}
      jn.textContent=row.proj.job_num;top.appendChild(jn);
      const cl=el('span');cl.style.cssText='color:#fff;font-weight:700;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';cl.textContent=row.proj.client;top.appendChild(cl);
      info.appendChild(top);
      const bl=el('div');bl.style.cssText='color:rgba(255,255,255,.5);font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';bl.textContent=row.proj.loc;info.appendChild(bl);
      lc.appendChild(info);lc.appendChild(statusBadge(row.proj.status));
      if(row.proj.job_value){const vb=el('span');vb.className='job-val-badge';vb.textContent=centsToBadge(row.proj.job_value);lc.appendChild(vb)}
      // Phase 8 CP10: value/day badge
      const vpd=projValuePerDay(row.proj);
      if(vpd){const vdb=el('span');vdb.className='val-day-badge';vdb.textContent=fmtValPerDay(vpd);vdb.title='Estimated revenue per working day';lc.appendChild(vdb)}
      if(row.proj.soils_req){const sb3=el('span');sb3.className='req-flag on';sb3.title='Soils report required';sb3.textContent='⚗SOI';lc.appendChild(sb3)}
      // Phase 12A: state-aware locate badge
      const locBadge=getLocateBadge(row.proj);
      if(locBadge){const lb2=el('span');lb2.style.cssText='display:inline-flex;align-items:center;font-size:9px;font-weight:700;padding:1px 6px;border-radius:9px;white-space:nowrap;flex-shrink:0;margin-left:3px;background:'+locBadge.bg+';color:'+locBadge.color+';border:1px solid '+locBadge.border;lb2.textContent=locBadge.text;lc.appendChild(lb2)}
      const btns=el('div');btns.style.cssText='display:flex;gap:3px;flex-shrink:0;margin-left:4px';
      btns.appendChild(iBtn('+',()=>{
        const t={id:uid(),project_id:row.proj.id,descr:'',crew:'',status:row.proj.status,wknd:false,sort_order:projTasks(row.proj.id).length,segs:[{s:null,e:null,crews:[]}]};
        S.modal={type:'task',t};openModal();
      },'rgba(255,255,255,.7)','Add task to '+row.proj.client));
      btns.appendChild(iBtn('✎',()=>{S.modal={type:'proj',isNew:false,p:{...row.proj}};openModal()},'rgba(255,255,255,.7)','Edit project: '+row.proj.client));
      lc.appendChild(btns);
    } else {
      const wd=workDays(row.task.segs,holDates,row.task.wknd);
      lc.style.paddingLeft='22px';
      const arr=el('span');arr.style.cssText='color:#bbb;font-size:11px;flex-shrink:0;margin-right:4px';arr.textContent='↳';lc.appendChild(arr);
      const desc=el('span');desc.style.cssText='flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;color:#1a2b4a';desc.textContent=row.task.descr;lc.appendChild(desc);
      // Show all unique crews across all segments
      const allSegCrews=[...new Set(row.task.segs.flatMap(sg=>segCrews(sg,row.task)))];
      allSegCrews.forEach(cn=>{const cr=cm[cn];if(cr){const cb=el('span');cb.className='crew-badge';cb.style.cssText='background:'+cr.color+';color:'+cr.tc+';margin:0 2px';cb.textContent=cr.name;lc.appendChild(cb)}});
      if(wd>0){const wds=el('span');wds.style.cssText='color:#555;font-size:11px;flex-shrink:0;min-width:26px;text-align:right';wds.textContent=wd+'d';lc.appendChild(wds)}
      // Phase 10 CP2: task value badge
      if(row.task.task_value){const tvb=el('span');tvb.className='task-val-badge';tvb.textContent=centsToBadge(row.task.task_value);tvb.title='Task value: '+centsToDisplay(row.task.task_value);lc.appendChild(tvb)}
      // Phase 12B: subtask badge
      const subs=taskSubtasks(row.task.id);
      if(subs.length>0){
        const done=subs.filter(s=>s.complete).length;
        const total=subs.length;
        const hasPastIncomplete=subs.some(s=>!s.complete&&s.scheduled_dt&&s.scheduled_dt<TODAY);
        const bg=hasPastIncomplete?'#fee2e2':done===total?'#dcfce7':'#fef3c7';
        const col=hasPastIncomplete?'#dc2626':done===total?'#166534':'#92400e';
        const border=hasPastIncomplete?'#dc2626':done===total?'#86efac':'#fcd34d';
        const stb=el('span');stb.className='subtask-badge';
        stb.style.cssText='background:'+bg+';color:'+col+';border:1px solid '+border;
        stb.textContent='⚙ '+done+'/'+total;
        stb.title=subs.map(s=>(s.complete?'✓ ':'○ ')+s.descr).join('\n');
        lc.appendChild(stb);
      }
      lc.appendChild(iBtn('✎',()=>{
        try{
          const safeSegs=(row.task.segs||[{s:null,e:null,crews:[]}]).map(s=>({
            s:s.s||null, e:s.e||null,
            crews:Array.isArray(s.crews)?[...s.crews]:(row.task.crew?[row.task.crew]:[])
          }));
          S.modal={type:'task',t:{...row.task,segs:safeSegs}};
          openModal();
        }catch(err){
          console.error('[Strada] Task modal open failed:',err);
          toast('⚠ Could not open task editor: '+err.message,'error');
        }
      },'#999','Edit task: '+row.task.descr.slice(0,40)));
    }
    g.appendChild(lc);
    const gc=el('div');gc.className='gc'+((!isP||S.ganttGrid)?' gc-grid':'');gc.style.cssText='width:'+totalW+'px;height:'+h+'px';
    if(bgGrad)gc.style.backgroundImage=bgGrad;
    if(TODAYIDX>=0&&TODAYIDX<NDAYS){
      const tl=el('div');tl.className='today-col';
      tl.style.cssText='left:'+TODAYIDX*DW+'px;height:'+h+'px';
      tl.title='Today: '+TODAY;
      gc.appendChild(tl);
    }
    if(isP){
      const sp=projSpan(projTasks(row.proj.id));
      if(sp.s&&sp.e){const sb2=el('div');sb2.className='proj-span';sb2.style.cssText='left:'+dayOff(sp.s)*DW+'px;width:'+(dayOff(sp.e)-dayOff(sp.s)+1)*DW+'px;top:50%;transform:translateY(-50%);height:6px';gc.appendChild(sb2)}
    } else {
      row.task.segs.forEach((seg,si)=>{
        if(!seg.s||!seg.e)return;
        // Resolve crews for this segment (with backward-compat fallback)
        const crewsForSeg=segCrews(seg,row.task);
        const primaryCrew=cm[crewsForSeg[0]];
        const color=primaryCrew?primaryCrew.color:'#aaa';
        const color2=crewsForSeg[1]?cm[crewsForSeg[1]]?.color:null; // secondary crew color
        const color3=crewsForSeg[2]?cm[crewsForSeg[2]]?.color:null; // tertiary crew color
        const sIdx=dayOff(seg.s),eIdx=dayOff(seg.e);
        if(sIdx<0||eIdx<0||sIdx>NDAYS-1||eIdx>NDAYS-1||sIdx>eIdx)return;
        const bT=3,bH=h-6;const ranges=[];let rs=null,re=null;
        for(let i=Math.max(0,sIdx);i<=Math.min(NDAYS-1,eIdx);i++){
          const skip=!row.task.wknd&&(WDAY_IDXS.includes(i)||holI.includes(i));
          if(!skip){if(rs===null)rs=i;re=i}else{if(rs!==null){ranges.push([rs,re]);rs=re=null}}
        }
        if(rs!==null)ranges.push([rs,re]);
        // Ghost bar: faint full-range bar for visual continuity through weekends
        if(!row.task.wknd&&sIdx>=0&&eIdx>=0&&sIdx<=NDAYS-1&&eIdx<=NDAYS-1){
          const ghost=el('div');ghost.className='bar-seg';
          ghost.style.cssText='left:'+sIdx*DW+'px;width:'+(eIdx-sIdx+1)*DW+'px;top:'+bT+'px;height:'+bH+'px;background:'+color+';border-radius:3px;opacity:'+(si===0?.18:.12);
          gc.appendChild(ghost);
        }
        ranges.forEach(([a,b],ri2)=>{
          const isFirst=ri2===0&&a===sIdx,isLast=ri2===ranges.length-1&&b===eIdx;
          const br=(isFirst?'3px':'0')+' '+(isLast?'3px':'0')+' '+(isLast?'3px':'0')+' '+(isFirst?'3px':'0');
          // Primary bar
          const bd=el('div');bd.className='bar-seg';
          bd.dataset.barTask=row.task.id;bd.dataset.barSi=si;bd.dataset.origLeft=a*DW;
          bd.style.cssText='left:'+a*DW+'px;width:'+(b-a+1)*DW+'px;top:'+bT+'px;height:'+bH+'px;background:'+color+';border-radius:'+br+';opacity:'+(si===0?1:.75);
          gc.appendChild(bd);
          // Secondary crew: 3px stripe at top of bar
          if(color2){
            const s2=el('div');s2.className='bar-seg';
            s2.dataset.barTask=row.task.id;s2.dataset.barSi=si;s2.dataset.origLeft=a*DW;
            s2.style.cssText='left:'+a*DW+'px;width:'+(b-a+1)*DW+'px;top:'+bT+'px;height:3px;background:'+color2+';border-radius:'+(isFirst?'3px':'0')+' '+(isLast?'3px':'0')+' 0 0;z-index:2;opacity:'+(si===0?1:.75);
            gc.appendChild(s2);
          }
          // Tertiary crew: 3px stripe at bottom of bar
          if(color3){
            const s3=el('div');s3.className='bar-seg';
            s3.dataset.barTask=row.task.id;s3.dataset.barSi=si;s3.dataset.origLeft=a*DW;
            s3.style.cssText='left:'+a*DW+'px;width:'+(b-a+1)*DW+'px;top:'+(bT+bH-3)+'px;height:3px;background:'+color3+';border-radius:0 0 '+(isLast?'3px':'0')+' '+(isFirst?'3px':'0')+';z-index:2;opacity:'+(si===0?1:.75);
            gc.appendChild(s3);
          }
        });
        const ov=el('div');ov.className='bar-hit';
        ov.dataset.hitTask=row.task.id;ov.dataset.hitSi=si;
        ov.style.cssText='left:'+sIdx*DW+'px;width:'+(eIdx-sIdx+1)*DW+'px;top:'+bT+'px;height:'+bH+'px';
        ov.title=row.task.descr+'\n'+seg.s+' → '+seg.e+(crewsForSeg.length?'\n'+crewsForSeg.join(' + '):'');
        ov.addEventListener('mousedown',e=>{
          e.preventDefault();e.stopPropagation();
          const rect=ov.getBoundingClientRect();const lx=e.clientX-rect.left,rw=rect.width;
          const type=lx<10?'left':lx>rw-10?'right':'move';
          drag={taskId:row.task.id,si,type,startX:e.clientX,lastDelta:0,origS:seg.s,origE:seg.e};
          document.body.style.cursor=type==='move'?'grabbing':'ew-resize';
        });
        gc.appendChild(ov);
      });
    }
    g.appendChild(gc);wrap.appendChild(g);
  });
  const spacer=el('div');spacer.style.height='60px';wrap.appendChild(spacer);
  return wrap;
}

// ── BOARD ─────────────────────────────────────────────────────────────────────
function buildBoard(){
  // FIX CP4/board search: wrap is stable; only columns div gets rebuilt on search
  const wrap=el('div');wrap.className='board-wrap';
  const tb=el('div');tb.style.cssText='display:flex;gap:10px;align-items:center;margin-bottom:14px';
  const si=el('input');si.className='inp';si.style.cssText='width:220px;font-size:13px';
  si.placeholder='Search projects…';si.value=S.boardSearch||'';
  const cnt=el('span');cnt.style.cssText='color:#666;font-size:12px';tb.appendChild(si);tb.appendChild(cnt);
  wrap.appendChild(tb);
  const cols=el('div');cols.className='board-cols';wrap.appendChild(cols);
  const rebuildCols=()=>buildBoardCols(cols,cnt);
  si.addEventListener('input',e=>{S.boardSearch=e.target.value;rebuildCols()}); // no full render
  rebuildCols();
  return wrap;

function buildBoardCols(cols,cnt){

  cnt.textContent=pool.length+' of '+active.length+' active projects'+(archived.length>0?' · '+archived.length+' archived':'');
  cols.innerHTML='';
  const grouped={};ST_OPTS.forEach(s=>{grouped[s]=[]});

    const sl=el('span');sl.style.cssText='font-weight:700;font-size:12px;color:#d97706';sl.textContent='📁 Archive';hdr.appendChild(sl);
    const cn=el('span');cn.style.cssText='margin-left:auto;background:#d97706;color:#fff;border-radius:10px;font-size:11px;padding:0 6px;font-weight:700';cn.textContent=arcFiltered.length;hdr.appendChild(cn);
    col.appendChild(hdr);
    arcFiltered.forEach(p=>{
      const card=buildBoardCard(p,cm);

function buildBoardCard(p,cm){

  const top=el('div');top.style.cssText='display:flex;justify-content:space-between;align-items:flex-start;gap:4px;margin-bottom:3px';

  const tcount=el('span');tcount.textContent=projTasks(p.id).length+' task'+(projTasks(p.id).length!==1?'s':'');bl2.appendChild(tcount);
  // Subtask count chip
  const allSubs=projTasks(p.id).flatMap(t=>taskSubtasks(t.id));

    const sdone=allSubs.filter(s=>s.complete).length;
    const sc=el('span');sc.style.cssText='font-size:10px;font-weight:700;padding:1px 5px;border-radius:8px;'+(sdone===allSubs.length?'background:#dcfce7;color:#166534':'background:#fef3c7;color:#92400e');

  }
  if(p.job_value){const vl=el('span');vl.style.cssText='font-weight:700;color:#155724;font-size:11px';vl.textContent=centsToDisplay(p.job_value);bl2.appendChild(vl)}
  card.appendChild(bl2);
  // Locate badge row
  const locBadgeCard=getLocateBadge(p);
  if(locBadgeCard){
    const lb=el('div');lb.style.cssText='margin-top:4px';
    const lbs=el('span');lbs.style.cssText='font-size:9px;font-weight:700;padding:2px 7px;border-radius:9px;background:'+locBadgeCard.bg+';color:'+locBadgeCard.color+';border:1px solid '+locBadgeCard.border;
    lbs.textContent=locBadgeCard.text;lb.appendChild(lbs);card.appendChild(lb);
  }
  return card;
}

  card('Import & Restore','Restore from a JSON backup file.',[fi,impBtn]);
  return d;
}

function buildImportInput(m,ms){
  // ── PRIMARY: Paste text (no API key, no internet needed) ─────────────────
  const pasteHdr=el('div');pasteHdr.style.cssText='font-size:13px;font-weight:700;color:#1F3864;margin-bottom:6px';
  pasteHdr.textContent='📋 Paste estimate or quote text';m.appendChild(pasteHdr);
  const pasteWrap=el('div');pasteWrap.style.cssText='background:#f0f7ff;border:1.5px solid #93c5fd;border-radius:8px;padding:10px 12px;margin-bottom:10px';
  const pasteLbl=el('div');pasteLbl.style.cssText='font-size:11px;color:#1d4ed8;margin-bottom:6px;line-height:1.5';
  pasteLbl.innerHTML='Copy all text from your QBO estimate or any quote document and paste it here.<br><strong>No API key or internet connection required.</strong> Works immediately.';
  const ta=el('textarea');ta.className='import-textarea';ta.style.cssText='min-height:110px;background:#fff';
  ta.placeholder='Paste your estimate text here — include the estimate number, client name, and all line items…';
  ta.value=ms.pasteText||'';
  const MAX_PASTE=20000;
  const pasteCounter=el('div');
  pasteCounter.style.cssText='font-size:10px;color:#9ca3af;text-align:right;margin-top:3px';
  pasteCounter.textContent=(ms.pasteText||'').length+' / '+MAX_PASTE+' characters';
  ta.oninput=e=>{
    if(e.target.value.length>MAX_PASTE)e.target.value=e.target.value.slice(0,MAX_PASTE);
    ms.pasteText=e.target.value;
    const len=e.target.value.length;
    pasteCounter.textContent=len+' / '+MAX_PASTE+' characters';
    pasteCounter.style.color=len>MAX_PASTE*0.9?'#ea580c':'#9ca3af';
  };
  pasteWrap.appendChild(pasteLbl);pasteWrap.appendChild(ta);pasteWrap.appendChild(pasteCounter);m.appendChild(pasteWrap);

  btn.addEventListener('click',async()=>{
    if(!ms.file&&!(ms.pasteText&&ms.pasteText.trim().length>20)){
      toast('Paste your estimate text or select a file first.','error');return;
    }
    ms.state='analyzing';openModal();
    try{
      const result=await runAnalysis(ms.file,ms.pasteText||'');
      ms.editProj={
        job_num:sanitize(result.job_num,30),
        client:sanitize(result.client,120),
        location:sanitize(result.location,200),
        status:'Not started'
      };
      ms.editTasks=(result.tasks||[]).filter(t=>(t.description||'').trim()).map(t=>({
        id:uid(),
        description:sanitize(t.description,300),
        quantity:sanitize(t.quantity,80)
      }));
      if(ms.editTasks.length===0)throw new Error('No tasks were extracted. Make sure the pasted text includes line item descriptions.');
      ms.state='preview';ms.error=null;
    }catch(e){ms.error=e.message;ms.state='error'}

  });
  rb.appendChild(btn);footer.appendChild(rb);m.appendChild(footer);
}

// ── MODALS ────────────────────────────────────────────────────────────────────
// FIX CP1: modal header always uses closeModal() — no stale S.modal=null;render()
function mhdr(m,title){
  const h=el('div');h.className='modal-hdr';
  const t=el('h3');
  // Unique heading id so aria-labelledby can reference it from the dialog element
  const headingId='mhdr-'+Math.random().toString(36).slice(2,8);
  t.id=headingId;
  t.textContent=title;h.appendChild(t);
  m.setAttribute('aria-labelledby',headingId);
  const c=el('button');c.className='modal-close';c.innerHTML='&times;';
  c.setAttribute('aria-label','Close dialog');
  c.addEventListener('click',closeModal); // direct function ref, not inline
  h.appendChild(c);m.appendChild(h);
}
function lbl2(t){const l=el('label');l.className='lbl';l.textContent=t;return l}
function inp2(val,fn,type,opts){
  const i=el(type==='select'?'select':'input');i.className='inp';
  if(type==='select'){(opts||[]).forEach(([v,t])=>{const o=el('option');o.value=v;o.textContent=t;if(v===val)o.selected=true;i.appendChild(o)})}
  else{if(type)i.type=type;i.value=val||'';if(type==='date'){i.min=SEASON_DATE_MIN;i.max=SEASON_DATE_MAX}}
  if(fn){i.onchange=fn;i.oninput=fn}return i;
}
function mkFooter(m,leftContent,onSave){
  const footer=el('div');footer.className='modal-footer';
  const lb=el('div');
  if(leftContent){
    // Accept either a single element or a pre-built div
    if(leftContent.tagName==='DIV')lb.appendChild(leftContent);
    else lb.appendChild(leftContent);
  }
  footer.appendChild(lb);
  const rb=el('div');rb.style.cssText='display:flex;gap:8px';
  // FIX CP1: Cancel always calls closeModal directly
  const cancel=el('button');cancel.className='btn-sec';cancel.textContent='Cancel';
  cancel.addEventListener('click',closeModal);
  rb.appendChild(cancel);
  const save=el('button');save.className='btn-primary';save.textContent='Save';
  save.addEventListener('click',onSave);
  rb.appendChild(save);footer.appendChild(rb);m.appendChild(footer);
}

      };row.appendChild(db);
      // HTML5 drag-and-drop for reorder
      row.addEventListener('dragstart',e=>{
        e.dataTransfer.effectAllowed='move';
        e.dataTransfer.setData('text/plain',ti);
        row.style.opacity='0.4';
      });
      row.addEventListener('dragend',()=>{row.style.opacity='1'});
      row.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';row.style.background='#e8f0fe'});
      row.addEventListener('dragleave',()=>{row.style.background=''});
      row.addEventListener('drop',e=>{
        e.preventDefault();row.style.background='';
        const fromIdx=parseInt(e.dataTransfer.getData('text/plain'),10);
        const toIdx=ti;
        if(fromIdx===toIdx)return;
        const moved=tasks.splice(fromIdx,1)[0];
        tasks.splice(toIdx,0,moved);
        tasks.forEach((t2,i)=>{t2.sort_order=i});
        rTL();
      });
      tl.appendChild(row);
    });
  }
  rTL();tsec.appendChild(tl);
  // Phase 10 CP4: reconciliation line — task values total vs contract value
  const reconDiv=el('div');reconDiv.id='recon-line-'+p.id;
  function updateRecon(){
    const taskTotal=tasks.reduce((s,t)=>s+(t.task_value||0),0);
    if(taskTotal===0&&!p.job_value){reconDiv.textContent='';reconDiv.className='';return}
    const contract=p.job_value||0;
    const diff=contract>0?Math.abs(taskTotal-contract)/contract:0;
    const warn=contract>0&&diff>0.05;
    reconDiv.className='recon-line '+(warn?'recon-warn':'recon-ok');
    reconDiv.textContent='Task values total: '+(taskTotal>0?centsToDisplay(taskTotal):'$0')+'  |  Contract: '+(contract>0?centsToDisplay(contract):'not set')+(warn?'  ⚠ Differs by '+Math.round(diff*100)+'%':'  ✓');
  }
  updateRecon();tsec.appendChild(reconDiv);m.appendChild(tsec);
  const delBtn=!S.modal.isNew?
    (()=>{const b=el('button');b.className='btn-danger';b.textContent='Delete Project';
      b.onclick=async()=>{if(!await confirmModal('Delete "'+p.client+'"? This removes all tasks.','Delete Project',true))return;
        await deleteProject(p.id);S.projects=S.projects.filter(x=>x.id!==p.id);S.tasks=S.tasks.filter(x=>x.project_id!==p.id);closeModal();render();
      };return b})():null;
  // Phase 9: Archive / Restore button
  const arcBtn=!S.modal.isNew?(()=>{
    const b=el('button');
    if(p.archived){
      b.className='btn-sec';b.textContent='📁 Restore from Archive';
      b.onclick=async()=>{
        const prev={...p,archived:true};
        p.archived=false;
        S.projects=S.projects.map(x=>x.id===p.id?{...x,archived:false}:x);
        closeModal();render();
        try{
          await upsertProject({...p,archived:false});
          toast('✓ Project restored to active schedule','ok');
        }catch(e){
          S.projects=S.projects.map(x=>x.id===p.id?prev:x);
          render();toast('⚠ Restore failed — '+e.message,'error');
        }
      };
    }else{
      b.className='btn-archive';b.textContent='📁 Archive Project';
      b.onclick=async()=>{
        if(!await confirmModal('Move "'+p.client+'" to the archive? It will be hidden from the active schedule.','Archive',false))return;
        const prev={...p,archived:false};
        p.archived=true;
        S.projects=S.projects.map(x=>x.id===p.id?{...x,archived:true}:x);
        closeModal();render();
        try{
          await upsertProject({...p,archived:true});
          toast('✓ Project archived','ok');
        }catch(e){
          S.projects=S.projects.map(x=>x.id===p.id?prev:x);
          render();toast('⚠ Archive failed — '+e.message,'error');
        }
      };
    }
    return b;
  })():null;
  // Put archive btn in left slot, delete btn next to it
  const leftDiv=el('div');leftDiv.style.cssText='display:flex;gap:6px';
  if(arcBtn)leftDiv.appendChild(arcBtn);
  if(delBtn)leftDiv.appendChild(delBtn);
  mkFooter(m,leftDiv,async()=>{
    // Optimistically update S.tasks so the Gantt shows changes immediately:
    // — remove tasks the user deleted via ×
    // — add brand-new tasks (not yet in S.tasks) so they appear before loadAll()
    S.tasks=S.tasks.filter(x=>!deletedTaskIds.has(x.id));
    const newTasks=tasks.filter(t=>!S.tasks.find(x=>x.id===t.id));
    if(newTasks.length)S.tasks=[...S.tasks,...newTasks];
    _projTaskCache=null;
    closeModal();render();
    try{
      // Delete removed tasks from the database first
      for(const id of deletedTaskIds)await deleteTask(id);
      await upsertProject(p);
      for(const t of tasks)await upsertTask(t);
      await loadAll();render(); // final refresh with confirmed server state
    }catch(e){
      // Save failed — reload from server to restore consistent state
      toast('⚠ Save failed: '+e.message+'. Reloading…','error');
      await loadAll();render();
    }
  });
}

// ── buildTaskDatesSection ─────────────────────────────────────────────────────
// Builds the "Scheduled Dates" segment list with crew pickers, day counts, and
// validation. Mutates t.segs directly (t is passed by reference).
// Returns the segsDiv DOM element.
function buildTaskDatesSection(t,holDates){
  const segsDiv=el('div');segsDiv.style.cssText='margin-top:14px;border-top:1px solid #e4e8f0;padding-top:10px';
  const segHdr=el('div');segHdr.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:8px';
  const segTitle=el('span');segTitle.style.cssText='font-weight:700;font-size:12px;color:#1F3864';segTitle.textContent='Scheduled Dates';segHdr.appendChild(segTitle);
  const addBtn=el('button');addBtn.className='btn-sm';addBtn.style.fontWeight='700';addBtn.textContent='+ Add Date';
  addBtn.onclick=()=>{t.segs.push({s:null,e:null,crews:[]});renderSegs()};
  segHdr.appendChild(addBtn);segsDiv.appendChild(segHdr);
  const listDiv=el('div');
  segsDiv.appendChild(listDiv);
  const wdDiv=el('div');wdDiv.style.marginTop='6px';
  segsDiv.appendChild(wdDiv);

  function renderSegs(){
    listDiv.innerHTML='';
    t.segs.forEach((seg,si)=>{
      const row=el('div');row.style.cssText='margin-bottom:8px;padding:8px 10px;background:#f8fafc;border-radius:6px;border:1px solid #e4e8f0';
      // ── Date row ──
      const dateRow=el('div');dateRow.style.cssText='display:flex;gap:8px;align-items:flex-start;margin-bottom:8px';
      const sw2=el('div');sw2.style.flex='1';sw2.appendChild(lbl2('Start'));
      const startInp=el('input');startInp.type='date';startInp.className='inp';
      startInp.min=SEASON_DATE_MIN;startInp.max=SEASON_DATE_MAX;
      startInp.value=seg.s||'';
      startInp.onchange=e=>{t.segs[si].s=e.target.value||null;validate();renderWd()};
      sw2.appendChild(startInp);dateRow.appendChild(sw2);
      const ew=el('div');ew.style.flex='1';ew.appendChild(lbl2('End'));
      const endInp=el('input');endInp.type='date';endInp.className='inp';
      endInp.min=SEASON_DATE_MIN;endInp.max=SEASON_DATE_MAX;
      endInp.value=seg.e||'';
      endInp.onchange=e=>{t.segs[si].e=e.target.value||null;validate();renderWd()};
      ew.appendChild(endInp);
      const errDiv=el('div');errDiv.className='field-err';ew.appendChild(errDiv);
      dateRow.appendChild(ew);
      const dn=el('div');dn.style.cssText='min-width:38px;text-align:center;padding-top:18px';
      const dlbl=el('div');dlbl.style.cssText='font-size:10px;color:#888';dlbl.textContent='Days';dn.appendChild(dlbl);
      const dval=el('div');dval.style.cssText='font-size:15px;font-weight:700;color:#1F3864;line-height:1.2';
      dval.textContent=(seg.s&&seg.e&&seg.e>=seg.s)?workDays([seg],holDates,t.wknd):'—';
      dn.appendChild(dval);dateRow.appendChild(dn);
      const xb=el('button');xb.style.cssText='color:#dc3545;background:none;border:none;cursor:pointer;font-size:16px;padding:2px 4px;border-radius:4px;flex-shrink:0;margin-top:18px';
      xb.textContent='×';xb.title='Remove this date';
      xb.onclick=()=>{t.segs.splice(si,1);if(t.segs.length===0)t.segs.push({s:null,e:null,crews:[]});renderSegs()};
      dateRow.appendChild(xb);
      row.appendChild(dateRow);
      // ── Crew picker row ──
      const crewSec=el('div');crewSec.style.cssText='border-top:1px solid #e8ecf2;padding-top:7px';
      const crewLblRow=el('div');crewLblRow.style.cssText='display:flex;align-items:center;gap:6px;margin-bottom:5px';
      const crewLbl=el('span');crewLbl.style.cssText='font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.4px';crewLbl.textContent='Crew';crewLblRow.appendChild(crewLbl);
      if(seg.crews&&seg.crews.length>1){
        const hint=el('span');hint.style.cssText='font-size:10px;color:#888';hint.textContent='1st = bar colour · 2nd = stripe';crewLblRow.appendChild(hint);
      }
      crewSec.appendChild(crewLblRow);
      const crewChips=el('div');crewChips.style.cssText='display:flex;flex-wrap:wrap;gap:5px';
      S.crews.forEach(crew=>{
        const idx=(seg.crews||[]).indexOf(crew.name);
        const isSelected=idx>=0;
        const chip=el('button');
        chip.style.cssText='padding:2px 9px;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;transition:all .12s;position:relative;'
          +(isSelected
            ?'background:'+crew.color+';color:'+crew.tc+';border:2px solid '+crew.color+';opacity:1'
            :'background:#f0f2f5;color:#888;border:2px solid #e4e8f0;opacity:.7');
        chip.textContent=crew.name;
        if(isSelected&&(seg.crews||[]).length>1){
          const badge=el('span');badge.style.cssText='position:absolute;top:-5px;right:-4px;background:#fff;color:'+crew.color+';border:1.5px solid '+crew.color+';border-radius:8px;font-size:8px;font-weight:800;padding:0 3px;line-height:13px;min-width:13px;text-align:center';
          badge.textContent=idx+1;chip.appendChild(badge);
        }
        chip.onclick=()=>{
          const current=t.segs[si].crews||[];
          const pos=current.indexOf(crew.name);
          if(pos>=0){t.segs[si].crews=current.filter(c=>c!==crew.name)}
          else{t.segs[si].crews=[...current,crew.name]}
          if(si===0)t.crew=(t.segs[0].crews[0])||'';
          renderSegs();
        };
        crewChips.appendChild(chip);
      });
      crewSec.appendChild(crewChips);
      row.appendChild(crewSec);
      listDiv.appendChild(row);
      function validate(){
        const s=t.segs[si]?.s,e2=t.segs[si]?.e;
        if(s&&e2&&e2<s){endInp.classList.add('inp-err');errDiv.textContent='End must be on or after start.'}
        else{endInp.classList.remove('inp-err');errDiv.textContent=''}
      }
      if(seg.s&&seg.e&&seg.e<seg.s){endInp.classList.add('inp-err');errDiv.textContent='End must be on or after start.'}
    });
    renderWd();
  }
  function renderWd(){
    const valid=t.segs.filter(sg=>sg.s&&sg.e&&sg.e>=sg.s);
    const wd=workDays(valid,holDates,t.wknd);
    if(wd>0){wdDiv.className='wd-total';wdDiv.textContent='Total work days across all dates: '+wd+' day'+(wd!==1?'s':'')}
    else{wdDiv.className='';wdDiv.textContent=''}
  }
  renderSegs();
  return segsDiv;
}

// ── buildTaskSubtaskSection ──────────────────────────────────────────────────
// Builds the "Supporting Items" (subtask) section with type selector, list,
// complete toggle, and add-item form. Mutates S.subtasks on save/delete.
// Returns the subSec DOM element.
function buildTaskSubtaskSection(t){
  const STYPE_META={
    equipment:{icon:'🚜',label:'Equipment',detailLabel:'Unit / ID'},
    delivery: {icon:'📦',label:'Delivery', detailLabel:'Supplier & qty'},
    dependency:{icon:'🔗',label:'Dependency',detailLabel:'What must be done'},
    note:     {icon:'📋',label:'Note',     detailLabel:'Details'}
  };
  const subSec=el('div');subSec.className='subtask-section';
  const subHdr=el('div');subHdr.className='subtask-hdr';
  const subTitle=el('span');subTitle.className='subtask-hdr-title';subTitle.textContent='⚙ Supporting Items';subHdr.appendChild(subTitle);
  const subCount=el('span');subCount.className='subtask-count';subHdr.appendChild(subCount);
  const addItemBtn=el('button');addItemBtn.className='btn-sm';addItemBtn.style.fontSize='11px';addItemBtn.textContent='+ Add Item';subHdr.appendChild(addItemBtn);
  subSec.appendChild(subHdr);
  const subList=el('div');
  subSec.appendChild(subList);
  const addForm=el('div');addForm.className='subtask-add-form';addForm.style.display='none';subSec.appendChild(addForm);

  let localSubs=taskSubtasks(t.id).map(s=>({...s}));

  function renderSubtasks(){
    subList.innerHTML='';
    const done=localSubs.filter(s=>s.complete).length;
    subCount.textContent=localSubs.length+' item'+(localSubs.length!==1?'s':'')+
      (localSubs.length>0?' · '+done+' complete':'');
    localSubs.forEach((sub,si)=>{
      const meta=STYPE_META[sub.type]||STYPE_META.note;
      const row=el('div');row.className='subtask-row'+(sub.complete?' done':'');
      const ico=el('span');ico.className='subtask-type-icon';ico.textContent=meta.icon;row.appendChild(ico);
      const desc=el('span');desc.className='subtask-descr';desc.textContent=sub.descr||'—';row.appendChild(desc);
      if(sub.detail){const det=el('span');det.className='subtask-detail';det.textContent=sub.detail;row.appendChild(det)}
      if(sub.assigned_to){
        const cm2=crewMap();
        const crew=cm2[sub.assigned_to];
        const chip=el('span');chip.style.cssText='font-size:10px;font-weight:700;padding:1px 6px;border-radius:9px;flex-shrink:0;white-space:nowrap;'+(crew?'background:'+crew.color+';color:'+crew.tc:'background:#f3f4f6;color:#374151');
        chip.textContent=sub.assigned_to;row.appendChild(chip);
      }
      if(sub.scheduled_dt){
        const isPast=sub.scheduled_dt<TODAY;
        const dt=el('span');dt.className='subtask-date '+(isPast&&!sub.complete?'past':'ok');
        dt.textContent=fmtDate(sub.scheduled_dt);row.appendChild(dt);
      }
      const chkBtn=el('button');chkBtn.style.cssText='background:none;border:1.5px solid '+(sub.complete?'#16a34a':'#d1d5db')+';color:'+(sub.complete?'#16a34a':'#9ca3af')+';border-radius:4px;width:22px;height:22px;cursor:pointer;font-size:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center';
      chkBtn.textContent=sub.complete?'✓':'○';chkBtn.title=sub.complete?'Mark incomplete':'Mark complete';
      chkBtn.onclick=async()=>{localSubs[si].complete=!localSubs[si].complete;renderSubtasks();await upsertSubtask(localSubs[si])};
      row.appendChild(chkBtn);
      const delBtn2=el('button');delBtn2.style.cssText='background:none;border:none;color:#dc3545;cursor:pointer;font-size:15px;padding:0 2px;flex-shrink:0';
      delBtn2.textContent='×';delBtn2.title='Remove this item';
      delBtn2.onclick=async()=>{
        if(!await confirmModal('Remove this item?','Remove Item',true))return;
        await deleteSubtask(sub.id);
        localSubs=localSubs.filter(s=>s.id!==sub.id);
        S.subtasks=S.subtasks.filter(s=>s.id!==sub.id);
        renderSubtasks();
      };
      row.appendChild(delBtn2);
      subList.appendChild(row);
    });
  }

  let addFormType='equipment';
  function buildAddForm(){
    addForm.innerHTML='';
    const typeBtns=el('div');typeBtns.className='subtask-type-btns';
    Object.entries(STYPE_META).forEach(([type,meta])=>{
      const b=el('button');b.className='subtask-type-btn'+(type===addFormType?' active':'');
      b.textContent=meta.icon+' '+meta.label;
      b.onclick=()=>{addFormType=type;buildAddForm()};
      typeBtns.appendChild(b);
    });
    addForm.appendChild(typeBtns);
    const meta=STYPE_META[addFormType];
    const grid=el('div');grid.className='fg';
    const dw=el('div');dw.className='fg-full';dw.appendChild(lbl2('Description'));
    const dInp=el('input');dInp.className='inp';dInp.placeholder='e.g. 310 excavator needed on site';dw.appendChild(dInp);grid.appendChild(dw);
    const tw=el('div');tw.appendChild(lbl2(meta.detailLabel+' (optional)'));
    const tInp=el('input');tInp.className='inp';tInp.placeholder=addFormType==='equipment'?'e.g. CAT 310 / unit 04':addFormType==='delivery'?'e.g. RMCC, 10m³, 7am':'';
    tw.appendChild(tInp);grid.appendChild(tw);
    const aw=el('div');aw.appendChild(lbl2('Assigned to (optional)'));
    const aInp=el('input');aInp.className='inp';aInp.placeholder='Crew name or company';
    aInp.setAttribute('list','crew-datalist-sub');
    const dl=el('datalist');dl.id='crew-datalist-sub';
    S.crews.forEach(c=>{const opt=el('option');opt.value=c.name;dl.appendChild(opt)});
    aw.appendChild(aInp);aw.appendChild(dl);grid.appendChild(aw);
    const dtw=el('div');dtw.appendChild(lbl2('Date needed (optional)'));
    const dtInp=el('input');dtInp.type='date';dtInp.className='inp';dtInp.min=SEASON_DATE_MIN;dtInp.max=SEASON_DATE_MAX;
    dtw.appendChild(dtInp);grid.appendChild(dtw);
    addForm.appendChild(grid);
    const footer=el('div');footer.style.cssText='display:flex;gap:8px;margin-top:8px;justify-content:flex-end';
    const cancelBtn=el('button');cancelBtn.className='btn-sec';cancelBtn.style.fontSize='11px';cancelBtn.textContent='Cancel';
    cancelBtn.onclick=()=>{addForm.style.display='none';addItemBtn.style.display='inline-block'};
    const saveBtn=el('button');saveBtn.className='btn-primary';saveBtn.style.fontSize='11px';saveBtn.textContent='Add Item';
    saveBtn.onclick=async()=>{
      const descr=dInp.value.trim();
      if(!descr){toast('Please enter a description.','error');return}
      const newSub={id:uid(),task_id:t.id,project_id:t.project_id,type:addFormType,descr,
        detail:tInp.value.trim()||null,assigned_to:aInp.value.trim()||null,
        scheduled_dt:dtInp.value||null,complete:false,sort_order:localSubs.length};
      saveBtn.disabled=true;saveBtn.textContent='Saving…';
      try{
        await upsertSubtask(newSub);
        localSubs=[...localSubs,newSub];S.subtasks=[...S.subtasks,newSub];
        addForm.style.display='none';addItemBtn.style.display='inline-block';
        renderSubtasks();
      }catch(e){toast('⚠ Could not save: '+e.message,'error')}
      finally{saveBtn.disabled=false;saveBtn.textContent='Add Item'}
    };
    footer.appendChild(cancelBtn);footer.appendChild(saveBtn);addForm.appendChild(footer);
  }
  addItemBtn.onclick=()=>{addFormType='equipment';buildAddForm();addForm.style.display='block';addItemBtn.style.display='none'};
  renderSubtasks();
  return subSec;
}

// ── buildTaskFinancialSection ─────────────────────────────────────────────────

}

function buildTaskModal(m){
  const t=S.modal.t;
  const holDates=S.holidays.map(h=>h.date);
  mhdr(m,'Edit Task');
  // Ensure segs is a valid mutable array with crews on every segment
  if(!Array.isArray(t.segs)||t.segs.length===0){
    t.segs=[{s:null,e:null,crews:[]}];
  }else{
    t.segs=t.segs.map(sg=>({
      s:sg.s||null, e:sg.e||null,
      crews:Array.isArray(sg.crews)?[...sg.crews]:(t.crew?[t.crew]:[])
    }));
  }

  const g=el('div');g.className='fg';
  const dw=el('div');dw.className='fg-full';dw.appendChild(lbl2('Description'));dw.appendChild(inp2(t.descr,e=>{t.descr=e.target.value}));g.appendChild(dw);
  const stw=el('div');stw.appendChild(lbl2('Status'));stw.appendChild(inp2(t.status,e=>{t.status=e.target.value},'select',ST_OPTS.map(s=>[s,s])));g.appendChild(stw);
  const ww=el('div');ww.className='fg-full';ww.style.marginTop='8px';
  const wl=el('label');wl.style.cssText='display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:#444';
  const cb=el('input');cb.type='checkbox';cb.checked=t.wknd;
  cb.onchange=e=>{t.wknd=e.target.checked;m.replaceChild(buildTaskDatesSection(t,holDates),m.querySelector('[data-section="dates"]'))};
  wl.appendChild(cb);wl.appendChild(document.createTextNode('Include weekends & holidays in Work Days'));ww.appendChild(wl);g.appendChild(ww);
  m.appendChild(g);

  const datesEl=buildTaskDatesSection(t,holDates);
  datesEl.dataset.section='dates';
  m.appendChild(datesEl);
  m.appendChild(buildTaskSubtaskSection(t));
  m.appendChild(buildTaskFinancialSection(t));

  const delBtn=(()=>{const b=el('button');b.className='btn-danger';b.textContent='Delete Task';
    b.onclick=async()=>{if(!await confirmModal('Delete this task?','Delete Task',true))return;
    await deleteTask(t.id);S.tasks=S.tasks.filter(x=>x.id!==t.id);closeModal();render()};return b})();
  mkFooter(m,delBtn,async()=>{
    const invalid=t.segs.some(sg=>sg.s&&sg.e&&sg.e<sg.s);
    if(invalid){toast('⚠ Fix date errors before saving.','error');return}
    // Snapshot current state for rollback if the save fails
    const prevTasks=S.tasks;
    if(S.tasks.find(x=>x.id===t.id))S.tasks=S.tasks.map(x=>x.id===t.id?t:x);
    else S.tasks=[...S.tasks,t];
    closeModal();render();
    try{
      await upsertTask(t);
    }catch(e){
      // Revert the optimistic update and re-open with the original data
      S.tasks=prevTasks;
      S.modal={type:'task',t};
      render();
      toast('⚠ Save failed — changes reverted. '+e.message,'error');
    }
  });
}

function buildCrewModal(m){
  const c=S.modal.c;
  mhdr(m,S.modal.isNew?'Add Crew Member':'Edit Crew Member');
  m.appendChild(lbl2('Name'));m.appendChild(inp2(c.name,e=>{c.name=e.target.value}));
  m.appendChild(lbl2('Bar Colour'));
  const crow=el('div');crow.style.cssText='display:flex;gap:8px;align-items:center;margin-top:3px';
  const cp=el('input');cp.type='color';cp.value=c.color;cp.style.cssText='width:44px;height:32px;border:none;border-radius:4px;cursor:pointer;padding:0';
  const ct=inp2(c.color,e=>{c.color=e.target.value;cp.value=e.target.value});ct.style.flex='1';
  cp.onchange=e=>{c.color=e.target.value;ct.value=e.target.value};
  crow.appendChild(cp);crow.appendChild(ct);m.appendChild(crow);
  m.appendChild(lbl2('Text colour on badge'));
  const tcrow=el('div');tcrow.style.cssText='display:flex;gap:8px;margin-top:3px';
  ['#ffffff','#000000','#333333'].forEach(tc=>{
    const b=el('button');
    b.style.cssText='flex:1;padding:7px;border-radius:5px;cursor:pointer;font-weight:700;font-size:13px;background:'+c.color+';color:'+tc+';border:'+(c.tc===tc?'2px solid #1F3864':'1px solid #d0d7e3');
    b.textContent='Aa';
    b.onclick=()=>{c.tc=tc;tcrow.querySelectorAll('button').forEach((x,i)=>x.style.border=(['#ffffff','#000000','#333333'][i]===tc?'2px solid #1F3864':'1px solid #d0d7e3'))};
    tcrow.appendChild(b);
  });m.appendChild(tcrow);
  const delBtn=!S.modal.isNew?
    (()=>{const b=el('button');b.className='btn-danger';b.textContent='Delete Crew';
      b.onclick=async()=>{if(!await confirmModal('Delete crew "'+c.name+'"?','Delete Crew',true))return;
      await deleteCrew(c.id);S.crews=S.crews.filter(x=>x.id!==c.id);closeModal();render()};return b})():null;
  mkFooter(m,delBtn,async()=>{
    const prevCrews=S.crews;
    if(!S.modal.isNew)S.crews=S.crews.map(x=>x.id===c.id?c:x);else S.crews=[...S.crews,c];
    closeModal();render();
    try{
      await upsertCrew(c);
    }catch(e){
      S.crews=prevCrews;
      render();
      toast('⚠ Save failed — changes reverted. '+e.message,'error');
    }
  });
}

  try{
    // Step 1: Read the URL hash type BEFORE creating the Supabase client.
    // The invite/recovery access_token is in the hash fragment.
    const hash=window.location.hash;
    const hashParams=new URLSearchParams(hash.replace(/^#/,''));
    _pendingUrlType=hashParams.get('type'); // 'invite', 'recovery', or null

    // Step 2: Create client. Supabase v2 will read the hash and exchange the
    // token internally when getSession() is called.
    sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{
      auth:{detectSessionInUrl:true,persistSession:true,autoRefreshToken:true}
    });

    // Step 3: Register listener BEFORE getSession so no events are missed.
    setupAuthListener();

    // Step 4: getSession() awaits Supabase's internal initializePromise which
    // includes reading and exchanging the hash tokens.
    const{data:{session},error}=await sb.auth.getSession();

    // Step 5: Clean the URL now that tokens have been processed.
    if(_pendingUrlType){
      history.replaceState(null,'',window.location.pathname+window.location.search);
    }

    // Step 6: Route based on what we found.
    if(_pendingUrlType==='invite'&&session){
      _pendingUrlType=null;
      showNewPass('Welcome! Set a password to complete your account setup.');
    }else if(_pendingUrlType==='recovery'&&session){
      _pendingUrlType=null;
      showNewPass('Enter a new password for your account.');
    }else if(session?.user){
      _pendingUrlType=null;
      await enterApp(session.user);
    }else{
      _pendingUrlType=null;
      showLogin();
    }
  }catch(e){
    console.error('Init failed:',e);
    showLogin();
  }
})();
