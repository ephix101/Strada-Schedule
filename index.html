// buildGanttSVG: renders a print-quality SVG Gantt for the given date range and crew filter.
function buildGanttSVG(from,to,crewFilter,showGrid=false){
  const dayW=18,leftW=340,daysColW=30,rowH=26,projH=34,hdrH=32;
  const holDates=S.holidays.map(h=>h.date);
  const cm=crewMap();
  buildProjTaskCache();

  // Build list of dates in range
  const fromD=new Date(from+'T12:00:00'),toD=new Date(to+'T12:00:00');
  const nDays=Math.round((toD-fromD)/86400000)+1;
  if(nDays<=0||nDays>550)return'<svg><text y="20" x="10">Invalid date range</text></svg>';

  const dates=Array.from({length:nDays},(_,i)=>{const d=new Date(fromD);d.setDate(d.getDate()+i);return d});
  const dateStrs=dates.map(d=>d.toISOString().slice(0,10));
  const totalW=leftW+nDays*dayW;

  // Collect rows — proj, task, then subtask sub-rows after each task
  const svgSubH=10; // sub-row height in SVG (smaller than task rows for MS-Project feel)
  const projs=applyFilters().projects.filter(p=>!p.archived);
  const rows=[];
  projs.forEach(proj=>{
    const tasks=projTasks(proj.id).filter(t=>!crewFilter.length||crewFilter.includes(t.crew));
    const hasWork=tasks.some(t=>(t.segs||[]).some(sg=>sg.s&&sg.e&&sg.e>=from&&sg.s<=to));
    if(!hasWork)return;
    rows.push({type:'proj',proj});
    tasks.forEach(task=>{
      const hasSegs=(task.segs||[]).some(sg=>sg.s&&sg.e&&sg.e>=from&&sg.s<=to);
      if(!hasSegs)return;
      rows.push({type:'task',proj,task});
      taskSubtasks(task.id).forEach(sub=>rows.push({type:'subtask',proj,task,sub}));
    });
  });

  // Calculate total height — project rows taller, subtask rows shorter
  const totalH=hdrH+rows.reduce((s,r)=>s+(r.type==='proj'?projH:r.type==='subtask'?svgSubH:rowH),0)+4;
  let svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${totalW}" height="${totalH}" style="font-family:Arial,sans-serif">`;

  // ── Background: weekend columns ──────────────────────────────────────────
  dates.forEach((d,i)=>{
    const wd=d.getDay();
    if(wd===0||wd===6){
      svg+=`<rect x="${leftW+i*dayW}" y="0" width="${dayW}" height="${totalH}" fill="#f0f0f0" opacity="0.6"/>`;
    }
  });

  // ── Month header row (18px) ──────────────────────────────────────────────
  const MCOL={'APRIL':'#1565A9','MAY':'#217346','JUNE':'#BF5700','JULY':'#7B3F00',
               'AUGUST':'#5C2D91','SEPTEMBER':'#005B70','OCTOBER':'#7D4000',
               'NOVEMBER':'#2B4B6E','DECEMBER':'#8B0000','JANUARY':'#1F3864','FEBRUARY':'#374151','MARCH':'#065F46'};
  const MNAMES=['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
  let curMonth=-1,mStart=0,mName='';
  const flushMonth=(endI)=>{
    if(curMonth<0)return;
    const col=MCOL[mName]||'#1F3864';
    const mx=leftW+mStart*dayW,mw=(endI-mStart)*dayW;
    svg+=`<rect x="${mx}" y="0" width="${mw}" height="18" fill="${col}"/>`;
    svg+=`<text x="${mx+4}" y="13" font-size="9" font-weight="700" fill="white" letter-spacing="0.5">${escSvg(mName)}</text>`;
    svg+=`<line x1="${mx}" y1="0" x2="${mx}" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>`;
  };
  dates.forEach((d,i)=>{
    const mn=d.getMonth();
    if(mn!==curMonth){flushMonth(i);curMonth=mn;mStart=i;mName=MNAMES[mn]}
  });
  flushMonth(nDays);

  // ── Day header row (14px at y=18) ────────────────────────────────────────
  dates.forEach((d,i)=>{
    const wd=d.getDay();const isWknd=wd===0||wd===6;const isToday=dateStrs[i]===TODAY;
    const bg=isToday?'#FFD700':isWknd?'#b0b4be':'#2a4a80';
    svg+=`<rect x="${leftW+i*dayW}" y="18" width="${dayW}" height="14" fill="${bg}"/>`;
    svg+=`<text x="${leftW+i*dayW+dayW/2}" y="29" font-size="8" fill="${isToday?'#333':'white'}" text-anchor="middle">${escSvg(String(d.getDate()))}</text>`;
  });

  // ── Left panel header ────────────────────────────────────────────────────
  svg+=`<rect x="0" y="0" width="${leftW}" height="${hdrH}" fill="#1F3864"/>`;
  svg+=`<text x="8" y="22" font-size="10" fill="rgba(255,255,255,0.6)">${escSvg('Task / Project')}</text>`;

  // ── Rows ─────────────────────────────────────────────────────────────────
  let y=hdrH;
  rows.forEach((row,ri)=>{
    const h=row.type==='proj'?projH:row.type==='subtask'?svgSubH:rowH;
    if(row.type==='subtask'){
      // ── SVG sub-row ────────────────────────────────────────────────────────
      const subBg=row.sub.complete?'#f9fafb':'#f0f2f8';
      svg+=`<rect x="0" y="${y}" width="${leftW}" height="${h}" fill="${subBg}"/>`;
      svg+=`<rect x="${leftW}" y="${y}" width="${totalW-leftW}" height="${h}" fill="${subBg}"/>`;
      svg+=`<line x1="0" y1="${y+h}" x2="${totalW}" y2="${y+h}" stroke="#eaecf0" stroke-width="0.5"/>`;
      svg+=`<line x1="${leftW}" y1="${y}" x2="${leftW}" y2="${y+h}" stroke="#c0cce0" stroke-width="2"/>`;
      // Vertical guide indent line
      svg+=`<line x1="32" y1="${y}" x2="32" y2="${y+h}" stroke="#d1d5db" stroke-width="1" opacity="0.6"/>`;
      // Type abbreviation
      const subCol=row.sub.complete?'#9ca3af':TYPE_COLORS[row.sub.type]||'#6b7280';
      svg+=`<rect x="35" y="${y+1}" width="9" height="${h-2}" fill="${subCol}" opacity="${row.sub.complete?'0.2':'0.15'}" rx="1"/>`;
      svg+=`<text x="39" y="${y+h/2+3}" font-size="6" font-weight="800" fill="${subCol}" text-anchor="middle">${escSvg(SVG_TYPE_ABBR[row.sub.type]||'?')}</text>`;
      // Description — fit to available budget, single line (sub-rows are 10px tall)
      const subTextX=48;
      const subCrewReserve=row.sub.assigned_to?Math.min(row.sub.assigned_to.length*5+4,80):0;
      const subBudget=leftW-daysColW-subTextX-subCrewReserve-4;
      const subDescLines=splitSvgText(row.sub.descr||'',subBudget,7,1);
      const strike=row.sub.complete?'line-through':'none';
      svg+=`<text x="${subTextX}" y="${y+h/2+3}" font-size="7" fill="${subCol}" text-decoration="${strike}">${escSvg(subDescLines[0])}</text>`;
      // Assigned crew name (right of description)
      if(row.sub.assigned_to){
        svg+=`<text x="${leftW-daysColW-4}" y="${y+h/2+3}" font-size="6" fill="#6b7280" text-anchor="end">${escSvg(row.sub.assigned_to)}</text>`;
      }
      // Milestone diamond or no-date line in calendar area
      if(row.sub.scheduled_dt){
        const dIdx=dateStrs.indexOf(row.sub.scheduled_dt);
        if(dIdx>=0){
          const cx=leftW+dIdx*dayW+dayW/2;const cy=y+h/2;const ds=4;
          const isOD=!row.sub.complete&&row.sub.scheduled_dt<TODAY;
          const dCol=row.sub.complete?'#9ca3af':isOD?'#dc2626':subCol;
          // Rotated square = diamond
          svg+=`<rect x="${cx-ds/1.41}" y="${cy-ds/1.41}" width="${ds*1.41}" height="${ds*1.41}" fill="${dCol}" transform="rotate(45,${cx},${cy})" opacity="${row.sub.complete?'0.4':'0.85'}"/>`;
          // Overdue label
          if(isOD)svg+=`<text x="${cx+ds+1}" y="${cy+3}" font-size="5" fill="#dc2626" font-weight="700">OD</text>`;
        }
      }else{
        // No date — thin dashed line across parent task range
        const parentSpan=projSpan([row.task]);
        if(parentSpan.s&&parentSpan.e){
          const sx=dateStrs.indexOf(parentSpan.s<from?from:parentSpan.s);
          const ex=dateStrs.indexOf(parentSpan.e>to?to:parentSpan.e);
          if(sx>=0&&ex>=sx){
            svg+=`<line x1="${leftW+sx*dayW}" y1="${y+h/2}" x2="${leftW+(ex+1)*dayW}" y2="${y+h/2}" stroke="${subCol}" stroke-width="1" stroke-dasharray="3,2" opacity="0.35"/>`;
          }
        }
      }
      y+=h;
      return; // skip the rest of the loop for subtask rows
    }
    if(row.type==='proj'){
      // Project row — full navy background, two lines of info
      svg+=`<rect x="0" y="${y}" width="${totalW}" height="${h}" fill="#2F4F8F"/>`;

      // Line 2: address + estimate# + locates flag

      const locFlag=locBadgeSvg?locBadgeSvg.text:'';
      const estPart=row.proj.estimate_num?'Est#'+row.proj.estimate_num:'';
      const line2=[row.proj.loc,estPart,locFlag].filter(Boolean).join('  ·  ').slice(0,60);
      if(line2)svg+=`<text x="8" y="${y+23}" font-size="8" fill="rgba(255,255,255,0.75)">${escSvg(line2)}</text>`;
      // Project span bar
      const sp=projSpan(projTasks(row.proj.id));
      if(sp.s&&sp.e){
        const sx=Math.max(0,dateStrs.indexOf(sp.s));
        const ex=Math.min(nDays-1,dateStrs.indexOf(sp.e));
        if(sx>=0&&ex>=sx){
          svg+=`<rect x="${leftW+sx*dayW}" y="${y+h/2-3}" width="${(ex-sx+1)*dayW}" height="6" fill="rgba(255,255,255,0.25)" rx="2"/>`;
        }
      }
    }else{
      // Task row
      const bg=ri%2===0?'#EFF3FA':'#F8FAFC';
      svg+=`<rect x="0" y="${y}" width="${leftW}" height="${h}" fill="${bg}"/>`;
      svg+=`<rect x="${leftW}" y="${y}" width="${totalW-leftW}" height="${h}" fill="${bg}"/>`;
      svg+=`<line x1="0" y1="${y+h}" x2="${totalW}" y2="${y+h}" stroke="#e2e6ed" stroke-width="1"/>`;
      svg+=`<line x1="${leftW}" y1="${y}" x2="${leftW}" y2="${y+h}" stroke="#c0cce0" stroke-width="2"/>`;
      // Days badge area (right side of left panel)
      const taskWd=workDays(row.task.segs,holDates,row.task.wknd);
      if(taskWd>0){
        svg+=`<rect x="${leftW-daysColW}" y="${y+2}" width="${daysColW-2}" height="${h-4}" fill="#e0e7ff" rx="3"/>`;
        svg+=`<text x="${leftW-daysColW/2-1}" y="${y+h/2+4}" font-size="8" font-weight="700" fill="#3730a3" text-anchor="middle">${escSvg(String(taskWd))}d</text>`;
      }
      // Separator line between task text and days column
      svg+=`<line x1="${leftW-daysColW}" y1="${y}" x2="${leftW-daysColW}" y2="${y+h}" stroke="#d0d7e3" stroke-width="0.5"/>`;
      // Task description — wrapped to fit available pixel budget
      const textX=22;const textStartY=y+h/2+4;
      // Budget: left panel width minus text start, days col, and optional sub-item badge
      const hasPendingSubs=taskSubtasks(row.task.id).some(s=>!s.complete);
      const badgeReserve=hasPendingSubs?34:0;
      const textBudget=leftW-daysColW-textX-badgeReserve-4;
      const taskDescLines=splitSvgText(row.task.descr||'',textBudget,9,2);
      if(taskDescLines.length===1){
        svg+=`<text x="${textX}" y="${textStartY}" font-size="9" fill="#1a2b4a">${escSvg(taskDescLines[0])}</text>`;
      }else{
        // Two-line: shift both up by half a line so they're centred in row
        const lineH=10;
        svg+=`<text x="${textX}" font-size="9" fill="#1a2b4a">`;
        svg+=`<tspan x="${textX}" y="${y+h/2-1}">${escSvg(taskDescLines[0])}</tspan>`;
        svg+=`<tspan x="${textX}" dy="${lineH}">${escSvg(taskDescLines[1])}</tspan>`;
        svg+=`</text>`;
      }
      // Crew dot (primary crew of first segment)
      const firstSegCrews=(row.task.segs[0]?.crews&&row.task.segs[0].crews.length>0)?row.task.segs[0].crews:(row.task.crew?[row.task.crew]:[]);
      const firstCrew=cm[firstSegCrews[0]];
      if(firstCrew)svg+=`<circle cx="13" cy="${y+h/2}" r="4" fill="${firstCrew.color}"/>`;
      // ── Supporting items indicator (visible in PDF) ─────────────────────────
      // Shows coloured type-icon badges in the left panel and a notch on the bar.
      const svgSubs=taskSubtasks(row.task.id);
      const svgSubsPending=svgSubs.filter(s=>!s.complete);
      if(svgSubsPending.length>0){
        const svgSubsDone=svgSubs.filter(s=>s.complete).length;
        const hasOverdue=svgSubsPending.some(s=>s.scheduled_dt&&s.scheduled_dt<TODAY);
        // Small coloured badge in left panel showing count + overdue state
        const badgeW=28;const badgeH=h-8;
        const badgeX=leftW-daysColW-badgeW-3;
        const badgeFill=hasOverdue?'#fee2e2':svgSubsDone===svgSubs.length?'#dcfce7':'#fef3c7';
        const badgeStroke=hasOverdue?'#f87171':svgSubsDone===svgSubs.length?'#86efac':'#fcd34d';
        const badgeTextCol=hasOverdue?'#dc2626':svgSubsDone===svgSubs.length?'#166534':'#92400e';
        svg+=`<rect x="${badgeX}" y="${y+4}" width="${badgeW}" height="${badgeH}" fill="${badgeFill}" stroke="${badgeStroke}" stroke-width="1" rx="3"/>`;
        // Count text centred in badge
        // SVG_TYPE_ABBR is a module-level constant (see top of script)
        const pendingTypes=[...new Set(svgSubsPending.map(s=>s.type))];
        const typeStr=pendingTypes.map(t=>SVG_TYPE_ABBR[t]||'?').join('');
        svg+=`<text x="${badgeX+badgeW/2}" y="${y+h/2+1}" font-size="7" font-weight="800" fill="${badgeTextCol}" text-anchor="middle" font-family="monospace">${escSvg(typeStr)}</text>`;
        svg+=`<text x="${badgeX+badgeW/2}" y="${y+h/2+8}" font-size="6" font-weight="700" fill="${badgeTextCol}" text-anchor="middle">${escSvg(svgSubsDone+'/'+svgSubs.length)}</text>`;
        // Warning triangle on the first bar segment start (clearly visible in print)
        if(svgSubsPending.length>0){
          // Find first valid segment start x
          const firstSeg=(row.task.segs||[]).find(s=>s.s&&s.e&&dateStrs.indexOf(s.s<from?from:s.s)>=0);
          if(firstSeg){
            const clampStart=firstSeg.s<from?from:firstSeg.s;
            const barStartI=dateStrs.indexOf(clampStart);
            if(barStartI>=0){
              const bx=leftW+barStartI*dayW;
              const triCol=hasOverdue?'#dc2626':'#d97706';
              // Filled triangle notch above bar (pointing down into bar top)
              const tx=bx+2,ty=y+3,ts=6;
              svg+=`<polygon points="${tx},${ty} ${tx+ts},${ty} ${tx+ts/2},${ty+ts}" fill="${triCol}" opacity="0.9"/>`;
            }
          }
        }
      }
      // Segment bars — per-segment crew colors
      (row.task.segs||[]).forEach(seg=>{
        if(!seg.s||!seg.e)return;
        if(seg.e<from||seg.s>to)return;
        const crewsForSeg=segCrews(seg,row.task);
        const primCrew=cm[crewsForSeg[0]];const color=primCrew?primCrew.color:'#aaa';
        const secCrew=crewsForSeg[1]?cm[crewsForSeg[1]]:null;
        const clampS=seg.s<from?from:seg.s;
        const clampE=seg.e>to?to:seg.e;
        const si=dateStrs.indexOf(clampS);
        const ei=dateStrs.indexOf(clampE);
        if(si<0||ei<0||ei<si)return;
        let rxs=null,rxe=null;
        for(let i=si;i<=ei;i++){
          const wd=dates[i].getDay();
          const skip=!row.task.wknd&&(wd===0||wd===6||(_holDateSet.size>0?_holDateSet:new Set(holDates)).has(dateStrs[i]));
          if(!skip){if(rxs===null)rxs=i;rxe=i;}
          else{if(rxs!==null){
            svg+=`<rect x="${leftW+rxs*dayW+1}" y="${y+3}" width="${(rxe-rxs+1)*dayW-2}" height="${h-6}" fill="${color}" rx="3"/>`;
            if(secCrew)svg+=`<rect x="${leftW+rxs*dayW+1}" y="${y+3}" width="${(rxe-rxs+1)*dayW-2}" height="3" fill="${secCrew.color}" rx="1"/>`;
            rxs=rxe=null;
          }}
        }
        if(rxs!==null){
          svg+=`<rect x="${leftW+rxs*dayW+1}" y="${y+3}" width="${(rxe-rxs+1)*dayW-2}" height="${h-6}" fill="${color}" rx="3"/>`;
          if(secCrew)svg+=`<rect x="${leftW+rxs*dayW+1}" y="${y+3}" width="${(rxe-rxs+1)*dayW-2}" height="3" fill="${secCrew.color}" rx="1"/>`;
        }
      });
    }
    y+=h;
  });

  // ── Grid lines (drawn on top of rows, under today marker) ────────────────
  if(showGrid){
    // Vertical day separators across full chart height
    for(let i=1;i<nDays;i++){
      const x=leftW+i*dayW;
      svg+=`<line x1="${x}" y1="${hdrH}" x2="${x}" y2="${totalH}" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>`;
    }
  }

  // ── Today marker — full column highlight ─────────────────────────────────
  const todayIdx=dateStrs.indexOf(TODAY);
  if(todayIdx>=0){
    const tx=leftW+todayIdx*dayW;
    svg+=`<rect x="${tx}" y="${hdrH}" width="${dayW}" height="${totalH-hdrH}" fill="rgba(255,210,0,0.12)"/>`;
    svg+=`<line x1="${tx}" y1="0" x2="${tx}" y2="${totalH}" stroke="rgba(255,180,0,0.8)" stroke-width="2"/>`;
  }

  // ── Border ───────────────────────────────────────────────────────────────
  svg+=`<rect x="0" y="0" width="${totalW}" height="${totalH}" fill="none" stroke="#d0d7e3" stroke-width="1"/>`;

  // ── Supporting items legend ───────────────────────────────────────────────
  // Only shown when at least one task in the export has supporting items
  const anySubsPending=rows.some(r=>r.type==='task'&&taskSubtasks(r.task.id).some(s=>!s.complete));
  if(anySubsPending){
    const legY=totalH+6;
    const legItems=[
      {col:'#fef3c7',stroke:'#fcd34d',text:'▼ = Supporting items pending  (amber = pending, red = overdue)'},
      {col:'#fff7ed',stroke:'#fb923c',text:'E = Equipment  D = Delivery  L = Dependency  N = Note'},
    ];
    legItems.forEach((li,i)=>{
      svg+=`<rect x="2" y="${legY+i*14}" width="12" height="10" fill="${li.col}" stroke="${li.stroke}" stroke-width="1" rx="2"/>`;
      svg+=`<text x="18" y="${legY+i*14+8}" font-size="8" fill="#374151">${escSvg(li.text)}</text>`;
    });
    // Adjust SVG viewBox to include legend
    svg=svg.replace(/viewBox="0 0 \d+ \d+"/, `viewBox="0 0 ${totalW} ${totalH+36}"`);
    svg=svg.replace(/height="\d+"( width)/, `height="${totalH+36}"$1`);
  }
  svg+='</svg>';
  return svg;
}

// escSvg() MUST wrap ALL dynamic values inserted into svg+= template literals.
// Static string literals are exempt. User-data fields and computed values are never exempt.
function escSvg(s){
  return(s||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

// splitSvgText: wrap a string into SVG tspan lines that fit within pixelBudget.
// Uses a per-character-class width table for Arial to handle wide (W,M) and
// narrow (i,l,1) characters more accurately than a flat average.
// Returns an array of line strings. maxLines caps output to avoid overflowing row height.
function splitSvgText(text,pixelBudget,fontSize,maxLines=3){
  if(!text)return[''];
  // Per-class character width multipliers for Arial (proportional font).
  // Upper-case wide letters (W,M,G) ≈ 0.75×; narrow chars (i,l,1,!) ≈ 0.42×;
  // digits ≈ 0.56×; spaces ≈ 0.28×; most lower/upper ≈ 0.52×.
  function charW(c){
    if(/[WMm]/.test(c))return fontSize*0.75;
    if(/[il1!|]/.test(c))return fontSize*0.42;
    if(/[0-9]/.test(c))return fontSize*0.56;
    if(/\s/.test(c))return fontSize*0.28;
    if(/[A-Z]/.test(c))return fontSize*0.68;
    return fontSize*0.52;
  }
  function lineWidth(s){return [...s].reduce((sum,c)=>sum+charW(c),0)}
  const words=text.split(' ');
  const lines=[];
  let cur='';
  for(const word of words){
    const test=cur?cur+' '+word:word;
    if(lineWidth(test)<=pixelBudget){cur=test}
    else{
      if(cur)lines.push(cur);
      // Hard-break a single word that is wider than the budget
      if(lineWidth(word)>pixelBudget){
        let w=word;
        while(lineWidth(w)>pixelBudget){
          let i=0,acc=0;
          while(i<w.length&&acc+charW(w[i])<=pixelBudget){acc+=charW(w[i]);i++}
          lines.push(w.slice(0,i));w=w.slice(i);
          if(lines.length>=maxLines)break;
        }
        cur=w;
      }else{cur=word}
    }
    if(lines.length>=maxLines)break;
  }
  if(cur&&lines.length<maxLines)lines.push(cur);
  else if(cur&&lines.length>=maxLines){
    const last=lines[lines.length-1];
    lines[lines.length-1]=last.slice(0,-1).trimEnd()+'…';
  }
  return lines.length?lines:[''];
}
// Apply to all fields stored in the database that originate from the import flow.
const sanitize=(s,maxLen=500)=>(s||'')
  .replace(/<[^>]*>/g,'')                        // strip HTML tags
  .replace(/[\x00-\x08\x0B\x0C\x0E-\x1F]/g,'')  // strip non-printable control chars
  .trim()
  .slice(0,maxLen);

// ── TAB 3: CSV Export ─────────────────────────────────────────────────────
function buildCsvTab(m,ms){
  const holDates=S.holidays.map(h=>h.date);
  const projs=exportProjects();

  const ctrl=el('div');ctrl.className='exp-ctrl';
  const notice=el('span');notice.style.cssText='font-size:11px;color:#374151';
  notice.textContent=projs.length+' project'+(projs.length!==1?'s':'')+' will be exported'+(isFilterActive()?' (filters active)':'');
  ctrl.appendChild(notice);
  m.appendChild(ctrl);

  // Preview first few rows
  const wrap=el('div');wrap.className='exp-scroll print-frame-wrap';
  const tbl=el('table');tbl.className='exp-tbl';
  const headers=['Job #','Client','Location','Status','Job Value ($)','PO #','Estimate #','Invoice #','Locates','Soils Req','Locate Stage','Locates Expiry','Start Date','End Date','Total Work Days','Crews','Task Count','Subtask Count','Notes','Tasks'];
  const thead=el('thead');const hr=el('tr');headers.forEach(h=>{const th=el('th');th.textContent=h;hr.appendChild(th)});thead.appendChild(hr);tbl.appendChild(thead);
  const tbody=el('tbody');
  const MAX_PREVIEW=8;
  projs.slice(0,MAX_PREVIEW).forEach(p=>{
    const tr=el('tr');csvRowValues(p,holDates).forEach(v=>{const td=el('td');td.textContent=v;tr.appendChild(td)});tbody.appendChild(tr);
  });
  if(projs.length>MAX_PREVIEW){
    const tr=el('tr');const td=el('td');td.colSpan=headers.length;td.style.cssText='color:#888;font-style:italic;text-align:center;padding:8px';
    td.textContent='… and '+(projs.length-MAX_PREVIEW)+' more rows in the downloaded file';tr.appendChild(td);tbody.appendChild(tr);
  }
  tbl.appendChild(tbody);wrap.appendChild(tbl);m.appendChild(wrap);

  // Download button
  const dlRow=el('div');dlRow.style.cssText='margin-top:12px;display:flex;justify-content:flex-end';
  const dlBtn=el('button');dlBtn.className='btn-primary';dlBtn.style.fontSize='12px';
  dlBtn.textContent='⬇ Download CSV ('+projs.length+' rows)';
  dlBtn.onclick=()=>{
    const csv=[headers,...projs.map(p=>csvRowValues(p,holDates))]
      .map(row=>row.map(v=>{const s=String(v==null?'':v);return s.includes(',')||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s}).join(','))
      .join('\r\n');
    const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='strada_export_'+TODAY+'.csv';a.click();
    toast('✓ CSV downloaded','ok');
  };
  dlRow.appendChild(dlBtn);m.appendChild(dlRow);
}

function csvRowValues(p,holDates){
  const tasks=projTasks(p.id);
  const sp2=projSpan(tasks);
  const totalWd=tasks.reduce((s,t)=>s+workDays(t.segs,holDates,t.wknd),0);
  const crews=[...new Set(tasks.flatMap(t=>t.segs.flatMap(sg=>segCrews(sg,t))))].filter(Boolean).join('; ')||'';
  const taskDescs=tasks.map(t=>t.descr).filter(Boolean).join('; ');
  const subtaskCount=tasks.reduce((n,t)=>n+taskSubtasks(t.id).length,0);
  // Locate status string
  const locReq=p.locates_req;
  const locatesStr=(!locReq||locReq==='no')?'No':locReq==='unknown'?'Unknown':'Yes';
  const locBadge=getLocateBadge(p);
  const locStage=locBadge?locBadge.text.replace(/[^\w\s]/g,'').trim():'';
  return[
    p.job_num,p.client,p.loc,p.status,
    p.job_value?(p.job_value/100).toFixed(2):'',
    p.po_num||'',p.estimate_num||'',p.invoice_num||'',
    locatesStr,p.soils_req?'Yes':'No',
    locStage,p.loc_exp||'',
    sp2.s||'',sp2.e||'',totalWd||0,
    crews,tasks.length,subtaskCount||'',
    p.notes||'',taskDescs
  ];
}

// ── AI DOCUMENT IMPORT ────────────────────────────────────────────────────────
async function fetchApiKey(){
  try{const{data,error}=await sb.from('settings').select('value').eq('key','anthropic_api_key').single();
  return(!error&&data)?data.value:null}catch{return null}
}
async function saveApiKey(key){
  try{
    const{error}=await withTimeout(
      sb.from('settings').upsert({key:'anthropic_api_key',value:key.trim()}),
      QUERY_TIMEOUT_MS,
      'Save timed out. Your Supabase project may be paused — visit supabase.com to wake it up.'
    );
    if(error){
      // code 42P01 = table does not exist
      if(error.code==='42P01')throw new Error('The "settings" table does not exist. Run settings_setup.sql in Supabase SQL Editor first.');
      throw new Error(error.message);
    }
    return true;
  }catch(e){
    console.error('[Strada] saveApiKey failed:',e);
    throw e; // re-throw so the button handler can show the specific message
  }
}
function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();r.onload=e=>resolve(e.target.result.split(',')[1]);r.onerror=reject;r.readAsDataURL(file);
  });
}
async function docxToText(file){
  // Load mammoth.js on demand — only when a .docx file is actually being analysed.
  // This avoids a blocking synchronous CDN request on every page load.
  if(typeof mammoth==='undefined'){
    await new Promise((resolve,reject)=>{
      const s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js';
      s.onload=resolve;
      s.onerror=()=>reject(new Error('Could not load Word doc parser. Please paste the text manually instead.'));
      document.head.appendChild(s);
    });
  }
  const buf=await file.arrayBuffer();
  const result=await mammoth.extractRawText({arrayBuffer:buf});
  if(!result.value||result.value.trim().length<20)throw new Error('Could not extract readable text from this file. Try pasting the content manually.');
  return result.value;
}
const CLAUDE_SYSTEM=`You extract project info from construction quotes and price schedules.
Return ONLY a valid JSON object — no markdown, no explanation, nothing else:
{"job_num":"","client":"","location":"","tasks":[{"description":"","quantity":""}]}
Rules: job_num=project/job number if shown, else ""; client=customer/company name; location=project address or site name; tasks=each scope item or line item as one entry; quantity=qty+unit if shown (e.g. "304 m²", "50mm HL3F") else "".`;

async function callClaude(apiKey,content){
  // Phase 9 FIX: 30-second timeout + friendly CORS error message
  const controller=new AbortController();
  const timer=setTimeout(()=>controller.abort(),30000);
  let resp;
  try{
    resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      signal:controller.signal,
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-allow-browser':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:2000,system:CLAUDE_SYSTEM,messages:[{role:'user',content}]})
    });
  }catch(fetchErr){
    clearTimeout(timer);
    if(fetchErr.name==='AbortError')throw new Error('Request timed out after 30 seconds. Check your internet connection and try again.');
    // "Failed to fetch" / NetworkError — almost always a browser extension blocking the request
    throw new Error('Browser blocked the request. Try disabling extensions (uBlock Origin, Privacy Badger, AdBlock) or use the text paste field below instead — it works without an internet connection to the AI.');
  }finally{clearTimeout(timer)}
  if(!resp.ok){
    let msg='Claude API error '+resp.status;
    try{const e=await resp.json();msg=e.error?.message||msg}catch{}
    throw new Error(msg);
  }
  const data=await resp.json();
  const raw=(data.content||[])[0]?.text||'';
  const clean=raw.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
  const parsed=JSON.parse(clean);
  if(!Array.isArray(parsed.tasks))throw new Error('Unexpected response — Claude did not return tasks array.');
  return parsed;
}
// ── LOCAL ESTIMATE PARSER ────────────────────────────────────────────────────
// Parses pasted QBO / Strada estimate text without requiring an API call.
// Handles the standard QBO format: ESTIMATE # XXXX, ADDRESS block, line items.
function parseEstimateLocally(t){
  const result={job_num:'',client:'',location:'',tasks:[]};

  // Estimate / job number
  const estMatch=t.match(/(?:estimate|job)\s*#\s*([A-Za-z0-9\-]+)/i);
  if(estMatch)result.job_num=estMatch[1].trim();

  // Client — QBO puts client name right after ADDRESS label
  const addrMatch=t.match(/ADDRESS[\s\n]+([^\n]+)/i);
  if(addrMatch)result.client=addrMatch[1].trim();

  // Location — QBO "SHIP TO" block
  const shipMatch=t.match(/SHIP\s*TO[\s\n]+([^\n]+)/i);
  if(shipMatch)result.location=shipMatch[1].trim();

  // Line items — scan lines after the ACTIVITY header
  // QBO format: activity title (short line), description lines, then QTY RATE AMOUNT
  const lines=t.split('\n');
  const amtRe=/^([\d,]+)\s+([\d,]+\.\d{2})\s+([\d,]+\.\d{2})\s*$/;
  const skipRe=/subtotal|hst|total|gst|tax|activity|rate|amount|date|address|ship|accepted|estimate|registration/i;

  let inItems=false;
  let firstTitle=null;
  for(let i=0;i<lines.length;i++){
    const line=lines[i].trim();
    if(!line)continue;
    // Start scanning after the ACTIVITY QTY RATE AMOUNT header row
    if(/^ACTIVITY\s+QTY/i.test(line)){inItems=true;continue;}
    if(!inItems)continue;
    const amtMatch=line.match(amtRe);
    if(amtMatch){
      const qty=amtMatch[1],amount=amtMatch[3];
      if(firstTitle){
        result.tasks.push({
          description:firstTitle,
          quantity:qty+(qty==='1'?' unit':' units')+' — $'+amount
        });
      }
      firstTitle=null;
    }else if(firstTitle===null&&line.length<55&&/^[A-Z]/.test(line)&&!skipRe.test(line)&&!/^\d/.test(line)){
      // First short title-case line after an amount = next activity header
      firstTitle=line;
    }
  }

  // Return null if nothing useful was found
  if(!result.client&&result.tasks.length===0)return null;
  return result;
}

async function runAnalysis(file,pasteText){
  // ── PASTE TEXT PATH ───────────────────────────────────────────────────────
  // If the user pasted text, try the local parser first — no API key required.
  // This works reliably for QBO estimates and Strada estimates.
  if(pasteText&&pasteText.trim().length>20){
    const local=parseEstimateLocally(pasteText.trim());
    if(local&&(local.client||local.tasks.length>0)){
      return local; // success — no API call needed
    }
    // Local parser couldn't extract enough — try API
    const apiKey=await fetchApiKey();
    if(!apiKey)throw new Error('Could not parse this document automatically. Go to Settings → Data → save your Anthropic API key, then try again — or make sure the pasted text includes the client name and line items.');
    return await callClaude(apiKey,'Extract project info from this construction document:\n\n'+pasteText.trim());
  }

  // ── FILE PATH — requires API ──────────────────────────────────────────────
  if(!file)throw new Error('Please select a file or paste some text.');
  const apiKey=await fetchApiKey();
  if(!apiKey)throw new Error('No Anthropic API key found. Go to Settings → Data → API Keys and save your key first. Or paste the document text directly into the text field — that works without an API key.');
  const ext=file.name.split('.').pop().toLowerCase();
  if(ext==='pdf'){
    const b64=await fileToBase64(file);
    return await callClaude(apiKey,[
      {type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},
      {type:'text',text:'Extract the project information from this construction quote or price schedule.'}
    ]);
  }else if(ext==='docx'){
    const text=await docxToText(file);
    return await callClaude(apiKey,'Extract project info from this construction document:\n\n'+text);
  }else{
    throw new Error('File type ".'+ext+'" is not supported. Please use a PDF or .docx file, or paste the text directly.');
  }
}

// ── DRAG ──────────────────────────────────────────────────────────────────────
let drag=null;
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  const delta=Math.round((e.clientX-drag.startX)/DW);
  if(delta===drag.lastDelta)return;
  drag.lastDelta=delta;

  const origSI=dayOff(drag.origS),origEI=dayOff(drag.origE);
  let ns=drag.origS,ne=drag.origE;
  if(drag.type==='move'){
    ns=offToS(clamp(origSI+delta,0,NDAYS-1));
    ne=offToS(clamp(origEI+delta,0,NDAYS-1));
  }else if(drag.type==='left'){
    ns=offToS(clamp(origSI+delta,0,origEI));
  }else{
    ne=offToS(clamp(origEI+delta,origSI,NDAYS-1));
  }
  drag.curS=ns;drag.curE=ne;

  const newSI=dayOff(ns),newEI=dayOff(ne);
  const pxShift=(newSI-origSI)*DW;

  // 1. Move the hit overlay (the drag handle) — instant, no layout
  const hit=document.querySelector('[data-hit-task="'+drag.taskId+'"][data-hit-si="'+drag.si+'"]');
  if(hit){
    hit.style.left=newSI*DW+'px';
    hit.style.width=(newEI-newSI+1)*DW+'px';
  }
  // 2. Shift all bar-seg divs for this task+segment by the pixel delta
  document.querySelectorAll('[data-bar-task="'+drag.taskId+'"][data-bar-si="'+drag.si+'"]').forEach(bar=>{
    const origLeft=parseInt(bar.dataset.origLeft,10);
    bar.style.left=(origLeft+pxShift)+'px';
  });

  // 3. Keep S.tasks in sync for save on mouseup
  S.tasks=S.tasks.map(t=>t.id!==drag.taskId?t:
    {...t,segs:t.segs.map((sg,i)=>i!==drag.si?sg:{...sg,s:ns,e:ne})});
  _projTaskCache=null;
});
window.addEventListener('mouseup',()=>{
  if(!drag)return;
  document.body.style.cursor='';
  const task=S.tasks.find(t=>t.id===drag.taskId);
  if(task){
    const seg=task.segs[drag.si];
    if(seg&&(seg.s!==drag.origS||seg.e!==drag.origE)){
      undoPush({taskId:drag.taskId,si:drag.si,prevS:drag.origS,prevE:drag.origE,newS:seg.s,newE:seg.e});
      refreshToolbar();
      toast('Bar moved — Ctrl+Z to undo','ok');
    }
    upsertTask(task);
  }
  drag=null;
  // Single clean rebuild after drop to ensure bars are pixel-perfect
  refreshGanttRows();
});

/**
 * Full application re-render. Rebuilds toolbar, filter bar, and the active view
 * (Gantt / Board / Settings). Preserves scroll position across re-renders.
 * Calls buildProjTaskCache(), buildHolCache(), and clearWdCache() first so all
 * downstream helpers have fresh, memoized data.
 * Safe to call from any event handler — errors are caught by renderSafe().
 */
function render(){
  const toolbar=document.getElementById('toolbar');const main=document.getElementById('main');
  if(!toolbar||!main)return;
  saveScroll();
  buildProjTaskCache(); // build O(N) lookup once per render
  buildHolCache();      // rebuild holiday Set once per render (O(1) .has in workDays)
  clearWdCache();       // clear memoization — task/holiday data may have changed
  toolbar.parentNode.replaceChild(buildToolbar(),toolbar);
  const fb=document.getElementById('filter-bar');
  if(fb){const nfb=buildFilterBar();fb.parentNode.replaceChild(nfb,fb)}
  if(S.loading){
    main.innerHTML='';
    const ls=document.createElement('div');ls.className='loading-screen';
    const sp=document.createElement('div');sp.className='spinner';
    const lb=document.createElement('div');lb.textContent='Loading schedule…';
    ls.appendChild(sp);ls.appendChild(lb);main.appendChild(ls);
    return;
  }
  main.innerHTML='';
  bgGrad=buildBgGrad(getHolIdxs());
  if(S.view==='gantt')main.appendChild(buildGantt());
  else if(S.view==='board')main.appendChild(buildBoard());
  else if(S.view==='management')main.appendChild(buildManagement());
  else main.appendChild(buildSettings());
  restoreScroll(); // FIX CP4: apply after new DOM is attached
  // Modal renders into its own root — call after main render
  if(S.modal)openModal();else document.getElementById('modal-root').innerHTML='';
}

// ── scheduleRender ────────────────────────────────────────────────────────────
// rAF-gated render: coalesces multiple synchronous state mutations in the same
// JS frame into a single DOM pass. Use from filter-bar event handlers only.
// Async save handlers (upsertTask etc.) call render() directly after awaiting.
let _rafId=null;
function scheduleRender(){
  if(_rafId)return; // already queued for this frame
  _rafId=requestAnimationFrame(()=>{_rafId=null;render()});
}

}

// ── buildSubRowGC ─────────────────────────────────────────────────────────────
// Renders the calendar-area cell for a supporting-item sub-row.
// Shows a milestone diamond at scheduled_dt, or a dashed line if no date.
// @param {HTMLElement} gc - the pre-created gc div to populate
// @param {{sub:object, task:object}} row - current flatRows entry
// @param {number} h - row height in px (SRH)
function buildSubRowGC(gc, row, h){
  // TYPE_COLORS is a module-level constant
  const subColor=row.sub.complete?'#9ca3af'
    :(row.sub.scheduled_dt&&row.sub.scheduled_dt<TODAY&&!row.sub.complete)?'#dc2626'
    :TYPE_COLORS[row.sub.type]||'#6b7280';
  if(row.sub.scheduled_dt){
    // Milestone diamond ◆ at scheduled_dt
    const dIdx=dayOff(row.sub.scheduled_dt);
    if(dIdx>=0&&dIdx<NDAYS){
      const cx=dIdx*DW+DW/2,cy=h/2,ds=5;
      const diamond=el('div');diamond.className='sub-milestone';
      diamond.style.cssText=[
        'left:'+(cx-ds)+'px','top:'+(cy-ds)+'px',
        'width:'+(ds*2)+'px','height:'+(ds*2)+'px',
        'background:'+subColor,
        'opacity:'+(row.sub.complete?'0.4':'0.85'),
      ].join(';');
      diamond.title=row.sub.descr+(row.sub.complete?' (complete)':' — '+fmtDate(row.sub.scheduled_dt));
      gc.appendChild(diamond);
      // Thin connector line from diamond up to the parent bar row above
      const vline=el('div');
      vline.style.cssText='position:absolute;pointer-events:none;left:'+(cx-0.5)+'px;top:0;width:1px;height:'+(cy-ds)+'px;background:'+subColor+';opacity:0.3';
      gc.appendChild(vline);
    }
  }else{
    // No date — dashed line spanning the parent task's overall date range
    const parentSpan=projSpan([row.task]);
    if(parentSpan.s&&parentSpan.e){
      const sI=Math.max(0,dayOff(parentSpan.s));
      const eI=Math.min(NDAYS-1,dayOff(parentSpan.e));
      if(eI>=sI){
        const noDateLine=el('div');noDateLine.className='sub-milestone-line';
        noDateLine.style.cssText=[
          'left:'+sI*DW+'px','top:'+(h/2)+'px',
          'width:'+(eI-sI+1)*DW+'px',
          'border-color:'+subColor,
          'opacity:'+(row.sub.complete?'0.25':'0.4'),
        ].join(';');
        noDateLine.title=row.sub.descr+' — no date scheduled';
        gc.appendChild(noDateLine);
      }
    }
  }
}

      flatRows.push({type:'task',proj,task});

  // Header
  const hdr=el('div');hdr.className='gantt-hdr';
  const corner=el('div');corner.className='corner';corner.style.cssText='width:'+LW+'px;height:43px';
  const ci=el('span');ci.style.cssText='color:rgba(255,255,255,.4);font-size:11px';
  const taskRowCount=flatRows.filter(r=>r.type!=='subtask').length;
  const filteredInfo=isFilterActive()
    ?visProjs.length+' of '+totalProjCount+' jobs (filtered)'
    :taskRowCount+' rows · '+totalProjCount+' jobs';
  ci.textContent=filteredInfo;corner.appendChild(ci);hdr.appendChild(corner);
  hdr.appendChild(getCalHeader(totalW,holI)); // cached — not rebuilt every render
  wrap.appendChild(hdr);

  flatRows.forEach((row,ri)=>{
    const isP=row.type==='proj';
    const isSub=row.type==='subtask';
    const h=isP?PH:isSub?SRH:RH;
    const g=el('div');
    const arcClass=isP&&row.proj.archived?' proj-row-archived':'';
    if(isP){
      g.className='g-row proj-row'+arcClass;
    }else if(isSub){
      g.className='g-row sub-row'+(row.sub.complete?' sub-row-done':'');
    }else{
      g.className='g-row task-row task-'+(ri%2===0?'even':'odd');
    }
    g.style.height=h+'px';
    const lc=el('div');lc.className='lc';lc.style.cssText='width:'+LW+'px;height:'+h+'px';
    if(isP){
      lc.appendChild(iBtn(row.proj.collapsed?'▶':'▼',()=>{
        const up={...row.proj,collapsed:!row.proj.collapsed};
        S.projects=S.projects.map(p=>p.id===row.proj.id?up:p);
        upsertProject(up);render();
      },'rgba(255,255,255,.7)',(row.proj.collapsed?'Expand ':'Collapse ')+row.proj.client));
      const info=el('div');info.style.cssText='flex:1;overflow:hidden;min-width:0;margin:0 6px';
      const top=el('div');top.style.cssText='display:flex;align-items:center;gap:5px;overflow:hidden';
      const jn=el('span');jn.style.cssText='color:rgba(255,255,255,.6);font-size:11px;font-weight:700;flex-shrink:0';
      if(row.proj.archived){const ab=el('span');ab.className='archive-badge';ab.textContent='📁';top.appendChild(ab)}
      jn.textContent=row.proj.job_num;top.appendChild(jn);
      const cl=el('span');cl.style.cssText='color:#fff;font-weight:700;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';cl.textContent=row.proj.client;top.appendChild(cl);
      info.appendChild(top);
      const bl=el('div');bl.style.cssText='color:rgba(255,255,255,.5);font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';bl.textContent=row.proj.loc;info.appendChild(bl);
      lc.appendChild(info);lc.appendChild(statusBadge(row.proj.status));
      if(row.proj.job_value){const vb=el('span');vb.className='job-val-badge';vb.textContent=centsToBadge(row.proj.job_value);lc.appendChild(vb)}
      // Phase 8 CP10: value/day badge
      const vpd=projValuePerDay(row.proj);
      if(vpd){const vdb=el('span');vdb.className='val-day-badge';vdb.textContent=fmtValPerDay(vpd);vdb.title='Estimated revenue per working day';lc.appendChild(vdb)}
      if(row.proj.soils_req){const sb3=el('span');sb3.className='req-flag on';sb3.title='Soils report required';sb3.textContent='⚗SOI';lc.appendChild(sb3)}
      // Phase 12A: state-aware locate badge
      const locBadge=getLocateBadge(row.proj);
      if(locBadge){const lb2=el('span');lb2.style.cssText='display:inline-flex;align-items:center;font-size:9px;font-weight:700;padding:1px 6px;border-radius:9px;white-space:nowrap;flex-shrink:0;margin-left:3px;background:'+locBadge.bg+';color:'+locBadge.color+';border:1px solid '+locBadge.border+';cursor:default';lb2.textContent=locBadge.text;if(locBadge.tooltip)lb2.title=locBadge.tooltip;lc.appendChild(lb2)}
      const btns=el('div');btns.style.cssText='display:flex;gap:3px;flex-shrink:0;margin-left:4px';
      btns.appendChild(iBtn('+',()=>{
        const t={id:uid(),project_id:row.proj.id,descr:'',crew:'',status:row.proj.status,wknd:false,sort_order:projTasks(row.proj.id).length,segs:[{s:null,e:null,crews:[]}]};
        S.modal={type:'task',t};openModal();
      },'rgba(255,255,255,.7)','Add task to '+row.proj.client));
      btns.appendChild(iBtn('✎',()=>{S.modal={type:'proj',isNew:false,p:{...row.proj}};openModal()},'rgba(255,255,255,.7)','Edit project: '+row.proj.client));
      lc.appendChild(btns);
    } else if(isSub){
      // ── Sub-row left panel ─────────────────────────────────────────────────
      // TYPE_ICONS and TYPE_COLORS are module-level constants (see top of script)
      buildSubRowLC(lc, row, h, cm);
    } else {
      // ── Task row left panel ────────────────────────────────────────────────
      const wd=workDays(row.task.segs,holDates,row.task.wknd);
      lc.style.paddingLeft='22px';
      const arr=el('span');arr.style.cssText='color:#bbb;font-size:11px;flex-shrink:0;margin-right:4px';arr.textContent='↳';lc.appendChild(arr);
      // Supporting-item expand/collapse toggle — only shown when task has subtasks
      const taskSubs=taskSubtasks(row.task.id);
      if(taskSubs.length>0){
        const isExpanded=_expandedSubTasks.has(row.task.id);
        const togBtn=el('button');
        togBtn.className='icon-btn';
        togBtn.style.cssText='font-size:9px;color:'+(isExpanded?'#6b7280':'#9ca3af')+';padding:0 3px;flex-shrink:0;line-height:1';
        togBtn.textContent=isExpanded?'◆':'◇';
        togBtn.title=(isExpanded?'Hide':'Show')+' supporting items ('+taskSubs.length+')';
        togBtn.setAttribute('aria-label',(isExpanded?'Collapse':'Expand')+' supporting items for '+row.task.descr.slice(0,30));
        togBtn.onclick=e=>{
          e.stopPropagation();
          if(_expandedSubTasks.has(row.task.id)){_expandedSubTasks.delete(row.task.id)}
          else{_expandedSubTasks.add(row.task.id)}
          render();
        };
        lc.appendChild(togBtn);
      }
      const desc=el('span');
      desc.style.cssText='flex:1;overflow:hidden;font-size:11px;color:#1a2b4a;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;word-break:break-word';
      desc.textContent=row.task.descr;
      desc.title=row.task.descr; // full text on hover
      lc.appendChild(desc);
      // Show all unique crews across all segments
      const allSegCrews=[...new Set(row.task.segs.flatMap(sg=>segCrews(sg,row.task)))];
      allSegCrews.forEach(cn=>{const cr=cm[cn];if(cr){const cb=el('span');cb.className='crew-badge';cb.style.cssText='background:'+cr.color+';color:'+cr.tc+';margin:0 2px';cb.textContent=cr.name;lc.appendChild(cb)}});
      if(wd>0){const wds=el('span');wds.style.cssText='color:#555;font-size:11px;flex-shrink:0;min-width:26px;text-align:right';wds.textContent=wd+'d';lc.appendChild(wds)}
      // Phase 10 CP2: task value badge
      if(row.task.task_value){const tvb=el('span');tvb.className='task-val-badge';tvb.textContent=centsToBadge(row.task.task_value);tvb.title='Task value: '+centsToDisplay(row.task.task_value);lc.appendChild(tvb)}
      // Phase 12B: subtask badge — shows type icons + overdue state
      const subs=taskSubtasks(row.task.id);
      if(subs.length>0){
        const done=subs.filter(s=>s.complete).length;
        const total=subs.length;
        const overdue=subs.filter(s=>!s.complete&&s.scheduled_dt&&s.scheduled_dt<TODAY);
        const pending=subs.filter(s=>!s.complete);
        // Badge colour: red if any overdue, green if all done, amber otherwise
        const bg=overdue.length?'#fee2e2':done===total?'#dcfce7':'#fef3c7';
        const col=overdue.length?'#dc2626':done===total?'#166534':'#92400e';
        const border=overdue.length?'#fca5a5':done===total?'#86efac':'#fcd34d';
        const stb=el('span');stb.className='subtask-badge';
        stb.style.cssText='background:'+bg+';color:'+col+';border:1px solid '+border+';cursor:default';
        // Build icon list for pending items by type (uses module-level TYPE_ICONS)
        const pendingTypes=[...new Set(pending.map(s=>s.type))];
        const icons=pendingTypes.map(t=>TYPE_ICONS[t]||'📋').join('');
        stb.textContent=(icons||'⚙')+' '+done+'/'+total+(overdue.length?' ⚠':'');
        stb.title=[
          done+'/'+total+' items complete',
          ...(overdue.length?['⚠ Overdue: '+overdue.map(s=>s.descr).join(', ')]:[]),
          ...pending.map(s=>'○ '+s.descr+(s.scheduled_dt?' ('+fmtDate(s.scheduled_dt)+')':'')),
          ...subs.filter(s=>s.complete).map(s=>'✓ '+s.descr),
        ].join('\n');
        lc.appendChild(stb);
      }
      lc.appendChild(iBtn('✎',()=>{
        try{
          const safeSegs=(row.task.segs||[{s:null,e:null,crews:[]}]).map(s=>({
            s:s.s||null, e:s.e||null,
            crews:Array.isArray(s.crews)?[...s.crews]:(row.task.crew?[row.task.crew]:[])
          }));
          S.modal={type:'task',t:{...row.task,segs:safeSegs}};
          openModal();
        }catch(err){
          console.error('[Strada] Task modal open failed:',err);
          toast('⚠ Could not open task editor: '+err.message,'error');
        }
      },'#999','Edit task: '+row.task.descr.slice(0,40)));
    }
    g.appendChild(lc);
    const gc=el('div');gc.className='gc'+(S.ganttGrid?' gc-grid':'');gc.style.cssText='width:'+totalW+'px;height:'+h+'px';
    if(bgGrad)gc.style.backgroundImage=bgGrad;
    if(TODAYIDX>=0&&TODAYIDX<NDAYS){
      const tl=el('div');tl.className='today-col';
      tl.style.cssText='left:'+TODAYIDX*DW+'px;height:'+h+'px';
      tl.title='Today: '+TODAY;
      gc.appendChild(tl);
    }
    if(isP){
      const sp=projSpan(projTasks(row.proj.id));
      if(sp.s&&sp.e){const sb2=el('div');sb2.className='proj-span';sb2.style.cssText='left:'+dayOff(sp.s)*DW+'px;width:'+(dayOff(sp.e)-dayOff(sp.s)+1)*DW+'px;top:50%;transform:translateY(-50%);height:6px';gc.appendChild(sb2)}
    } else if(isSub){
      buildSubRowGC(gc, row, h);
    } else {
      row.task.segs.forEach((seg,si)=>{
        if(!seg.s||!seg.e)return;
        // Resolve crews for this segment (with backward-compat fallback)
        const crewsForSeg=segCrews(seg,row.task);
        const primaryCrew=cm[crewsForSeg[0]];
        const color=primaryCrew?primaryCrew.color:'#aaa';
        const color2=crewsForSeg[1]?cm[crewsForSeg[1]]?.color:null; // secondary crew color
        const color3=crewsForSeg[2]?cm[crewsForSeg[2]]?.color:null; // tertiary crew color
        const sIdx=dayOff(seg.s),eIdx=dayOff(seg.e);
        if(sIdx<0||eIdx<0||sIdx>NDAYS-1||eIdx>NDAYS-1||sIdx>eIdx)return;
        const bT=3,bH=h-6;const ranges=[];let rs=null,re=null;
        for(let i=Math.max(0,sIdx);i<=Math.min(NDAYS-1,eIdx);i++){
          const skip=!row.task.wknd&&(WDAY_IDXS.includes(i)||holI.includes(i));
          if(!skip){if(rs===null)rs=i;re=i}else{if(rs!==null){ranges.push([rs,re]);rs=re=null}}
        }
        if(rs!==null)ranges.push([rs,re]);
        // Ghost bar: faint full-range bar for visual continuity through weekends
        if(!row.task.wknd&&sIdx>=0&&eIdx>=0&&sIdx<=NDAYS-1&&eIdx<=NDAYS-1){
          const ghost=el('div');ghost.className='bar-seg';
          ghost.style.cssText='left:'+sIdx*DW+'px;width:'+(eIdx-sIdx+1)*DW+'px;top:'+bT+'px;height:'+bH+'px;background:'+color+';border-radius:3px;opacity:'+(si===0?.18:.12);
          gc.appendChild(ghost);
        }
        ranges.forEach(([a,b],ri2)=>{
          const isFirst=ri2===0&&a===sIdx,isLast=ri2===ranges.length-1&&b===eIdx;
          const br=(isFirst?'3px':'0')+' '+(isLast?'3px':'0')+' '+(isLast?'3px':'0')+' '+(isFirst?'3px':'0');
          // Primary bar
          const bd=el('div');bd.className='bar-seg';
          bd.dataset.barTask=row.task.id;bd.dataset.barSi=si;bd.dataset.origLeft=a*DW;
          bd.style.cssText='left:'+a*DW+'px;width:'+(b-a+1)*DW+'px;top:'+bT+'px;height:'+bH+'px;background:'+color+';border-radius:'+br+';opacity:'+(si===0?1:.75);
          gc.appendChild(bd);
          // Secondary crew: 3px stripe at top of bar
          if(color2){
            const s2=el('div');s2.className='bar-seg';
            s2.dataset.barTask=row.task.id;s2.dataset.barSi=si;s2.dataset.origLeft=a*DW;
            s2.style.cssText='left:'+a*DW+'px;width:'+(b-a+1)*DW+'px;top:'+bT+'px;height:3px;background:'+color2+';border-radius:'+(isFirst?'3px':'0')+' '+(isLast?'3px':'0')+' 0 0;z-index:2;opacity:'+(si===0?1:.75);
            gc.appendChild(s2);
          }
          // Tertiary crew: 3px stripe at bottom of bar
          if(color3){
            const s3=el('div');s3.className='bar-seg';
            s3.dataset.barTask=row.task.id;s3.dataset.barSi=si;s3.dataset.origLeft=a*DW;
            s3.style.cssText='left:'+a*DW+'px;width:'+(b-a+1)*DW+'px;top:'+(bT+bH-3)+'px;height:3px;background:'+color3+';border-radius:0 0 '+(isLast?'3px':'0')+' '+(isFirst?'3px':'0')+';z-index:2;opacity:'+(si===0?1:.75);
            gc.appendChild(s3);
          }
        });
        const ov=el('div');ov.className='bar-hit';
        ov.dataset.hitTask=row.task.id;ov.dataset.hitSi=si;
        ov.style.cssText='left:'+sIdx*DW+'px;width:'+(eIdx-sIdx+1)*DW+'px;top:'+bT+'px;height:'+bH+'px';
        ov.title=row.task.descr+'\n'+seg.s+' → '+seg.e+(crewsForSeg.length?'\n'+crewsForSeg.join(' + '):'');
        ov.addEventListener('mousedown',e=>{
          e.preventDefault();e.stopPropagation();
          const rect=ov.getBoundingClientRect();const lx=e.clientX-rect.left,rw=rect.width;
          const type=lx<10?'left':lx>rw-10?'right':'move';
          drag={taskId:row.task.id,si,type,startX:e.clientX,lastDelta:0,origS:seg.s,origE:seg.e};
          document.body.style.cursor=type==='move'?'grabbing':'ew-resize';
        });
        gc.appendChild(ov);

        // ── Subtask pins: icon flags above the bar for incomplete items ──────
        // Only render on the first segment (si===0) to avoid duplication.
        // Pins sit above the bar (top:0 via CSS) and are pointer-events:none
        // so they never interfere with drag handles.
        if(si===0){
          const subItems=taskSubtasks(row.task.id).filter(s=>!s.complete);
          if(subItems.length>0){
            // Uses module-level TYPE_ICONS and TYPE_PIN_COLORS constants
            // Group by type, mark overdue
            const byType={};
            subItems.forEach(s=>{
              const isOverdue=s.scheduled_dt&&s.scheduled_dt<TODAY;
              const key=isOverdue?'__overdue__':s.type;
              if(!byType[key])byType[key]={type:s.type,items:[],overdue:isOverdue};
              byType[key].items.push(s);
            });
            const pin=el('div');pin.className='sub-pin';
            // Position pin at the left edge of the first segment
            pin.style.left=sIdx*DW+'px';
            Object.values(byType).forEach(group=>{
              const colors=group.overdue
                ?{bg:'#fef2f2',col:'#dc2626',bdr:'#f87171'}
                :TYPE_PIN_COLORS[group.type]||{bg:'#f3f4f6',col:'#374151',bdr:'#9ca3af'};
              const ico=el('span');ico.className='sub-pin-ico';
              ico.style.cssText='background:'+colors.bg+';color:'+colors.col+';border-color:'+colors.bdr;
              ico.textContent=(TYPE_ICONS[group.type]||'📋')+(group.items.length>1?group.items.length:'');
              ico.title=(group.overdue?'⚠ OVERDUE — ':'')+group.items.map(s=>
                s.descr+(s.scheduled_dt?' ('+fmtDate(s.scheduled_dt)+')':'')
              ).join('\n');
              pin.appendChild(ico);
            });
            gc.appendChild(pin);
          }
        }
      }); // end seg forEach
    } // end else (task row)
    g.appendChild(gc);wrap.appendChild(g);
  });
  const spacer=el('div');spacer.style.height='60px';wrap.appendChild(spacer);
  return wrap;
}

// ── MANAGEMENT TAB ────────────────────────────────────────────────────────────
// A focused office/back-office view. Deliberately minimal — the goal is to surface
// information that needs action, not to create work. Each section is read-first,
// add-second. No complex workflows here; those live in their own systems.
function buildManagement(){
  const wrap=el('div');wrap.className='mgmt-wrap';

  // ── Employee summary panel ── shown at top when employees exist ──────────
  const emps=S.employees||[];
  if(emps.length>0){
    const empPanel=el('div');empPanel.className='mgmt-card';empPanel.style.marginBottom='0';
    const epHdr=el('div');epHdr.className='mgmt-card-hdr';
    const epTitle=el('div');epTitle.className='mgmt-card-title';epTitle.textContent='👷 Team';
    const goEmp=el('button');goEmp.className='btn-sm';goEmp.style.fontSize='11px';goEmp.textContent='Manage Employees';
    goEmp.onclick=()=>{S.view='settings';S.settingsTab='employees';render()};
    epHdr.appendChild(epTitle);epHdr.appendChild(goEmp);empPanel.appendChild(epHdr);

    // Compact employee chips
    const chipWrap=el('div');chipWrap.style.cssText='display:flex;flex-wrap:wrap;gap:6px';
    emps.filter(e=>e.active!==false).slice(0,16).forEach(emp=>{
      const certs=empCerts(emp.id);
      const hasIssue=certs.some(c=>{const d=certDaysLeft(c);return d!==null&&d<=30});
      const chip=el('div');
      chip.style.cssText='display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:14px;font-size:11px;font-weight:600;background:'+(hasIssue?'#fef3c7':'#f0f4ff')+';border:1px solid '+(hasIssue?'#fcd34d':'#c5d0e8')+';color:'+(hasIssue?'#92400e':'#1F3864');
      const av=el('span');av.style.cssText='width:18px;height:18px;border-radius:50%;background:#1F3864;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0';
      av.textContent=(emp.name||'?').slice(0,2).toUpperCase();chip.appendChild(av);
      const nm=el('span');nm.textContent=emp.name.split(' ')[0];chip.appendChild(nm);
      if(hasIssue){const w=el('span');w.textContent='⚠';w.style.fontSize='10px';chip.appendChild(w)}
      chip.title=emp.name+(emp.role?' — '+emp.role:'');
      chip.onclick=()=>{S.modal={type:'employee',isNew:false,emp:{...emp},pendingCerts:[]};openModal()};
      chipWrap.appendChild(chip);
    });
    if(emps.filter(e=>e.active!==false).length>16){
      const more=el('span');more.style.cssText='font-size:11px;color:#9ca3af;align-self:center';
      more.textContent='+'+(emps.filter(e=>e.active!==false).length-16)+' more';chipWrap.appendChild(more);
    }
    empPanel.appendChild(chipWrap);
    wrap.appendChild(empPanel);
  }

  // ── M5: Certification & Compliance Expiry Alert Dashboard ─────────────────
  // Reads from S.employeeCerts (M1) and S.subcontractors (M4).
  // Only rendered when there is at least one employee cert or active subcontractor.
  // Sits between the employee summary and the operational cards below.
  const hasCertData=(S.employeeCerts||[]).length>0||(S.subcontractors||[]).filter(s=>s.status==='active').length>0;
  if(hasCertData){
    wrap.appendChild(buildCertAlertPanel(false));
  }

  // ── Row 1: Bid Board + H&S Tracker ───────────────────────────────────────
  const row1=el('div');row1.className='mgmt-grid';

  // ── BID BOARD ─────────────────────────────────────────────────────────────
  const bidCard=el('div');bidCard.className='mgmt-card';
  const bidHdr=el('div');bidHdr.className='mgmt-card-hdr';
  const bidTitle=el('div');bidTitle.className='mgmt-card-title';bidTitle.textContent='📋 Bid Board';
  const bidAdd=el('button');bidAdd.className='btn-sm';bidAdd.style.fontSize='11px';bidAdd.textContent='+ Add Bid';
  bidHdr.appendChild(bidTitle);bidHdr.appendChild(bidAdd);bidCard.appendChild(bidHdr);

  const BID_STAGES=[
    {key:'lead',    label:'Lead',      bg:'#e0e7ff',col:'#3730a3'},
    {key:'quoting', label:'Quoting',   bg:'#fef3c7',col:'#92400e'},
    {key:'sent',    label:'Sent',      bg:'#dbeafe',col:'#1e40af'},
    {key:'won',     label:'Won',       bg:'#dcfce7',col:'#166534'},
    {key:'lost',    label:'Lost',      bg:'#fee2e2',col:'#991b1b'},
  ];
  const bidStageMap=Object.fromEntries(BID_STAGES.map(s=>[s.key,s]));

  function renderBids(){
    // Remove existing rows
    [...bidCard.querySelectorAll('.bid-row')].forEach(r=>r.remove());
    const bids=S.mgmt.bids||[];
    if(bids.length===0){
      const emp=el('div');emp.style.cssText='color:#9ca3af;font-size:12px;text-align:center;padding:20px 0';
      emp.textContent='No bids yet — click + Add Bid to track an opportunity.';
      emp.className='bid-empty';bidCard.appendChild(emp);return;
    }
    bidCard.querySelectorAll('.bid-empty').forEach(e=>e.remove());
    // Sort: won/lost last, then by dueDate
    const sorted=[...bids].sort((a,b)=>{
      const order={lead:0,quoting:1,sent:2,won:3,lost:4};
      return (order[a.stage]||0)-(order[b.stage]||0)||(a.dueDate||'').localeCompare(b.dueDate||'');
    });
    sorted.forEach(bid=>{
      const stage=bidStageMap[bid.stage]||BID_STAGES[0];
      const row=el('div');row.className='bid-row';
      const stageBadge=el('span');stageBadge.className='bid-stage';
      stageBadge.style.cssText='background:'+stage.bg+';color:'+stage.col;
      stageBadge.textContent=stage.label;row.appendChild(stageBadge);
      const name=el('span');name.className='bid-name';
      name.textContent=bid.name+(bid.client?' — '+bid.client:'');
      name.title=bid.notes||bid.name;row.appendChild(name);
      if(bid.value){const v=el('span');v.className='bid-val';v.textContent='$'+Number(bid.value).toLocaleString();row.appendChild(v)}
      if(bid.dueDate){
        const d=el('span');d.className='bid-date';
        const daysUntil=Math.round((new Date(bid.dueDate+'T12:00:00')-new Date(TODAY+'T12:00:00'))/86400000);
        const overdue=daysUntil<0&&bid.stage!=='won'&&bid.stage!=='lost';
        d.style.color=overdue?'#dc2626':'#9ca3af';

  function buildHSBanner(){
    hsCard.querySelectorAll('.hs-banner').forEach(b=>b.remove());

    const actions=S.hsActions||[];
    const redItems=[];const amberItems=[];

    // WSIB Form 7 overdue
    incidents.filter(i=>i.wsib_required&&!i.wsib_form7_filed&&i.wsib_form7_due).forEach(i=>{
      const d=Math.round((new Date(i.wsib_form7_due+'T12:00:00')-new Date(TODAY+'T12:00:00'))/86400000);
      if(d<0)redItems.push('WSIB Form 7 overdue: '+i.description.slice(0,40));
      else if(d<=3)amberItems.push('WSIB Form 7 due in '+d+'d: '+i.description.slice(0,30));
    });
    // Corrective actions overdue/due soon
    actions.filter(a=>a.status!=='complete'&&a.due_date).forEach(a=>{
      const d=Math.round((new Date(a.due_date+'T12:00:00')-new Date(TODAY+'T12:00:00'))/86400000);
      const emp=S.employees.find(e=>e.id===a.assigned_to_employee_id);
      const who=emp?emp.name.split(' ')[0]:'Unassigned';
      if(d<0)redItems.push('Action overdue ('+who+'): '+a.description.slice(0,35));
      else if(d<=7)amberItems.push('Action due in '+d+'d ('+who+'): '+a.description.slice(0,30));
    });
    // Open incidents > 14 days
    incidents.filter(i=>i.status==='open').forEach(i=>{
      const age=Math.round((new Date(TODAY+'T12:00:00')-new Date(i.incident_date+'T12:00:00'))/86400000);
      if(age>14)redItems.push('Open >14d: '+i.description.slice(0,40));
    });
    // JHSC — warn if no meeting in last 30 days or next meeting overdue
    const meetings=S.hsMeetings||[];
    const lastJHSC=meetings.filter(m=>m.meeting_type==='jhsc').sort((a,b)=>b.meeting_date.localeCompare(a.meeting_date))[0];
    if(!lastJHSC){
      amberItems.push('No JHSC meeting on record — schedule the first meeting');
    }else{
      const daysSince=Math.round((new Date(TODAY+'T12:00:00')-new Date(lastJHSC.meeting_date+'T12:00:00'))/86400000);
      if(daysSince>30)amberItems.push('JHSC meeting overdue — last held '+daysSince+'d ago');
      if(lastJHSC.next_meeting_date){
        const daysUntil=Math.round((new Date(lastJHSC.next_meeting_date+'T12:00:00')-new Date(TODAY+'T12:00:00'))/86400000);
        if(daysUntil<0)redItems.push('JHSC meeting missed — was scheduled '+fmtDate(lastJHSC.next_meeting_date));
        else if(daysUntil<=7)amberItems.push('JHSC meeting in '+daysUntil+'d — '+fmtDate(lastJHSC.next_meeting_date));
      }
    }
    // PHAs — warn if any active project has no PHA
    const activeProjIds=S.projects.filter(p=>!p.archived&&p.status!=='Complete').map(p=>p.id);
    const phaProjectIds=new Set((S.hsPhas||[]).map(pha=>pha.project_id));
    const missingPHA=activeProjIds.filter(id=>!phaProjectIds.has(id));
    if(missingPHA.length>0){
      const names=missingPHA.slice(0,3).map(id=>{const p=S.projects.find(x=>x.id===id);return p?p.job_num:id});
      amberItems.push(missingPHA.length+' active project'+(missingPHA.length!==1?'s have':' has')+' no PHA: '+names.join(', ')+(missingPHA.length>3?' +more':''));
    }
    // M4: Subcontractor WSIB / Insurance expiry
    const today=new Date(TODAY+'T12:00:00');
    (S.subcontractors||[]).filter(s=>s.status==='active').forEach(s=>{
      [
        {date:s.wsib_clearance_expiry, label:'WSIB clearance', sub:s.name},
        {date:s.insurance_expiry,       label:'Insurance',      sub:s.name},
      ].forEach(({date,label,sub})=>{
        if(!date)return;
        const d=Math.round((new Date(date+'T12:00:00')-today)/86400000);
        if(d<0)redItems.push(label+' EXPIRED: '+sub+' ('+Math.abs(d)+'d ago)');
        else if(d<=14)amberItems.push(label+' expires in '+d+'d: '+sub);
      });
    });

    const insertAfter=hsHdr;
    if(redItems.length){
      redItems.forEach(msg=>{
        const b=el('div');b.className='hs-banner red';
        b.innerHTML='';
        const ico=el('span');ico.textContent='🔴';ico.style.flexShrink='0';b.appendChild(ico);
        const t=el('span');t.textContent=msg;b.appendChild(t);
        hsCard.insertBefore(b,insertAfter.nextSibling);
      });
    }else if(amberItems.length){
      amberItems.forEach(msg=>{
        const b=el('div');b.className='hs-banner amber';
        b.innerHTML='';
        const ico=el('span');ico.textContent='🟡';ico.style.flexShrink='0';b.appendChild(ico);
        const t=el('span');t.textContent=msg;b.appendChild(t);
        hsCard.insertBefore(b,insertAfter.nextSibling);
      });
    }else{
      const b=el('div');b.className='hs-banner green';
      b.innerHTML='';
      const ico=el('span');ico.textContent='🟢';ico.style.flexShrink='0';b.appendChild(ico);
      const t=el('span');t.textContent='All H&S items current — no overdue actions or WSIB deadlines.';b.appendChild(t);
      hsCard.insertBefore(b,insertAfter.nextSibling);
    }
  }

  // Build a 5-week rolling calendar starting from current Monday
  function buildTOC(){
    tocCard.querySelectorAll('.toc-wrap').forEach(e=>e.remove());
    const tocWrap=el('div');tocWrap.className='toc-wrap';
    const calGrid=el('div');calGrid.className='toc-grid';
    ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d=>{
      const h=el('div');h.className='toc-hdr';h.textContent=d;calGrid.appendChild(h);
    });
    // Start from Monday of current week
    const start=new Date(TODAY+'T12:00:00');
    start.setDate(start.getDate()-(start.getDay()||7)+1);
    const holSet=new Set(S.holidays.map(h=>h.date));
    const timeOffMap={};
    (S.mgmt.timeOff||[]).forEach(t=>{
      if(!t.from||!t.to)return;
      const d=new Date(t.from+'T12:00:00'),e=new Date(t.to+'T12:00:00');
      while(d<=e){const k=d.toISOString().slice(0,10);if(!timeOffMap[k])timeOffMap[k]=[];timeOffMap[k].push(t);d.setDate(d.getDate()+1)}
    });
    for(let i=0;i<35;i++){
      const d=new Date(start);d.setDate(d.getDate()+i);
      const ds=d.toISOString().slice(0,10);
      const isToday=ds===TODAY;
      const isWeekend=d.getDay()===0||d.getDay()===6;
      const isHol=holSet.has(ds);
      const offs=timeOffMap[ds]||[];
      const cell=el('div');cell.className='toc-day'+(isToday?' today':isHol?' holiday':isWeekend?' weekend':'');
      const dayNum=el('span');dayNum.textContent=d.getDate();cell.appendChild(dayNum);
      if(i===0||d.getDate()===1){const mLbl=el('div');mLbl.style.cssText='font-size:8px;color:#9ca3af;line-height:1';mLbl.textContent=d.toLocaleString('en-CA',{month:'short'});cell.appendChild(mLbl)}
      offs.forEach(t=>{
        // Resolve colour: check employee's linked crew first, then direct crew name match
        const linkedEmp=(S.employees||[]).find(e=>e.name===t.crew&&e.crew_id);
        const cr=linkedEmp?S.crews.find(c=>c.id===linkedEmp.crew_id):S.crews.find(c=>c.name===t.crew);
        const pip=el('span');pip.className='toc-pip';
        pip.style.background=cr?cr.color:'#6b7280';
        pip.title=t.crew+(t.note?' — '+t.note:'');
        cell.appendChild(pip);
      });
      calGrid.appendChild(cell);
    }
    tocWrap.appendChild(calGrid);
    // Legend
    if((S.mgmt.timeOff||[]).length>0){
      const leg=el('div');leg.style.cssText='display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;font-size:10px;color:#6b7280';
      const crews=[...new Set((S.mgmt.timeOff||[]).map(t=>t.crew))];
      crews.forEach(name=>{
        const cr=S.crews.find(c=>c.name===name);

  // ── Corfix Time-Off PDF Import ────────────────────────────────────────────
  // Reads a Corfix HR Time Off Request PDF using the same Claude API key
  // already stored in Settings → Data → API Keys. Extracts employee name,
  // dates, leave type, and notes, then pre-fills the add form for confirmation.
  // The user reviews and clicks Add — nothing is saved without confirmation.

  const CORFIX_PROMPT=`You are parsing a Corfix HR Time Off Request form from a construction company.
Extract ONLY the following fields and return a single JSON object with no markdown, no explanation:
{
  "employee_name": "full name of the person requesting time off",
  "from_date": "YYYY-MM-DD",
  "to_date": "YYYY-MM-DD",
  "leave_type": "vacation-short | vacation-long | appointment | other",
  "note": "any additional details entered in the form, or empty string",
  "status": "approved | denied | pending"
}
Rules:
- leave_type mapping: "Vacation (less than one week)" → vacation-short, "Vacation (More than one week)" → vacation-long, "Appointment" → appointment, "Other" → other
- status: look for the checked radio button in the Admin Only section (Approved/Denied/Pending review). Default to "pending" if unclear.
- If a date field is blank or unreadable return null for that field.
- Return ONLY the JSON object. No preamble, no backticks.`;

  async function parseCorfixPDF(file){
    const apiKey=await fetchApiKey();
    if(!apiKey)throw new Error('No API key — add your Anthropic key in Settings → Data → API Keys first.');
    const b64=await fileToBase64(file);
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,
        'anthropic-version':'2023-06-01','anthropic-dangerous-allow-browser':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',max_tokens:512,
        messages:[{role:'user',content:[
          {type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},
          {type:'text',text:CORFIX_PROMPT},
        ]}],
      }),
    });
    if(!resp.ok){
      let msg='Claude API error '+resp.status;
      try{const e=await resp.json();msg=e.error?.message||msg}catch{}
      throw new Error(msg);
    }
    const data=await resp.json();
    const raw=(data.content||[]).find(b=>b.type==='text')?.text||'';
    const clean=raw.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
    const parsed=JSON.parse(clean);
    if(!parsed.employee_name||!parsed.from_date)
      throw new Error('Could not extract employee name or dates from this PDF. Is this a Corfix Time Off Request form?');
    return parsed;
  }

  function openCorfixResult(parsed){
    // Remove any existing add/import form
    tocCard.querySelectorAll('.toc-add-form,.toc-import-form').forEach(f=>f.remove());

    const empNames=(S.employees||[]).filter(e=>e.active!==false).map(e=>e.name).sort();
    const nameOpts=empNames.length?empNames:S.crews.map(c=>c.name);

    // Try to fuzzy-match the extracted name against known employees
    // Match on last name or full name (case-insensitive)
    function matchEmployee(extracted){
      if(!extracted)return'';
      const norm=extracted.toLowerCase().trim();
      // Exact match first
      const exact=nameOpts.find(n=>n.toLowerCase()===norm);if(exact)return exact;
      // Last name match
      const lastName=norm.split(' ').pop();
      const byLast=nameOpts.find(n=>n.toLowerCase().split(' ').pop()===lastName);if(byLast)return byLast;
      // Partial contains
      const partial=nameOpts.find(n=>n.toLowerCase().includes(norm)||norm.includes(n.toLowerCase()));
      return partial||'';
    }
    const matchedName=matchEmployee(parsed.employee_name);

    const LEAVE_LABELS={'vacation-short':'Vacation < 1 week','vacation-long':'Vacation > 1 week','appointment':'Appointment','other':'Other'};
    const statusColour={'approved':'#dcfce7','denied':'#fee2e2','pending':'#fef3c7'};

    // Warn if status is not approved
    if(parsed.status!=='approved'){

    if(!matchedName){

      hint.textContent='Not matched: "'+parsed.employee_name+'"';empW.appendChild(hint);

    // Leave type badge

    ltBadge.textContent=LEAVE_LABELS[parsed.leave_type]||parsed.leave_type;ltW.appendChild(ltBadge);g.appendChild(ltW);

    // From date

  function buildMgGantt(){

    startD.setDate(startD.getDate()-7);
    const endD=new Date(Math.max(new Date(allDates[allDates.length-1]+'T12:00:00'),new Date(TODAY+'T12:00:00')));
    endD.setDate(endD.getDate()+7);
    const nDays=Math.round((endD-startD)/86400000)+1;
    const totalW=nDays*MG_DW+180;

    const wrap2=el('div');wrap2.className='mg-gantt mgmt-gantt-wrap';

    for(let i=0;i<nDays;i++){
      const d=new Date(startD);d.setDate(d.getDate()+i);
      if(d.getDay()===1||i===0){const lbl=el('span');lbl.style.cssText='position:absolute;left:'+(i*MG_DW+2)+'px;top:8px;font-size:8px;color:#9ca3af;pointer-events:none';lbl.textContent=d.toLocaleDateString('en-CA',{month:'short',day:'numeric'});hgc.appendChild(lbl)}
      // Today line

    }

        if(e>=0&&s<=nDays){

          bar.textContent=ev.label||'';bar.title=ev.label+(ev.notes?'\n'+ev.notes:'');

function buildBoardCols(cols,cnt){
  const cm=crewMap();const q=(S.boardSearch||'').toLowerCase();
  // Phase 9: exclude archived from main board unless showArchived
  const active=S.projects.filter(p=>!p.archived);
  const archived=S.projects.filter(p=>p.archived);
  const pool=q
    ?active.filter(p=>(p.job_num+p.client+p.loc+(p.notes||'')).toLowerCase().includes(q))
    :active;
  cnt.textContent=pool.length+' of '+active.length+' active projects'+(archived.length>0?' · '+archived.length+' archived':'');
  cols.innerHTML='';
  const grouped={};ST_OPTS.forEach(s=>{grouped[s]=[]});
  pool.forEach(p=>{(grouped[p.status]||(grouped['Not started'])).push(p)});
  ST_OPTS.forEach(st=>{
    const c=ST_CLR[st];const col=el('div');col.className='board-col';
    const hdr=el('div');hdr.className='board-col-hdr';hdr.style.cssText='background:'+c+'18;border:1px solid '+c+'33';
    const dot=el('div');dot.style.cssText='width:10px;height:10px;border-radius:50%;background:'+c+';flex-shrink:0';hdr.appendChild(dot);
    const sl=el('span');sl.style.cssText='font-weight:700;font-size:12px;color:'+c;sl.textContent=st;hdr.appendChild(sl);
    const right=el('div');right.style.cssText='margin-left:auto;display:flex;align-items:center;gap:5px';
    const cn=el('span');cn.style.cssText='background:'+c+';color:#fff;border-radius:10px;font-size:11px;padding:0 6px;font-weight:700';cn.textContent=grouped[st].length;right.appendChild(cn);
    const colVal=grouped[st].reduce((s,p)=>s+(p.job_value||0),0);
    if(colVal>0){const tv=el('span');tv.style.cssText='font-size:10px;color:'+c+';font-weight:700;opacity:.85';tv.textContent=centsToBadge(colVal);right.appendChild(tv)}
    hdr.appendChild(right);col.appendChild(hdr);
    if(grouped[st].length===0&&!q){
      const emp=el('div');emp.style.cssText='color:#bbb;font-size:12px;text-align:center;padding:20px 8px';emp.textContent='No projects';col.appendChild(emp);
    }
    grouped[st].forEach(p=>{col.appendChild(buildBoardCard(p,cm))});
    cols.appendChild(col);
  });
  // Phase 9: Archive column — shown when showArchived is ON
  if(S.filter.showArchived&&archived.length>0){
    const arcFiltered=q?archived.filter(p=>(p.job_num+p.client+p.loc).toLowerCase().includes(q)):archived;
    const col=el('div');col.className='board-col';
    const hdr=el('div');hdr.className='board-col-hdr';hdr.style.cssText='background:#fef3c720;border:1px dashed #d97706';
    const dot=el('div');dot.style.cssText='width:10px;height:10px;border-radius:50%;background:#d97706;flex-shrink:0';hdr.appendChild(dot);
    const sl=el('span');sl.style.cssText='font-weight:700;font-size:12px;color:#d97706';sl.textContent='📁 Archive';hdr.appendChild(sl);
    const cn=el('span');cn.style.cssText='margin-left:auto;background:#d97706;color:#fff;border-radius:10px;font-size:11px;padding:0 6px;font-weight:700';cn.textContent=arcFiltered.length;hdr.appendChild(cn);
    col.appendChild(hdr);
    arcFiltered.forEach(p=>{
      const card=buildBoardCard(p,cm);
      card.className+=' board-card-archived';
      col.appendChild(card);
    });
    cols.appendChild(col);
  }
}
function buildBoardCard(p,cm){
  const card=el('div');card.className='board-card';

  const top=el('div');top.style.cssText='display:flex;justify-content:space-between;align-items:flex-start;gap:4px;margin-bottom:3px';
  const jn=el('span');jn.style.cssText='font-weight:700;font-size:11px;color:#1F3864';jn.textContent=p.job_num;top.appendChild(jn);
  top.appendChild(statusBadge(p.status));card.appendChild(top);

  const crd=el('div');crd.style.cssText='display:flex;flex-wrap:wrap;gap:3px';
  [...new Set(projTasks(p.id).flatMap(t=>t.segs.flatMap(sg=>segCrews(sg,t))))].filter(Boolean).forEach(cn2=>{const cr=cm[cn2];if(cr){const cb=el('span');cb.className='crew-badge';cb.style.cssText='background:'+cr.color+';color:'+cr.tc;cb.textContent=cr.name;crd.appendChild(cb)}});
  card.appendChild(crd);
  const bl2=el('div');bl2.style.cssText='font-size:11px;color:#888;margin-top:4px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px';
  const tcount=el('span');tcount.textContent=projTasks(p.id).length+' task'+(projTasks(p.id).length!==1?'s':'');bl2.appendChild(tcount);
  // Subtask count chip
  const allSubs=projTasks(p.id).flatMap(t=>taskSubtasks(t.id));
  if(allSubs.length>0){
    const sdone=allSubs.filter(s=>s.complete).length;
    const sc=el('span');sc.style.cssText='font-size:10px;font-weight:700;padding:1px 5px;border-radius:8px;'+(sdone===allSubs.length?'background:#dcfce7;color:#166534':'background:#fef3c7;color:#92400e');
    sc.textContent='⚙ '+sdone+'/'+allSubs.length;sc.title='Supporting items';bl2.appendChild(sc);
  }
  if(p.job_value){const vl=el('span');vl.style.cssText='font-weight:700;color:#155724;font-size:11px';vl.textContent=centsToDisplay(p.job_value);bl2.appendChild(vl)}
  card.appendChild(bl2);
  // Locate badge row
  const locBadgeCard=getLocateBadge(p);
  if(locBadgeCard){
    const lb=el('div');lb.style.cssText='margin-top:4px';
    const lbs=el('span');lbs.style.cssText='font-size:9px;font-weight:700;padding:2px 7px;border-radius:9px;background:'+locBadgeCard.bg+';color:'+locBadgeCard.color+';border:1px solid '+locBadgeCard.border;
    lbs.textContent=locBadgeCard.text;lb.appendChild(lbs);card.appendChild(lb);
  }
  return card;
}

        S.modal={type:'employee',isNew:false,emp:{...emp},pendingCerts:[]};openModal();
      };card.appendChild(eb);
      list.appendChild(card);
    });
  }
  rebuildList();
  return d;
}
